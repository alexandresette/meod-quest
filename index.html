  {type:'mc',q:'Qual é a declaração central de 1 Coríntios 15?',opts:['O amor é o maior dom','A ressurreição de Cristo é o fundamento da fé','A unidade do corpo de Cristo','O uso correto dos dons espirituais'],correct:1,explain:'"Se Cristo não ressuscitou, é vã a nossa pregação e vã também a vossa fé." A ressurreição corporal é o centro da teologia paulina.',ref:'1 Coríntios 15:14'},
  {type:'mc',q:'Qual é o significado da palavra "Batismo" em grego?',opts:['Purificação','Imersão/mergulho','Unção','Consagração'],correct:1,explain:'"Baptizein" em grego significa mergulhar ou imergir. Os debates históricos sobre o modo do batismo (imersão, aspersão) giram em torno deste significado original.',ref:'Mateus 3:16 / Etimologia grega'},
  {type:'mc',q:'Qual profeta do AT ministrou principalmente em Nínive, a capital da Assíria?',opts:['Jonas','Naum','Amós','Sofonias'],correct:0,explain:'Jonas foi enviado a Nínive para pregar o arrependimento. Naum também profetizou contra Nínive — mas um século depois, quando a cidade voltou ao mal.',ref:'Jonas 1:2 / Naum 1:1'},
  {type:'mc',q:'Qual foi a resposta de Deus a Jó após todo seu sofrimento?',opts:['Ele explicou a razão do sofrimento','Ele revelou Sua grandeza e perguntou onde estava Jó na criação','Ele prometeu riquezas dobradas imediatamente','Ele pediu desculpas a Jó'],correct:1,explain:'Deus respondeu a Jó do meio do redemoinho com perguntas poderosas sobre a criação — não deu explicações, mas revelou Sua glória incomparável.',ref:'Jó 38:1-7'},
  {type:'mc',q:'Qual era o ofício de Esdras em Israel?',opts:['Rei','Sacerdote e escriba versado na lei de Moisés','General do exército','Governador persa'],correct:1,explain:'"Esdras era um escriba versado na lei de Moisés... tinha disposto o seu coração a esquadrinhar a lei do Senhor, a cumpri-la e a ensinar os seus estatutos."',ref:'Esdras 7:6,10'},
  {type:'mc',q:'A frase "O Senhor é meu pastor" está em qual salmo?',opts:['Salmo 1','Salmo 22','Salmo 23','Salmo 91'],correct:2,explain:'O Salmo 23, escrito por Davi, ex-pastor de ovelhas, começa com esta metáfora central do cuidado de Deus — um dos textos bíblicos mais memorados.',ref:'Salmo 23:1'},
  {type:'mc',q:'Qual cidade foi destruída por enxofre e fogo por causa da perversidade de seus habitantes?',opts:['Nínive','Babilônia','Sodoma e Gomorra','Jericó'],correct:2,explain:'Gênesis 19 — Deus destruiu Sodoma e Gomorra com enxofre e fogo. Ló e suas filhas escaparam; a esposa olhou para trás e se tornou estátua de sal.',ref:'Gênesis 19:24-26'},
  {type:'mc',q:'Qual carta do NT adverte contra o amor ao dinheiro, chamando-o de raiz de todos os males?',opts:['Tiago','Hebreus','1 Timóteo','1 Coríntios'],correct:2,explain:'"O amor ao dinheiro é a raiz de todos os males." (1 Tm 6:10). Nota: não é o dinheiro em si, mas o amor a ele que é perigoso.',ref:'1 Timóteo 6:10'},
  {type:'mc',q:'Qual evento encerrou o período de 400 anos de silêncio profético antes de João Batista?',opts:['A vinda de Esdras do cativeiro','O nascimento de João Batista e o ministério de Zacarias','A construção do segundo templo','A aliança dos Macabeus'],correct:1,explain:'Após Malaquias (aprox. 430 a.C.), não houve profeta em Israel por cerca de 400 anos. João Batista encerrou esse silêncio como precursor do Messias.',ref:'Malaquias 4:5 / Lucas 1:11-17'},
  {type:'mc',q:'Em qual rio foi batizado Jesus?',opts:['Nilo','Eufrates','Jordão','Quebar'],correct:2,explain:'João Batista batizava no rio Jordão, a leste de Jerusalém. Jesus foi a ele e foi batizado no Jordão, onde o Espírito desceu como pomba.',ref:'Mateus 3:13'},
  {type:'mc',q:'Quantas viagens missionárias Paulo realizou relatadas no livro de Atos?',opts:['1','2','3','4'],correct:2,explain:'O livro de Atos registra três grandes viagens missionárias de Paulo antes de sua viagem final a Roma como prisioneiro.',ref:'Atos 13-14 / 15-18 / 18-21'},
  {type:'mc',q:'Quem era o pai de João Batista?',opts:['José','Zacarias','Simão','Cleofas'],correct:1,explain:'Zacarias era sacerdote idoso da ordem de Abias. O anjo Gabriel anunciou que ele e Isabel teriam um filho chamado João, cheio do Espírito Santo.',ref:'Lucas 1:5-13'},
  {type:'mc',q:'Qual é o significado do nome "Israel"?',opts:['Filho de Deus','Aquele que luta com Deus e prevalece','Povo escolhido','Terra santa'],correct:1,explain:'"Não te chamarás mais Jacó, mas Israel; porque lutaste com Deus e com os homens e prevaleceste." O nome marcou a transformação de Jacó.',ref:'Gênesis 32:28'},
  {type:'mc',q:'Qual era a profissão de Lucas, autor do terceiro Evangelho?',opts:['Pescador','Médico','Cobrador de impostos','Carpinteiro'],correct:1,explain:'"Lucas, o médico amado" — Paulo o chama assim em Colossenses 4:14. Seu vocabulário técnico médico é evidente em seu Evangelho.',ref:'Colossenses 4:14'},
  {type:'mc',q:'Qual livro bíblico contém o Cântico de Débora, um dos textos mais antigos da Bíblia?',opts:['Números','Josué','Juízes','Rute'],correct:2,explain:'Juízes 5 preserva o Cântico de Débora, celebrando a vitória sobre Sísara. É considerado um dos textos hebraicos mais antigos, com características poéticas arcaicas.',ref:'Juízes 5:1-31'},
  {type:'mc',q:'Qual é o primeiro versículo da Bíblia?',opts:['"Toda Escritura é inspirada por Deus."','"No princípio era o Verbo."','"No princípio criou Deus os céus e a terra."','"O Senhor é meu pastor."'],correct:2,explain:'"No princípio criou Deus os céus e a terra" — Gênesis 1:1 é a abertura das Escrituras, estabelecendo Deus como Criador soberano de tudo.',ref:'Gênesis 1:1'},
  {type:'mc',q:'Qual foi o pecado de Uzias que o fez ser atacado de lepra?',opts:['Idolatria','Usurpar o papel do sacerdote queimando incenso no templo','Aliança com a Assíria','Matar profetas'],correct:1,explain:'O rei Uzias, orgulhoso por seu poder, entrou no templo para queimar incenso — papel exclusivo dos sacerdotes. Deus o feriu com lepra imediatamente.',ref:'2 Crônicas 26:16-19'},
  {type:'mc',q:'Qual é o livro mais longo do NT?',opts:['Mateus','João','Atos','Lucas'],correct:3,explain:'O Evangelho de Lucas é o maior livro do NT em extensão, seguido de perto pelo livro de Atos. Juntos formam a maior obra de um único autor no NT.',ref:'Evangelho de Lucas'},
  {type:'mc',q:'Qual parábola Jesus contou para ilustrar quem é o próximo?',opts:['O Filho Pródigo','O Semeador','O Bom Samaritano','Os Talentos'],correct:2,explain:'Para responder "quem é o meu próximo?" Jesus narrou a história de um homem espancado, ignorado por sacerdote e levita, mas socorrido por um samaritano.',ref:'Lucas 10:30-37'},
  {type:'mc',q:'Qual profeta disse "Cria em mim, ó Deus, um coração puro"?',opts:['Isaías','Salomão','Davi','Asafe'],correct:2,explain:'Salmo 51 é o salmo de arrependimento de Davi após ser confrontado por Natã sobre o pecado com Bate-Seba. "Cria em mim um coração puro, ó Deus" (v.10).',ref:'Salmo 51:10'},
  {type:'mc',q:'Quantos livros o Novo Testamento possui?',opts:['25','27','29','30'],correct:1,explain:'O cânon do NT tem 27 livros: 4 Evangelhos, Atos, 13 epístolas paulinas, 8 epístolas gerais (Tiago a Judas) e Apocalipse.',ref:'Cânon NT'},
],
teologo:[
  {type:'mc',q:'Quem foi Eúde e qual detalhe físico foi decisivo para matar o rei Eglom de Moabe?',opts:['Era canhoto e escondeu a espada do lado direito','Era manco, usou uma lança longa','Era cego e atacou pela voz','Era mudo e usou sinais para distrair'],correct:0,explain:'Eúde, filho de Gera, da tribo de Benjamim, era canhoto. Quando os guardas revistaram para entregar o tributo, não sentiram a espada do lado direito — o lado incomum. Ele a enfiou no ventre de Eglom que era muito gordo — a gordura fechou sobre a lâmina.',ref:'Juízes 3:15-22'},
  {type:'mc',q:'O que Shamgar usou para matar 600 filisteus, tornando-se um dos juízes mais obscuros de Israel?',opts:['Uma aguilhada — estaca de conduzir bois','Um arco com flechas de fogo','Uma pedra de funda','Uma espada de dois gumes'],correct:0,explain:'Shamgar, filho de Anate, matou 600 filisteus com uma aguilhada (vara de conduzir bois). Tem apenas um versículo dedicado a ele. Depois de Eúde, ele também salvou Israel — e Débora o menciona em seu cântico.',ref:'Juízes 3:31; 5:6'},
  {type:'mc',q:'Qual foi o destino dos 70 filhos de Gideão em Ofrá, e quem foi o único sobrevivente?',opts:['Foram mortos sobre uma pedra por Abimeleque; sobreviveu Jotão','Foram exilados na Síria; sobreviveu Abiézer','Foram assassinados por filisteus; sobreviveu Peniás','Morreram de praga; sobreviveu Zalmuna'],correct:0,explain:'Abimeleque, filho de uma concubina de Gideão, alugou homens com 70 siclos de prata e matou 70 irmãos seus sobre uma única pedra em Ofrá. Jotão, o mais novo, se escondeu e fugiu. Depois pronunciou a famosa fábula das árvores do monte Gerizim.',ref:'Juízes 9:5-7'},
  {type:'mc',q:'O que Jotão profetizou na fábula das árvores depois que seus irmãos foram mortos por Abimeleque?',opts:['Que fogo sairia de Abimeleque para consumir Siquém, e de Siquém para consumir Abimeleque','Que Israel seria destruído pelos inimigos','Que Deus levantaria um novo juiz do deserto','Que a linhagem de Gideão seria restaurada'],correct:0,explain:'Jotão subiu ao monte Gerizim e gritou: que fogo saia de Abimeleque e consuma Siquém, e fogo de Siquém consuma Abimeleque. A profecia se cumpriu literalmente: Abimeleque destruiu Siquém com sal, e depois morreu vergonhosamente em Tebes.',ref:'Juízes 9:20,57'},
  {type:'mc',q:'Qual mulher matou Abimeleque enquanto ele atacava a torre de Tebes, e qual foi a última ação de Abimeleque?',opts:['Uma mulher anônima jogou uma mó sobre sua cabeça; ele pediu ao escudeiro que o traspassasse','Débora cravou uma lança; ele pediu misericórdia','Jael o envenenou; ele tentou fugir','A filha do rei jogou fogo; ele caiu da muralha'],correct:0,explain:'Uma mulher anônima jogou um fragmento de pedra de mó sobre a cabeça de Abimeleque e lhe rachei o crânio. Ele, imediatamente, mandou seu escudeiro traspassá-lo com a espada — para não se dizer que morreu pela mão de uma mulher. Assim se cumpriu a profecia de Jotão.',ref:'Juízes 9:53-54'},
  {type:'mc',q:'Qual foi o voto insensato de Jefté antes da batalha contra os amonitas, e quem saiu primeiro de sua casa?',opts:['Prometeu oferecer em holocausto o que saísse de sua porta; sua filha única saiu dançando','Prometeu não comer até a vitória; sua esposa saiu primeiro','Prometeu construir um altar; seus servos saíram','Prometeu dar metade dos espólios; seu filho saiu'],correct:0,explain:'Jefté prometeu que ofereceria ao Senhor em holocausto o que primeiro saísse de sua casa. Sua filha única saiu ao encontro dele com pandeiros e danças. Ele rasgou as vestes. Ela pediu dois meses para chorar sua virgindade nas montanhas antes que o voto se cumprisse.',ref:'Juízes 11:31-38'},
  {type:'mc',q:'Qual palavra os gileaditas usaram para identificar os efraimitas na passagem do Jordão, matando 42.000?',opts:['Shibbolet/Sibbolet','Betel','Calebá','Maanaim'],correct:0,explain:'Os gileaditas pediam que cada fugitivo dissesse "Shibbolet". Os efraimitas pronunciavam "Sibbolet" (não conseguiam fazer o som sh). Assim eram identificados e mortos ali mesmo na passagem do Jordão. 42.000 efraimitas morreram dessa forma.',ref:'Juízes 12:5-6'},
  {type:'mc',q:'Qual foi o anjo anúncio do nascimento de Sansão, e qual era a instrição dada à sua mãe antes do nascimento?',opts:['Um anjo disse que não deveria beber vinho nem comer coisa imunda; a criança seria nazireu desde o ventre','Gabriel disse que ela não deveria comer peixe nem beber vinho; a criança seria sacerdote','O Espírito disse que comesse só mel e pão; a criança seria profeta','Deus mesmo apareceu dizendo que ela ficasse em silêncio; a criança seria rei'],correct:0,explain:'O anjo do Senhor apareceu à mulher estéril de Manoá: não bebesses vinho nem licor, nem comesses coisa imunda — pois conceberás um filho. Nenhuma navalha tocaria sua cabeça, pois ele seria nazireu de Deus desde o ventre. Ela seria quem contou ao marido.',ref:'Juízes 13:3-5'},
  {type:'mc',q:'O que aconteceu com Sansão quando ele matou 30 homens de Ascalom para pagar a aposta da charada?',opts:['Seu sogro deu sua esposa ao amigo de Sansão — o paraninfo','Sua esposa o perdoou e voltou para ele','Sansão foi preso pelos filisteus imediatamente','O rei filisteu o condenou à morte'],correct:0,explain:'Quando Sansão voltou ao pagamento, descobriu que seu sogro havia dado sua esposa ao paraninfo — o amigo que o havia acompanhado. O sogro justificou dizendo que pensou que Sansão a odiava. Isso desencadeou o ciclo de vinganças que incluiu raposas com archotes e 1.000 mortos com maxilar de jumento.',ref:'Juízes 15:1-2'},
  {type:'mc',q:'Com o que Sansão matou 1.000 filisteus no lugar chamado Ramate-Lehi, e o que aconteceu depois?',opts:['Com a queixada de um jumento; em seguida Deus fez brotar água de um dente','Com uma espada achada no campo; em seguida Deus abriu um poço','Com pedras do rio; em seguida um anjo o alimentou','Com um osso de boi; em seguida foi para Hebrom'],correct:0,explain:'Sansão achou uma queixada de jumento fresca e matou mil filisteus. Chamou o lugar de Ramate-Lehi (colina do maxilar). Com sede extrema, clamou a Deus: "Tu deste esta grande vitória... e eu morrerei de sede?" Deus rasgou o solo e saiu água do próprio dente do maxilar.',ref:'Juízes 15:15-19'},
  {type:'mc',q:'Qual foi a verdadeira fonte da força de Sansão conforme a narrativa de Juízes?',opts:['O cabelo era o símbolo do voto nazireu — o poder vinha do Espírito de Deus enquanto o voto era honrado','A unção especial passada por seu pai Manoá','Um anel de ouro dado pelo anjo no nascimento','A força era natural, não sobrenatural'],correct:0,explain:'O cabelo não era a fonte mágica da força — era o símbolo visível do voto nazireu. Quando foi cortado, o Espírito do Senhor se afastou dele. A força vinha do Espírito de Deus em cumprimento do chamado nazireu. Quando o cabelo cresceu de novo e ele clamou, o Espírito voltou.',ref:'Juízes 16:17-20,28'},
  {type:'mc',q:'Qual foi o nome do pai de Rute e qual o detalhe que mostra a profundidade de sua lealdade a Noemi?',opts:['Seu pai era Elimeléque; ela recusou riqueza para ficar com Noemi','Rute não tinha pai vivo; escolheu Noemi por dívida de gratidão','Ela não tem pai nomeado; disse "onde tu morreres morrerei eu" — uma declaração de aliança total','Seu pai era Boaz; foi um casamento arranjado desde criança'],correct:2,explain:'Rute não tem pai identificado no texto. A fala de Rute a Noemi é uma das mais belas declarações de aliança da Bíblia: "Para onde tu deres, darei; onde tu ficares, ficarei; teu povo será meu povo e teu Deus será meu Deus. Onde tu morreres, morrerei". É modelo de hesed — amor fiel de aliança.',ref:'Rute 1:16-17'},
  {type:'mc',q:'O que era o "resgate do parente mais próximo" (goel) na lei de Israel, e como isso se aplica à história de Rute?',opts:['Era o dever do parente próximo de redimir terras, libertar escravos e levantar nome ao morto pelo casamento','Era o direito do primogênito de herdar os bens do pai','Era o sistema de dízimos recolhidos pelo sacerdote da família','Era a obrigação de vingar o sangue do parente morto'],correct:0,explain:'O goel (redentor/parente resgatador) devia: resgatar terras vendidas por necessidade, libertar parentes escravizados, e no casamento de levirato, levantar nome ao morto casando com a viúva. Boaz era parente de Elimeleque. O parente mais próximo desistiu — e Boaz a redimiu, tornando-se tipo de Cristo Redentor.',ref:'Rute 3:9; 4:9-10; Levítico 25:25'},
  {type:'mc',q:'Qual foi o gesto simbólico pelo qual o parente mais próximo cedeu o direito de redenção a Boaz em Rute 4?',opts:['Tirou a sandália e a deu a Boaz diante dos anciãos na porta','Partiu um pão e repartiu com Boaz diante das testemunhas','Escreveu seu nome numa pedra e a quebrou','Ungiu Boaz com azeite na testa'],correct:0,explain:'O parente mais próximo tirou sua sandália e a deu a Boaz — costume antigo em Israel para confirmar uma transação de resgate ou troca de direito. Era feito publicamente na porta da cidade diante de testemunhas. Eles chamavam isso de "o testemunho em Israel".',ref:'Rute 4:7-8'},
  {type:'mc',q:'Quantos dias Elias andou no deserto depois de ser alimentado pelo anjo, até chegar ao monte Horebe?',opts:['7 dias','20 dias','40 dias','100 dias'],correct:2,explain:'O anjo do Senhor tocou Elias duas vezes sob o zimbro e disse: "levanta e come, porque o caminho é longo demais para ti". Elias levantou, comeu e bebeu e, com a força daquela comida, andou quarenta dias e quarenta noites até Horebe, o monte de Deus.',ref:'1 Reis 19:7-8'},
  {type:'mc',q:'O que Deus disse a Elias que havia reservado em Israel que nunca se curvara a Baal?',opts:['500 guerreiros fiéis','1.000 sacerdotes escondidos','7.000 pessoas','Uma geração inteira de jovens'],correct:2,explain:'Quando Elias disse "só eu fiquei, e buscam a minha vida", Deus respondeu: "Eu reservei para mim sete mil em Israel — todos os joelhos que não se dobraram a Baal, e todas as bocas que não o beijaram." Um remanescente invisível que Elias desconhecia.',ref:'1 Reis 19:18'},
  {type:'mc',q:'Quais eram os três que Elias deveria ungir segundo a comissão que recebeu em Horebe?',opts:['Hazael como rei da Síria, Jeú como rei de Israel e Eliseu como profeta','Eliseu como profeta, Joás como rei de Israel e Naum como sacerdote','Jeú como rei de Israel, Josias como rei de Judá e Isaías como profeta','Elias deveria ungir apenas Eliseu e os demais seriam por Deus'],correct:0,explain:'Na caverna do Horebe, Deus comissionou Elias a ungir três: Hazael como rei da Síria, Jeú filho de Ninsi como rei sobre Israel, e Eliseu filho de Safate como profeta em seu lugar. Quem escapar da espada de Hazael, Jeú o matará; quem escapar de Jeú, Eliseu o matará.',ref:'1 Reis 19:15-17'},
  {type:'mc',q:'O que aconteceu na vinha de Nabote e qual profecia Elias pronunciou sobre Acabe e Jezabel?',opts:['Jezabel ordenou a morte de Nabote por blasfêmia falsa; Elias profetizou que cães lamberiam o sangue de Acabe e comeriam Jezabel junto ao muro de Jezreel','Acabe comprou a vinha; Elias profetizou a queda da dinastia','Nabote vendeu a vinha; Elias profetizou sobre a dispersão das tribos','Acabe roubou diretamente; Elias profetizou sete anos de seca'],correct:0,explain:'Jezabel forjou acusações de blasfêmia contra Nabote, que foi apedrejado. Acabe tomou a vinha. Elias foi ao encontro dele e profetizou: no lugar onde os cães lamberam o sangue de Nabote, lamberão o teu sangue. E de Jezabel: os cães a comerão junto ao muro de Jezreel.',ref:'1 Reis 21:13,19,23'},
  {type:'mc',q:'Como morreu o rei Acabe, e como a profecia de Elias se cumpriu literalmente?',opts:['Foi morto por uma flecha aleatória na batalha de Ramote; seu sangue encheu o carro de guerra e os cães o lamberam no tanque de Samaria','Foi morto por Jeú; os cães o comeram em Jezreel','Morreu de doença; sua casa foi destruída por Hazael','Foi morto em batalha; seu sangue foi derramado no vale de Jezreel'],correct:0,explain:'Acabe disfarçado foi atingido ao acaso por uma flecha entre as juntas da armadura. Ficou de pé no carro até morrer ao anoitecer. Seu sangue escorreu para o fundo do carro. Lavaram o carro no tanque de Samaria, e os cães lamberam o sangue enquanto as prostitutas se banhavam — conforme a palavra do Senhor.',ref:'1 Reis 22:34-38'},
  {type:'mc',q:'Como Elizeu recebeu a porção dupla do espírito de Elias e qual era a condição?',opts:['Precisava ver Elias subindo — se visse, receberia; se não, não','Precisava jejuar 40 dias no lugar de Elias','Precisava lavar-se 7 vezes no Jordão como Naamã','Precisava permanecer no monte Carmelo em oração'],correct:0,explain:'Elias disse: "Pediste coisa difícil. Se me vires quando eu for tomado de ti, assim será para ti; se não, não será assim." Eliseu viu o carro de fogo, os cavalos de fogo e Elias subindo num redemoinho. Pegou o manto que havia caído, bateu nas águas do Jordão — e elas se dividiram.',ref:'2 Reis 2:10-14'},
  {type:'mc',q:'O que Eliseu fez quando os meninos de Betel o escarneceram chamando-o de "cabeça careca", e quantos foram feridos?',opts:['Amaldiçoou-os no nome do Senhor; duas ursas saíram e dilaceraram 42 meninos','Orou e eles ficaram cegos; 30 meninos','Bateu o manto e uma fenda os engoliu; 70 meninos','Não fez nada; eram apenas crianças segundo o texto'],correct:0,explain:'Eliseu virou-se, olhou para eles e os amaldiçoou em nome do Senhor: "Subi, cabeça careca!" Duas ursas saíram da floresta e dilaceraram 42 meninos. O episódio mostra que zombar do profeta de Deus era zombar da autoridade divina — não era simples brincadeira infantil.',ref:'2 Reis 2:23-24'},
  {type:'mc',q:'O que aconteceu com os ossos de Eliseu após sua morte, registrado em 2 Reis 13?',opts:['Foram levados para Jerusalém e honrados no Templo','Desapareceram como os de Moisés','Um morto tocou seus ossos ao ser lançado no sepulcro e ressuscitou imediatamente','Foram guardados numa arca de ouro como os de José'],correct:2,explain:'Enquanto sepultavam um homem, avistaram uma banda de moabitas e lançaram o morto no sepulcro de Eliseu. Quando os ossos do morto tocaram os ossos de Eliseu, ele reviveu e ficou de pé. É o único milagre póstumo registrado no Antigo Testamento.',ref:'2 Reis 13:21'},
  {type:'mc',q:'Qual detalhe específico sobre Naamã, o general sírio curado por Eliseu, revela sua condição paradoxal segundo 2 Reis 5:1?',opts:['Era valoroso mas leproso — Deus dera vitória por sua mão mas ele estava doente','Era rico mas de família escrava','Era fiel a Deus mas servia a um rei ímpio','Era israelita mas vivia na Síria desde criança'],correct:0,explain:'O texto diz: "Naamã, general do exército do rei da Síria, era grande homem e de alta estima diante do seu senhor... era também valente guerreiro; mas era leproso." A tensão é deliberada: Deus havia dado vitória pela sua mão, mas ele carregava lepra. A cura veio de uma serva israelita escrava.',ref:'2 Reis 5:1'},
  {type:'mc',q:'Qual foi a reação de Naamã quando Eliseu mandou que ele se lavasse 7 vezes no Jordão?',opts:['Ficou furioso — esperava um ritual mais impressionante e achava os rios da Síria superiores','Obedeceu imediatamente com fé','Pediu um sinal primeiro para confirmar','Mandou um servo fazer no seu lugar'],correct:0,explain:'Naamã ficou irado: esperava que o profeta viesse, invocasse o nome do Senhor, pusesse a mão sobre o lugar e curasse. Disse: "Porventura não são melhores o Abana e o Farfar, rios de Damasco, do que todas as águas de Israel?" Seus servos o convenceram com sabedoria: "Se fosse coisa difícil..."',ref:'2 Reis 5:11-13'},
  {type:'mc',q:'O que Geazi, servo de Eliseu, fez depois da cura de Naamã, e qual foi o seu castigo?',opts:['Correu atrás de Naamã e mentiu para obter prata e roupas; recebeu a lepra de Naamã para sempre','Roubou o sacrifício de gratidão de Naamã; foi exilado','Contou o segredo da força de Eliseu aos sírios; ficou mudo','Desobedeceu uma ordem de Eliseu; perdeu o cargo'],correct:0,explain:'Geazi correu atrás de Naamã dizendo que Eliseu havia pedido um talento de prata e duas mudas de roupa para dois filhos de profetas. Naamã deu dois talentos. Quando Geazi voltou, Eliseu disse: "Não foi meu espírito contigo?" E a lepra de Naamã se transferiu a Geazi e à sua descendência para sempre.',ref:'2 Reis 5:20-27'},
  {type:'mc',q:'Qual é o significado profético do sinal que Isaías deu ao rei Acaz em Isaías 7:14, e qual era o contexto histórico imediato?',opts:['Israel e Síria ameaçavam Jerusalém; Isaías disse que a virgem (almah) conceberá e antes de a criança discernir bem do mal, os dois reis seriam destruídos','Era uma promessa para após o exílio babilônico; Acaz pediu o sinal','Era uma profecia exclusivamente messiânica sem aplicação imediata','Acaz pediu o sinal após a derrota militar'],correct:0,explain:'A coalização de Rezim (Síria) e Peca (Israel) ameaçava Jerusalém. Acaz recusou pedir sinal. Isaías deu o sinal de Deus: almah (jovem/virgem) conceberá e chamará Emanuel. Antes da criança saber rejeitar o mal, as terras dos dois reis seriam abandonadas — cumprimento histórico imediato e tipo messiânico futuro.',ref:'Isaías 7:1,14,16'},
  {type:'mc',q:'Qual profecia de Isaías descreve um servo sofredor que "foi ferido pelas nossas transgressões" e é identificado no NT com Jesus?',opts:['Isaías 40:3','Isaías 42:1-4','Isaías 52:13 — 53:12','Isaías 61:1-2'],correct:2,explain:'Isaías 52:13–53:12 é o quarto Cântico do Servo Sofredor. Descreve alguém desprezado, ferido pelas transgressões do povo, levado como cordeiro ao matadouro, sem beleza, cujas chagas nos curam. Filipe usou este texto para evangelizar o etíope. É a profecia messiânica mais citada no NT.',ref:'Isaías 53:5; Atos 8:32-35'},
  {type:'mc',q:'Qual profecia de Miqueias menciona Belém pelo nome como origem do governador de Israel, e qual frase aponta para sua pré-existência eterna?',opts:['Miqueias 5:2 — "cujas saídas são desde os tempos antigos, desde os dias da eternidade"','Miqueias 4:1 — o Senhor reinará em Sião','Miqueias 6:8 — praticar justiça e andar humildemente','Miqueias 7:18 — Deus que perdoa iniquidade'],correct:0,explain:'Miqueias 5:2: "Tu, Belém Efrata, pequena entre os milhares de Judá, de ti me sairá o que há de reinar em Israel; cujas saídas são desde os tempos antigos, desde os dias da eternidade." Dois aspectos: origem humana em Belém (nascimento) e origem divina eterna. Citada pelos escribas em Mateus 2:6.',ref:'Miqueias 5:2; Mateus 2:6'},
  {type:'mc',q:'O que o profeta Amós disse quando Amazias, sacerdote de Betel, ordenou que parasse de profetizar?',opts:['Disse: "Não sou profeta nem filho de profeta, sou pastor e cultivador de sicômoros — mas o Senhor me tirou para profetizar"','Saiu em silêncio respeitando a autoridade sacerdotal','Convocou o povo para um confronto como Elias no Carmelo','Recitou a lei de Moisés contra os sacerdotes ímpios'],correct:0,explain:'Amazias mandou Amós ir para Judá. Amós respondeu: "Não sou profeta, nem filho de profeta; sou pastor e cultivador de sicômoros. Mas o Senhor me tomou de detrás do rebanho e disse: vai, profetiza ao meu povo Israel." Era de Tecoa em Judá mas profetizava no reino do Norte.',ref:'Amós 7:14-15'},
  {type:'mc',q:'O que Oseias foi ordenado a fazer com Gômer depois que ela o abandonou pelos amantes, e qual era o preço?',opts:['Foi instruído a ignorá-la como Deus ignorou Israel','Foi instruído a casá-la com outro e aguardar seu retorno','Foi instruído a comprá-la de volta por 15 siclos de prata e uma homer e meia de cevada — símbolo do amor de Deus por Israel infiel','Foi instruído a curá-la de uma maldição que a afligia'],correct:2,explain:'Deus disse a Oseias: "Vai, ama ainda a mulher amada de seu amigo e adúltera, como o Senhor ama os filhos de Israel." Oseias a comprou por 15 siclos de prata e uma homer e meia de cevada. Disse: ficarás comigo muitos dias; não serás de nenhum homem — símbolo do Israel disciplinado mas amado.',ref:'Oseias 3:1-3'},
  {type:'mc',q:'O que o profeta Ezequiel fez por 390 dias e depois por 40 dias como sinal profético para Israel e Judá?',opts:['Ficou mudo e fez sinais com as mãos','Jejuou sem comer carne nem beber vinho','Deitou sobre o lado esquerdo (390 dias — iniquidade de Israel) e depois sobre o direito (40 dias — iniquidade de Judá), carregando a iniquidade das nações','Andou descalço e com roupas rasgadas pelas ruas'],correct:2,explain:'Deus mandou Ezequiel deitar sobre o lado esquerdo por 390 dias carregando a iniquidade da casa de Israel — cada dia por um ano. Depois sobre o lado direito por 40 dias carregando a iniquidade de Judá. Com uma corda para não virar, e ração de comida pesada diariamente — era o cerco de Jerusalém encenado.',ref:'Ezequiel 4:4-8'},
  {type:'mc',q:'Qual profeta foi proibido de lamentar a morte de sua esposa como sinal para Israel, e o que isso representava?',opts:['Jeremias — representava a destruição do Templo','Oseias — representava o abandono de Israel por Deus','Ezequiel — a morte da esposa ("desejo dos seus olhos") representava a destruição do Templo que era o desejo dos olhos de Israel','Zacarias — representava o fim do sacerdócio levítico'],correct:2,explain:'Deus disse a Ezequiel: "Vou tirar de ti o desejo dos teus olhos — não chores, não te lamentes, não derrame lágrimas." Ela morreu à tarde. Ezequiel fez conforme ordenado. O povo perguntou o que significava. Era sinal: quando o Templo — o desejo dos olhos de Israel — fosse destruído, eles também não deveriam lamentar.',ref:'Ezequiel 24:15-24'},
  {type:'mc',q:'Na visão do vale dos ossos secos de Ezequiel 37, o que os ossos representam e em qual ordem a restauração acontece?',opts:['Representam as nações; restauração é simultânea','Representam os mortos ressurretos no fim dos tempos; não há ordem','Representam Israel; primeiro os ossos se juntam, depois nervos e carne, depois pele — e por último o espírito (ruah) entra','Representam os exilados; o Espírito entra primeiro'],correct:2,explain:'Os ossos = "toda a casa de Israel" (v.11). A sequência é precisa: os ossos se aproximam uns dos outros, nervos e carne os cobrem, pele os recobre — mas não havia espírito neles. Então Deus manda Ezequiel profetizar ao vento (ruah) que venha soprar — e eles viveram. Processo: restauração física depois spiritual.',ref:'Ezequiel 37:1-14'},
  {type:'mc',q:'Qual profeta menor tem apenas 21 versículos e trata exclusivamente do julgamento de Edom por se alegrar com a queda de Jerusalém?',opts:['Naum','Habacuque','Sofonias','Abdias'],correct:3,explain:'Abdias é o livro mais curto do AT com apenas 1 capítulo e 21 versículos. Profetiza contra Edom (descendentes de Esaú, irmão de Jacó) que se alegraram quando Babilônia destruiu Jerusalém, bloquearam fugitivos e entregaram sobreviventes. "Como fizeste, assim te farão... tua recompensa voltará sobre tua cabeça."',ref:'Abdias 1:10-14'},
  {type:'mc',q:'O que o profeta Naum profetizou e qual era seu contexto histórico em relação ao livro de Jonas?',opts:['Profetizou a queda de Babilônia, 200 anos após Jonas pregar lá','Profetizou a restauração de Israel após o exílio assírio','Profetizou a queda de Nínive — cerca de 150 anos após o arrependimento de Nínive em Jonas, quando a cidade voltou ao mal','Profetizou contra Moabe e Edom no tempo de Josias'],correct:2,explain:'Jonas pregou em Nínive (capital da Assíria) e a cidade se arrependeu. 150 anos depois, Naum profetiza sua destruição inevitável — a cidade voltou ao extremo da crueldade. "Nínive é destruída! Quem chorará por ela?" Nínive caiu em 612 a.C. para babilônios e medos — exatamente como profetizado.',ref:'Naum 1:1; 3:7; Jonas 3:10'},
  {type:'mc',q:'Qual é o "diálogo" único no livro de Habacuque e o que o torna estruturalmente diferente de outros livros proféticos?',opts:['É uma série de visões sem diálogo real','É uma liturgia de lamento usada no Templo','O profeta questiona Deus duas vezes e Deus responde duas vezes — uma conversa teológica sobre injustiça e soberania divina','Habacuque profetiza exclusivamente em parábolas'],correct:2,explain:'Habacuque é único: o profeta faz perguntas a Deus e Deus responde. 1ª pergunta: por que toleras a violência em Judá? Deus: levanto os caldeus. 2ª pergunta: como usar um povo mais ímpio para punir Judá? Deus: a sua alma se ensoberba; mas o justo viverá pela sua fé (2:4). Termina num hino de rendição total.',ref:'Habacuque 1:2-4; 2:1-4; 3:17-19'},
  {type:'mc',q:'Qual versículo de Habacuque 2:4 é citado três vezes no NT por Paulo e no livro de Hebreus e se tornou central na Reforma?',opts:['"Deus nunca abandona seu servo na hora da angústia"','"Porque o Senhor está no seu santo templo; cale-se diante dele toda a terra"','"O justo viverá pela sua fé (emunah)"','"Ainda que a figueira não floresça..."'],correct:2,explain:'"O justo pela sua fé (emunah — fidelidade/fé) viverá." Citado em Romanos 1:17 (justificação pela fé), Gálatas 3:11 (contraste com a lei) e Hebreus 10:38 (perseverança pela fé). Foi o versículo que iluminou Lutero na torre e desencadeou a Reforma Protestante.',ref:'Habacuque 2:4; Romanos 1:17; Gálatas 3:11'},
  {type:'mc',q:'O que aconteceu na noite em que o jovem Rute (Eutico) caiu da janela do terceiro andar enquanto Paulo pregava em Trôade?',opts:['Paulo orou a distância e ele se curou sem ter morrido','Lucas o tratou medicamente e ele sobreviveu','Eutico caiu morto; Paulo desceu, deitou-se sobre ele, abraçou-o e disse: "a vida está nele" — e o moço ressuscitou','Paulo continuou pregando e Eutico se recuperou sozinho pela manhã'],correct:2,explain:'Eutico (um jovem) estava sentado na janela do 3º andar ouvindo Paulo pregar até meia-noite. Caiu profundo sono, caiu lá de cima e foi levantado morto. Paulo desceu, se deitou sobre ele, o abraçou e disse: "Não vos perturbeis, pois a vida está nele." O moço ressuscitou e Paulo continuou pregando até o amanhecer.',ref:'Atos 20:9-12'},
  {type:'mc',q:'Quem era Areopagita, convertido no discurso de Paulo no Areópago de Atenas, e qual outra pessoa o acompanhou na fé?',opts:['Félix, o Areopagita, e sua concubina Drusila','Estéfanas, o Areopagita, e Fortunato','Dionísio, o Areopagita, e uma mulher chamada Dâmaris','Crispo, o areopagita, e sua família'],correct:2,explain:'Depois do discurso de Paulo sobre o "Deus desconhecido" e a ressurreição no Areópago, a maioria escarneceu. Mas alguns creram: Dionísio, o Areopagita, e uma mulher chamada Dâmaris, e outros com eles. Foi uma conversão pequena numericamente mas significativa — Dionísio era membro do prestigioso tribunal ateniense.',ref:'Atos 17:34'},
  {type:'mc',q:'O que Paulo revela sobre o "aguilhão na carne" em 2 Coríntios 12, quantas vezes pediu remoção e qual foi a resposta?',opts:['Uma doença nos olhos; pediu 7 vezes; Deus curou','Perseguições contínuas; pediu 40 vezes; Deus enviou um anjo','Um mensageiro de Satanás para o esbofetear; pediu 3 vezes; Deus disse: minha graça te basta, meu poder se aperfeiçoa na fraqueza','Oposição de falsos apóstolos; pediu uma vez; Deus prometeu destrui-los'],correct:2,explain:'Paulo descreve um "aguilhão na carne — mensageiro de Satanás para me esbofetear" dado para evitar que se exaltasse (após visões incontáveis). Rogou três vezes ao Senhor para que o removesse. A resposta: "A minha graça te basta, porque o meu poder se aperfeiçoa na fraqueza." Paulo então se gloriou em suas fraquezas.',ref:'2 Coríntios 12:7-9'},
  {type:'mc',q:'Qual é a diferença entre as palavras gregas "agape", "philia" e "eros" e como isso aparece no diálogo de Jesus com Pedro em João 21?',opts:['São sinônimos; a diferença é apenas estilística','Jesus usa eros no sentido espiritual; Pedro responde com agape','Jesus usa agape duas vezes e Pedro responde com philia; na terceira pergunta Jesus desce ao nível de philia de Pedro, o que comoveu Pedro','Não há diferença real no grego koiné do NT'],correct:2,explain:'Jesus pergunta duas vezes: "Me amas (agapas)?" Pedro responde: "Te amo (philo)". Na terceira vez Jesus usa "me amas (phileis)?" — desceu ao nível de Pedro. Pedro ficou triste não por ser a 3ª vez mas porque Jesus usou seu próprio termo, questionando até esse amor mais simples. É uma pedagogia de restauração.',ref:'João 21:15-17'},
  {type:'mc',q:'Qual é o significado do termo hebraico "hesed" e por que é considerado praticamente intraduzível?',opts:['Significa apenas "misericórdia" — é simples de traduzir','Significa "temor reverente" e é sinônimo de yirah','Combina amor, lealdade, bondade e fidelidade dentro do contexto de uma aliança — nenhuma palavra única em português captura isso','É o nome secreto de Deus revelado a Moisés'],correct:2,explain:'Hesed (חֶסֶד) é traduzido como misericórdia, bondade amorosa, amor fiel, graça. Mas nenhuma palavra capta a totalidade: é amor que age dentro de um compromisso de aliança — leal, ativo, sacrificial, imerecido. O Salmo 136 repete "ki le\'olam hasdo" (porque o seu hesed dura para sempre) em cada um dos 26 versículos.',ref:'Rute 1:8; Salmo 136; Êxodo 34:6-7'},
  {type:'mc',q:'Qual é a função do "Servo do Senhor" nos quatro Cânticos do Servo em Isaías e como eles se distinguem do restante do livro?',opts:['São poemas sobre Ciro, rei persa, libertador do exílio','São hinos litúrgicos sobre os sacerdotes levíticos','São quatro poemas (42:1-4; 49:1-6; 50:4-9; 52:13-53:12) descrevendo um servo misterioso cujo sofrimento vicário leva à salvação das nações','São visões do próprio Isaías sobre seu chamado profético'],correct:2,explain:'Os quatro Cânticos do Servo têm uma figura misteriosa distinta do Israel coletivo: chamado desde o ventre, unge para libertar, aprende pela obediência sofrida, e no quarto cântico sofre vicariamente pelos pecados de muitos. Filipe em Atos 8:32 usa o 4º para evangelizar o etíope explicando que é Jesus.',ref:'Isaías 42:1-4; 49:1-6; 50:4-9; 52:13—53:12'},
  {type:'mc',q:'O que é a "nova aliança" anunciada por Jeremias 31:31-34 e em que ela difere fundamentalmente da aliança do Sinai?',opts:['É idêntica à mosaica, apenas renovada após o exílio','É uma aliança só com os gentios, excluindo Israel','A lei será inscrita no coração e na mente, não em tábuas de pedra; todos conhecerão a Deus pessoalmente; os pecados serão perdoados e lembrados mais','É uma aliança condicional baseada no cumprimento da lei aperfeiçoada'],correct:2,explain:'Jeremias 31:31-34 anuncia a "nova aliança" (berit hadashah): não como a do Sinai que quebraram. A diferença: (1) lei interior — inscrita no coração; (2) conhecimento direto de Deus por todos; (3) perdão completo e definitivo dos pecados. Jesus na Última Ceia disse: "este cálice é a nova aliança no meu sangue."',ref:'Jeremias 31:31-34; Lucas 22:20; Hebreus 8:8-12'},
  {type:'mc',q:'O que aconteceu quando Jeremias ditou para Baraque as profecias em um rolo, e qual foi a reação do rei Jeoaquim?',opts:['Baraque leu no Templo e o povo se arrependeu; Jeoaquim jejuou','Jeoaquim rasgou o rolo mas mandou preservar uma cópia','O rolo foi lido no Templo, depois ao rei; Jeoaquim cortou colunas com canivete e jogou no braseiro; Deus mandou Jeremias escrever tudo de novo','Baraque foi preso e o rolo confiscado; Jeremias fugiu para o Egito'],correct:2,explain:'Baraque leu o rolo no Templo. Príncipes pediram que Jeremias e Baraque se escondessem. O rolo foi lido ao rei no inverno junto ao braseiro. À medida que Jeudi lia 3 ou 4 colunas, Jeoaquim cortava com um canivete e jogava no fogo — sem temor. Deus mandou Jeremias escrever tudo novamente acrescentando mais julgamentos.',ref:'Jeremias 36:23-32'},
  {type:'mc',q:'O que o rei Dario fez na noite em que Daniel foi lançado na cova dos leões, e o que disse ao encontrá-lo vivo de manhã?',opts:['Dormiu tranquilo confiando no Deus de Daniel','Enviou guardas durante a noite para monitorar','Passou a noite em jejum sem música e sem dormir; de manhã cedo correu à cova e clamou: Daniel, servo do Deus vivo, teu Deus a quem serves sempre foi capaz de te livrar?','Saiu da cidade para não ouvir os leões'],correct:2,explain:'O rei foi ao palácio, passou a noite em jejum, não levou instrumentos musicais, e o sono fugiu dele. De manhã muito cedo correu à cova e clamou com voz angustiada: "Daniel, servo do Deus vivo, o teu Deus, a quem serves sempre, foi capaz de te livrar dos leões?" Daniel respondeu vivo — o rei regozijou muito.',ref:'Daniel 6:18-23'},
  {type:'mc',q:'Qual é a visão de Daniel em Daniel 7 e o que são o "Ancião de Dias" e o "Filho do Homem" nela?',opts:['Uma visão de quatro reinos terrestres sem figuras celestes','São figuras dos arcanjos Miguel e Gabriel','O Ancião de Dias é Deus eterno em trono de fogo; o Filho do Homem vem sobre nuvens e recebe domínio eterno de todas as nações — figura que Jesus aplicou a si mesmo','O Ancião de Dias é Adão; o Filho do Homem é o povo de Israel'],correct:2,explain:'Daniel vê quatro bestas (reinos), depois o Ancião de Dias num trono de chamas com rios de fogo. O Filho do Homem vem sobre nuvens e recebe do Ancião domínio eterno que nunca passará. Jesus usou "Filho do Homem" como auto-designação preferida — uma afirmação velada de divindade e autoridade escatológica.',ref:'Daniel 7:9-14; Marcos 14:62'},
  {type:'mc',q:'O que é a "abominação da desolação" mencionada em Daniel 9:27, 11:31 e 12:11 e como Jesus a usa em Mateus 24?',opts:['É um símbolo genérico de idolatria no Israel antigo','É exclusivamente sobre Nabucodonosor em Jerusalém','É profecia de múltiplo cumprimento: historicamente em Antíoco IV Epifânio (168 a.C.) e futuramente como sinal da grande tribulação; Jesus diz: quando virdes a abominação... fujam para os montes','É a destruição do Templo em 70 d.C. sem aplicação futura'],correct:2,explain:'A abominação da desolação foi cumprida primeiro por Antíoco IV que colocou um altar a Zeus no Templo e sacrificou porco (168 a.C.). Em Mateus 24:15 Jesus diz: "quando virdes a abominação da desolação de que falou Daniel... (quem lê entenda) fujam para os montes." Aponta para um cumprimento escatológico futuro também.',ref:'Daniel 9:27; 11:31; Mateus 24:15'},
  {type:'mc',q:'Quais são as "70 semanas" de Daniel 9:24-27 e sobre o que elas tratam?',opts:['São 70 semanas literais de 7 dias — 490 dias de julgamento imediato','São períodos simbólicos sem cronologia real','São 70 heptadas (grupos de 7 anos = 490 anos) determinadas sobre Israel — para acabar com a transgressão, fazer expiação e trazer a justiça eterna, culminando no Messias','São 70 gerações até o fim do mundo'],correct:2,explain:'Gabriel explica: 70 semanas (shavuim — heptadas, grupos de 7) = 490 anos são determinadas sobre teu povo para: acabar transgressão, fazer expiação pelo pecado, trazer justiça eterna, cumprir visão e ungir o Santo dos Santos. A estrutura: 7+62+1 semanas, com o Messias chegando e sendo cortado após as 69.',ref:'Daniel 9:24-27'},
  {type:'mc',q:'O que Rispa, filha de Aiá, fez pelos corpos dos filhos e netos de Saul que foram entregues aos gibeonitas?',opts:['Ungiu os corpos com especiarias e os sepultou secretamente','Clamou ao rei Davi pela justiça imediatamente','Estendeu saco sobre a rocha desde o começo da ceifa até a chuva cair, impedindo aves e feras de tocá-los — vigília que durou meses','Fugi para fora de Israel com os corpos'],correct:2,explain:'Rispa, concubina de Saul, tomou saco e o estendeu sobre a rocha desde o começo da ceifa de cevada até que as chuvas do céu caíram sobre eles — meses. Impediu que as aves do céu os tocassem de dia e as feras do campo de noite. Quando Davi soube, foi buscar os ossos de Saul e Jônatas e deu sepultamento honroso a todos.',ref:'2 Samuel 21:10-14'},
  {type:'mc',q:'Qual foi o pecado de Davi no censo de Israel em 2 Samuel 24, e qual das três punições ele escolheu?',opts:['O censo era proibido por lei; Davi escolheu 7 anos de fome','O censo cobrou imposto proibido; Davi escolheu o exílio','Davi numerou o povo por orgulho militar (confiança em números, não em Deus); escolheu 3 dias de pestilência em vez de 3 anos de fome ou 3 meses de fuga','Davi incluiu estrangeiros no censo; escolheu a derrota militar'],correct:2,explain:'Joabe advertiu Davi mas ele insistiu. Depois ficou com o coração pesado. Deus deu três opções: 7 anos de fome, 3 meses de fuga dos inimigos, ou 3 dias de pestilência. Davi disse: "Caia eu nas mãos do Senhor (pestilência), porque as suas misericórdias são muitas; mas não caia nas mãos dos homens." 70.000 morreram.',ref:'2 Samuel 24:10-15'},
  {type:'mc',q:'Qual mulher sunamita reconheceu Eliseu como homem santo de Deus e preparou um aposento para ele em sua casa?',opts:['A viúva de Sarepta que alimentou Elias','A mulher de Jerubaal que escondeu Gideão','A mulher sunamita anônima — rica, que preparou cama, mesa, cadeira e candeeiro para Eliseu no telhado','Abigail, esposa de Nabal'],correct:2,explain:'A mulher sunamita (não nomeada) disse a seu marido: "Certamente este que sempre passa por nós é santo homem de Deus; façamos-lhe um pequeno aposento na parede com cama, mesa, cadeira e candeeiro." Em retribuição, Deus lhe deu um filho. Quando o filho morreu, Eliseu o ressuscitou.',ref:'2 Reis 4:9-10'},
  {type:'mc',q:'Qual é a distinção entre o Santo Lugar e o Santo dos Santos no Tabernáculo/Templo, e o que havia em cada um?',opts:['Santo Lugar: arca da aliança; Santos dos Santos: altar de incenso e menorá','Eram idênticos — a distinção era apenas de acesso','Santo Lugar: pias e lavatórios; Santos dos Santos: o trono de Deus visível','Santo Lugar: menorá, mesa dos pães da proposição, altar de incenso; Santos dos Santos: apenas a Arca da Aliança com os querubins acima'],correct:3,explain:'No Santo Lugar (lugar santo): o candelabro de ouro (menorá), a mesa dos pães da proposição (12 pães) e o altar de incenso. No Santo dos Santos (Qodesh HaQodashim): somente a Arca da Aliança coberta pelos dois querubins de ouro com o propiciatório. Separados pelo véu que se rasgou no momento da morte de Jesus.',ref:'Êxodo 26:33-35; 37:1-29; Mateus 27:51'},
  {type:'mc',q:'O que era o Dia da Expiação (Yom Kippur) em Levítico 16 e qual era o papel dos dois bodes no ritual?',opts:['Um bode era queimado e o outro era sacrificado no altar — ambos simbolizavam o mesmo','Ambos eram soltos — simbolizando o perdão duplo','Um bode ia para o povo e o outro para os sacerdotes','Um bode (pelo Senhor) era sacrificado como oferta pelo pecado; o outro (para Azazel — bode expiatório) tinha os pecados confessados sobre ele e era solto no deserto'],correct:3,explain:'Dois bodes: sobre um Arão lançava sorte "para o Senhor" — era sacrificado como oferta pelo pecado. Sobre o outro lançava sorte "para Azazel" — o sumo sacerdote confessava sobre sua cabeça todas as iniquidades de Israel e um homem designado o levava para o deserto. Dois aspectos da expiação: sacrifício e remoção do pecado.',ref:'Levítico 16:7-22'},
  {type:'mc',q:'Qual profecia de Zacarias 9:9 é cumprida na entrada de Jesus em Jerusalém e qual detalhe específico ela menciona?',opts:['"O rei virá em nuvens de glória para julgar a terra"','"Eu enviarei o meu mensageiro que preparará o caminho"','"Eis que o teu rei virá em poder e a sua voz como trovão"','"Alegra-te, ó filha de Sião; o teu rei vem a ti, justo e salvador, humilde e montado num jumento — num jumentinho, filho de jumenta"'],correct:3,explain:'Zacarias 9:9: "Regozijai-vos muito, ó filha de Sião; exultai, ó filha de Jerusalém; eis que o teu rei vem a ti, justo e Salvador, humilde, e montado sobre um jumento, sobre um jumentinho, filho de jumenta." Mateus 21:5 e João 12:15 citam explicitamente essa profecia na entrada triunfal. A humildade messiânica é central.',ref:'Zacarias 9:9; Mateus 21:5'},
  {type:'mc',q:'O que são os "30 siclos de prata" em Zacarias 11:12-13 e como Mateus os aplica a Judas?',opts:['Era o salário mensal de um profeta; Mateus não faz conexão direta','Era o preço do resgate de um prisioneiro; aplicado à libertação de Barrabás','Era uma oferta voluntária ao Templo; não tem relação com Judas','O pastor (Deus) foi avaliado em 30 siclos — preço de um escravo — e jogados na casa do Senhor para o oleiro; Mateus 27 diz que isso se cumpriu no dinheiro de Judas jogado no Templo e usado para o campo do oleiro'],correct:3,explain:'Em Zacarias 11 o pastor pede seu salário: 30 siclos — o preço de um escravo gored (Êxodo 21:32). Jogou-os na casa do Senhor, para o oleiro. Mateus 27:9-10 diz: então se cumpriu o dito por Jeremias (citando Zacarias): os 30 siclos jogados no Templo foram usados para comprar o campo do oleiro. Preço irrisório dado ao Messias.',ref:'Zacarias 11:12-13; Mateus 27:9-10'},
  {type:'mc',q:'Qual é o último versículo do Antigo Testamento (Malaquias 4:6) e por que é significativo na transição para o NT?',opts:['Promete a restauração do Templo antes do fim','Anuncia o fim do sacerdócio levítico e o início de um novo','Promete que Israel nunca mais será exilado','Promete enviar o profeta Elias que voltará o coração dos pais aos filhos — caso contrário, Deus virá e ferirá a terra de maldição'],correct:3,explain:'Malaquias 4:5-6: "Eis que eu vos enviarei o profeta Elias... ele tornará o coração dos pais para os filhos... para que eu não venha e fira a terra de maldição." O AT termina com uma promessa e uma ameaça — e com Elias. O anjo diz a Zacarias que João Batista virá "no espírito e poder de Elias" (Lucas 1:17).',ref:'Malaquias 4:5-6; Lucas 1:17'},
  {type:'mc',q:'Qual é o significado do batismo de João em contraste com o batismo cristão segundo os próprios evangelhos e Paulo?',opts:['São idênticos — João já batizava em nome da Trindade','O batismo de João era superior — vinha diretamente de Deus','João ensinava que seu batismo substituía a circuncisão','João batizava com água para arrependimento (sinal preparatório); Jesus batizaria com o Espírito Santo e fogo — Paulo em Atos 19 encontra discípulos que só conheciam o batismo de João e os batiza em nome de Jesus'],correct:3,explain:'João diz: "Eu vos batizo com água para arrependimento; mas aquele que vem depois de mim... vos batizará com o Espírito Santo e com fogo." Em Atos 19:1-6, Paulo encontra discípulos de João em Éfeso que não conheciam o Espírito Santo. Paulo os batizou em nome do Senhor Jesus e o Espírito desceu.',ref:'Mateus 3:11; Atos 19:1-6'},
  {type:'mc',q:'Qual é o "pecado não perdoável" que Jesus descreve em Mateus 12:31-32 e qual era o contexto que o provocou?',opts:['Negação pública de Jesus diante dos homens','Apostasia deliberada após receber o conhecimento','Perseguição de cristãos até a morte','Blasfêmia contra o Espírito Santo — atribuir ao diabo (Belzebu) as obras do Espírito; os fariseus haviam dito que Jesus expulsava demônios pelo príncipe dos demônios'],correct:3,explain:'Os fariseus disseram: "Este não expulsa demônios senão por Belzebu, príncipe dos demônios." Jesus respondeu: todo pecado é perdoável, mas blasfêmia contra o Espírito Santo não será perdoada — nem neste século nem no vindouro. É o pecado de atribuir ao mal o que é claramente obra do Espírito de Deus.',ref:'Mateus 12:24,31-32'},
  {type:'mc',q:'Qual é a estrutura do Sermão da Montanha em Mateus 5-7 e o que são as "bem-aventuranças"?',opts:['É uma lista de leis para substituir a lei mosaica; as bem-aventuranças são mandamentos','É um sermão político contra Roma','As bem-aventuranças são promessas para após a morte, sem aplicação presente','É a nova torá de Jesus: as bem-aventuranças (makarios = feliz/abençoado) descrevem o caráter do cidadão do Reino — pobre em espírito, manso, misericordioso, puro — e são descritivas, não prescritivas'],correct:3,explain:'O Sermão da Montanha (eco do Sinai) é a descrição do caráter e ética do Reino. As bem-aventuranças (do latim beatus, do grego makarios) descrevem quem entra no Reino: pobre em espírito, que chora, manso, que tem fome de justiça. São descritivas do discípulo, não condições para ser salvo. Paralelo com as Bem-Aventuranças de Lucas 6 (Sermão da Planície).',ref:'Mateus 5:3-12; Lucas 6:20-23'},
  {type:'mc',q:'O que significa "maranata" em 1 Coríntios 16:22 e em Apocalipse 22:20?',opts:['Significa "amém" em aramaico — confirmação litúrgica','Significa "paz seja convosco" em aramaico','É uma bênção sacerdotal judaica adaptada pelos cristãos','É aramaaico: "maran ata" = Nosso Senhor, vem! — clamor litúrgico da igreja primitiva pedindo a volta de Cristo'],correct:3,explain:'"Maranata" (μαράνα θά) é aramaico: maran atha = "Nosso Senhor, vem!" ou marana tha = "Nosso Senhor veio." Era clamor litúrgico da igreja primitiva — especialmente durante a Ceia do Senhor. Aparece também na Didaquê (séc. 1): "Venha a graça e passe este mundo. Hosana ao Deus de Davi. Maranata!" Apocalipse termina com o mesmo: "Vem, Senhor Jesus."',ref:'1 Coríntios 16:22; Apocalipse 22:20; Didaquê 10:6'},
  {type:'mc',q:'Qual é o argumento de Paulo sobre Abraão em Gálatas 3 para provar que a justificação é pela fé e não pela lei?',opts:['Abraão guardou todos os mandamentos antes de Moisés','Abraão foi circuncidado e por isso foi justificado','A lei de Abraão era diferente e mais simples que a mosaica','Abraão foi justificado pela fé (Gênesis 15:6) 430 anos ANTES da lei do Sinai — a lei não pode anular uma aliança já confirmada por Deus'],correct:3,explain:'Paulo argumenta: Abraão creu em Deus e isso lhe foi imputado como justiça (Gn 15:6). A lei veio 430 anos depois. Uma aliança (diatheke) legalmente ratificada não pode ser invalidada por algo posterior. Logo, a promessa a Abraão não depende da lei. A lei foi acrescentada por causa das transgressões até vir a Semente prometida.',ref:'Gálatas 3:6-17; Gênesis 15:6'},
  {type:'mc',q:'O que Paulo quer dizer com "a lei é nosso aio para nos conduzir a Cristo" em Gálatas 3:24?',opts:['A lei salva quem a cumpre perfeitamente até Cristo chegar','A lei continua sendo o guia principal mesmo após a fé','A lei foi substituída pelo amor ao próximo','O aio (paidagogos) era um escravo-guardião que conduzia a criança à escola — a lei revela o pecado e a necessidade de Cristo; chegada a fé, não estamos mais sob o aio'],correct:3,explain:'Paidagogos não era o professor — era o escravo que acompanhava e guardava a criança, às vezes com disciplina severa. Paulo usa a imagem para dizer que a lei exerce função pedagógica revelando o pecado e apontando para Cristo. "Mas, vinda a fé, já não estamos debaixo do aio" (3:25) — não a aboliu, mas completou sua função.',ref:'Gálatas 3:24-25'},
  {type:'mc',q:'Qual é o argumento central de Hebreus sobre Melquisedeque e por que ele prova que Cristo é superior ao sacerdócio levítico?',opts:['Melquisedeque era mais velho que Levitas — portanto superior cronologicamente','Melquisedeque era rei e sacerdote ao mesmo tempo — prova dupla autoridade','Melquisedeque ofereceu pão e vinho que prefiguram a eucaristia','Abraão (pai de Levitas) pagou dízimos a Melquisedeque — logo Levi, ainda nos rins de Abraão, pagou dízimos a Melquisedeque; além disso, Melquisedeque não tem genealogia registrada, prefigurando o sacerdócio eterno de Cristo'],correct:3,explain:'Hebreus 7 argumenta: (1) Abraão deu dízimos a Melquisedeque — como Levi estava nos rins de Abraão, Levi pagou dízimos ao maior; (2) Melquisedeque abençoou Abraão — o menor é abençoado pelo maior; (3) sem pai, mãe, genealogia, início nem fim de vida registrados — prefigura sacerdote eterno. Logo a ordem de Melquisedeque supera a levítica.',ref:'Hebreus 7:4-17; Gênesis 14:18-20'},
  {type:'mc',q:'O que é a "fé" no famoso capítulo de Hebreus 11 e como o autor a define no versículo 1?',opts:['É crença intelectual nos fatos históricos da Bíblia','É submissão à autoridade da Igreja','É a garantia de prosperidade e saúde em resposta à oração','É "a substância (hypostasis) das coisas que se esperam e a prova (elenchos) das coisas que não se veem" — a fé é a realidade presente do que se espera e a evidência do que é invisível'],correct:3,explain:'Hebreus 11:1: "A fé é a certeza (hypostasis = substância, base firme) das coisas que se esperam, e a prova (elenchos = evidência, demonstração) das coisas que se não veem." A fé não é mera esperança vaga mas tem substância — é a realidade antecipada do que ainda não se vê. O capítulo lista Abel, Enoque, Noé, Abraão...',ref:'Hebreus 11:1'},
  {type:'mc',q:'Qual foi a primeira das sete cartas de Apocalipse (capítulos 2-3) e qual era a crítica específica à Igreja de Éfeso?',opts:['Éfeso — elogiada por suportar a perseguição; criticada pela lukewarmness','Esmirna — elogiada por sua pobreza; criticada por tolerar Jezabel','Pérgamo — elogiada pela fé; criticada por praticar a doutrina de Balaão','Éfeso — elogiada por trabalho, perseverança, discernimento doutrinário; criticada por ter abandonado o primeiro amor (agape): "lembras do que caíste, arrepende-te e faze as primeiras obras"'],correct:3,explain:'Éfeso é a primeira. Cristo a elogia: obras, trabalho, perseverança, ódio às obras dos nicolaítas, teste de falsos apóstolos. Mas: "Tenho contra ti que abandonaste o teu primeiro amor." Ameaça: removerei o teu candeeiro. Promessa ao vencedor: comerá da árvore da vida no paraíso de Deus.',ref:'Apocalipse 2:1-7'},
  {type:'mc',q:'O que distingue a Igreja de Esmirna entre as sete cartas e qual promessa ela recebe?',opts:['É a única com apenas críticas e sem elogios','É elogiada pela riqueza e prometida prosperidade','É criticada pela falta de perseverança mas prometida restauração','É uma das duas igrejas sem nenhuma crítica — é pobre materialmente mas rica espiritualmente; a promessa é a coroa da vida e a segunda morte não lhe fará mal'],correct:3,explain:'A Esmirna (junto com Filadélfia) não recebe nenhuma crítica — apenas encorajamento. "Conheço a tua tribulação, pobreza (mas és rico)... Não temas o que estás para sofrer... sê fiel até à morte e eu te darei a coroa da vida. O vencedor não sofrerá dano da segunda morte." Estava sob grave perseguição.',ref:'Apocalipse 2:8-11'},
  {type:'mc',q:'Qual é a crítica à Igreja de Laodiceia e por que Jesus diz que está à porta batendo?',opts:['É criticada pela perseguição que sofre; Jesus está batendo para liberta-la','É criticada por tolerar falsos apóstolos; Jesus está avisando do julgamento','É a única sem elogios e sem promessas — só julgamento','É criticada por ser morna (nem fria nem quente) — Cristo a vomitará; diz ser rica e não precisar de nada mas é miserável, pobre, cega e nua; Jesus está FORA da sua própria Igreja batendo para entrar'],correct:3,explain:'Laodiceia: "Sei as tuas obras, que não és frio nem quente... porque és morno, vomitar-te-ei da minha boca." A cidade era rica (centro bancário, lã e colírio), mas a Igreja copiou essa confiança na riqueza. A imagem mais perturbadora: Cristo fora de sua própria Igreja batendo à porta. "Se alguém ouvir minha voz e abrir..."',ref:'Apocalipse 3:14-20'},
  {type:'mc',q:'O que é "gematria" e como ela é relevante para interpretar o número 666 em Apocalipse 13:18?',opts:['É uma técnica de memorização usada pelos escribas do AT','É uma forma de codificação secreta inventada pelos cristãos para esconder Apocalipse','É o método hermenêutico de interpretar profecias como alegorias numéricas','É o sistema que atribui valor numérico às letras — Nero César em hebraico (nrwn qsr) soma exatamente 666; o texto diz que "quem tem sabedoria calcule o número de um homem"'],correct:3,explain:'Gematria atribui valores numéricos a letras (alef=1, bet=2, etc.). Nero César transliterado para hebraico (nrwn qsr = nun+resh+waw+nun + qoph+samek+resh) soma exatamente 666. Alguns manuscritos têm 616 — que soma o nome latino "Nero Caesar". O texto em si instrui: "calcule o número de um homem" — aponta para uma pessoa real.',ref:'Apocalipse 13:18'},
  {type:'mc',q:'Qual é a cena do Trono em Apocalipse 4-5 e qual é o significado do Cordeiro que parece ter sido morto?',opts:['É apenas uma visão de adoração angélica sem significado cristológico específico','O Cordeiro é Israel, o povo sofredor e ressuscitado','É Cristo na segunda vinda sem relação com a encarnação','O Cordeiro em pé mas com marcas de imolação (arnion hestekos hos esphagmenon) — é o Ressuscitado que carrega as marcas da cruz; único digno de abrir o livro de 7 selos; a adoração combina ao Criador (cap 4) e ao Redentor (cap 5)'],correct:3,explain:'O Cordeiro (arnion — diminutivo, vulnerable) está em pé (ressurreto) mas como imolado (marcas visíveis). É o único digno de abrir o livro selado — ninguém no céu, na terra ou debaixo da terra. Os 4 seres viventes e 24 anciãos adoram com harpa e incenso (orações dos santos). Nova canção: "foste morto e com teu sangue compraste para Deus homens de toda nação."',ref:'Apocalipse 5:6-10'},
  {type:'mc',q:'O que significa "parusia" (parousia) no NT e como era usado no mundo greco-romano antes de Paulo?',opts:['Significa apenas "paz" — um cumprimento litúrgico','Significa "fim do mundo" — uma destruição total','É sinônimo de "anastasia" — a ressurreição final','Era usado para a chegada oficial de um rei ou imperador a uma cidade — com toda a pompa; Paulo usa para a segunda vinda gloriosa de Cristo, que os crentes sairão ao encontro (apantesis) como cidadãos que saem para escortar o rei de volta à cidade'],correct:3,explain:'Parousia era termo técnico para a visita oficial de um rei ou general a uma cidade — com celebração, delegação de boas-vindas. Em 1 Tessalonicenses 4:17, os crentes sobem ao encontro (apantesis) do Senhor — o mesmo gesto dos cidadãos que saíam para escortar o rei de volta. Não uma saída do mundo, mas uma boas-vindas escortada.',ref:'1 Tessalonicenses 4:15-17'},
  {type:'mc',q:'O que é o "mistério" (mysterion) que Paulo revela em Efésios 3 e que foi escondido nas eras anteriores?',opts:['A ressurreição dos mortos — um segredo do AT','O nome secreto de Deus que só Paulo conhecia','A identidade do Anticristo escondida nas profecias','A unidade de judeus e gentios num único corpo (a Igreja) como co-herdeiros, co-membros e co-participantes da promessa em Cristo — algo não claramente revelado no AT'],correct:3,explain:'Paulo diz que o mistério foi ocultado desde os séculos e gerações mas agora foi manifestado: os gentios são co-herdeiros (sygkleronoma), co-membros do mesmo corpo (syssoma) e co-participantes (symmetocha) da promessa em Cristo Jesus. O AT vislumbrava bênção às nações mas não explicitava essa igualdade radical num único corpo.',ref:'Efésios 3:4-6'},
  {type:'mc',q:'Qual é a distinção teológica entre "justificação" e "santificação" na teologia paulina?',opts:['Justificação é o início; santificação é apenas para os muito avançados na fé','Ambas são conquistadas pelo esforço humano acumulado','Justificação é para judeus; santificação é para gentios','Justificação (dikaiosis) é o ato forense/declaratório de Deus que nos imputa a justiça de Cristo — instantâneo e completo; santificação é o processo progressivo de ser conformado à imagem de Cristo pela obra do Espírito'],correct:3,explain:'Justificação: Deus nos declara justos (não nos faz gradualmente justos) com base na obra de Cristo — é posicional, forense, instantânea (Romanos 5:1). Santificação: processo progressivo de ser transformado à imagem do Filho (Romanos 8:29; 2 Coríntios 3:18; Filipenses 1:6). Uma é o status, a outra é a transformação da vida.',ref:'Romanos 5:1; 8:29; 2 Coríntios 3:18'},
  {type:'mc',q:'Qual é o argumento de Paulo em Romanos 9-11 sobre a rejeição de Israel e o que ele chama de "mistério" em 11:25?',opts:['Israel foi permanentemente rejeitado e substituído pela Igreja','A rejeição de Israel é parcial e temporária: o endurecimento de parte de Israel dura até a plenitude dos gentios entrar — então todo o Israel será salvo; a rejeição de Israel abriu a porta para os gentios; o mistério é esse processo soberano','Israel nunca foi rejeitado — a distinção entre Israel e Igreja é falsa','Paulo ensina que os judeus são salvos pela lei mesmo sem Cristo'],correct:1,explain:'Romanos 11:25-26: "não quero que ignoreis este mistério: que o endurecimento em parte aconteceu a Israel até que a plenitude dos gentios haja entrado. E assim todo o Israel será salvo." Paulo usa a metáfora da oliveira: ramos naturais (Israel) foram cortados; ramos selvagens (gentios) enxertados; Deus pode reenxertar os naturais.',ref:'Romanos 11:11,25-26'},
  {type:'mc',q:'Qual é a visão de Isaías no capítulo 6 do trono de Deus, o que os serafins gritavam, e como ela moldou o chamado do profeta?',opts:['Isaías viu anjos cantando; foi chamado sem sentir indignidade','Isaías viu o Senhor alto e sublime, serafins cobrindo rosto e pés gritando "Santo, Santo, Santo"; Isaías clamou: sou perdido, homem de lábios impuros; uma brasa purificou seus lábios; depois disse "Envia-me" em resposta ao chamado divino','Isaías viu um carro de fogo como Elias; foi chamado para ser rei','Isaías viu o Templo sendo destruído; foi chamado para profetizar o exílio'],correct:1,explain:'Isaías 6: trono alto, orla da veste enchendo o Templo, serafins com 6 asas gritando qadosh qadosh qadosh (Santo, Santo, Santo). Isaías: "Ai de mim! Sou perdido, pois sou homem de lábios impuros." Brasa do altar tocou seus lábios: "tua iniquidade está tirada." Então ouviu: "Quem enviarei?" Isaías: "Aqui estou, envia-me."',ref:'Isaías 6:1-8'},
  {type:'mc',q:'Qual é o "novo éxodo" em Isaías 40-55 e como ele se relaciona ao éxodo histórico do Egito?',opts:['É uma metáfora poética sem relação com o êxodo histórico','Isaías 40-55 anuncia um segundo êxodo ainda maior: assim como Deus abriu o Mar Vermelho, ele abrirá caminho no deserto para o retorno do exílio; "não vos lembreis das coisas passadas... farei caminho no deserto" — mas superando o primeiro êxodo em glória','É apenas sobre o retorno da Babilônia sem significado espiritual','É uma profecia do fim dos tempos sem relação com o exílio'],correct:1,explain:'Isaías 43:16-21: "Não vos lembreis das coisas passadas... eis que farei uma coisa nova." Deus fará caminho no deserto e rios no ermo — eco do êxodo (nuvem, mar, maná) mas em escala maior. O servo (Ciro/Israel/o Servo messiânico) conduzirá o novo povo. João Batista cita Isaías 40:3 para seu próprio papel no novo êxodo de Jesus.',ref:'Isaías 40:3; 43:16-21; Lucas 3:4'},
  {type:'mc',q:'O que é a "Shekinah" na tradição judaica e como aparece (mesmo que o termo não seja bíblico) nas Escrituras?',opts:['É o nome secreto de Deus — o Tetragramaton','É a presença gloriosa habitante de Deus — manifesta na nuvem e fogo do Êxodo, enchendo o Tabernáculo e o Templo; em João 1:14 "habitou (eskénosen — armou sua tenda) entre nós" é o NT usando o conceito da Shekinah','É uma visão mística reservada apenas a profetas','É o anjo do Senhor que guiou Israel'],correct:1,explain:'Shekinah (de shakan — habitar, morar) não aparece literalmente mas o conceito está em toda Bíblia: nuvem e fogo no Tabernáculo (Êxodo 40:34), glória enchendo o Templo de Salomão (1 Reis 8:10-11), glória partindo em Ezequiel 10-11. João 1:14 usa eskénosen (armou tenda entre nós) — a Shekinah se tornou carne em Jesus.',ref:'Êxodo 40:34-35; 1 Reis 8:10-11; João 1:14'},
  {type:'mc',q:'Qual foi o papel de Nicodemos em João e o que seus três aparecimentos revelam sobre sua jornada de fé?',opts:['Nicodemos foi um opositor constante de Jesus que nunca se converteu','Aparece três vezes: (1) à noite com perguntas (Jo 3); (2) defendendo Jesus no Sinédrio (Jo 7:50); (3) trazendo 100 libras de especiarias para o sepultamento (Jo 19:39) — uma jornada discreta de fé crescente','Nicodemos foi o primeiro convertido de Jerusalém antes de Pentecostes','Era irmão de José de Arimateia e sempre creu em Jesus'],correct:1,explain:'João apresenta Nicodemos em progressão: primeiro "de noite" (trevas = ignorância espiritual) fazendo perguntas sinceras (Jo 3). Depois, defendendo Jesus no Sinédrio: "acaso a nossa lei condena alguém sem primeiro ouvi-lo?" (Jo 7:51). Por último, com José de Arimateia, traz 100 libras de mirra e aloés para o sepultamento — ato público de discipulado.',ref:'João 3:2; 7:50-51; 19:39'},
  {type:'mc',q:'Qual é o significado de "Abba" em Marcos 14:36 e por que Paulo o usa em Romanos 8:15 e Gálatas 4:6?',opts:['É um título formal de respeito — equivalente a "Excelentíssimo"','É aramaico para "pai" na forma íntima familiar — usado por crianças; Jesus o usa em Getsêmani revelando intimidade única com Deus; Paulo diz que o Espírito nos faz clamar Abba — indicando adoção como filhos, não servos','É um nome hebraico secreto de Deus revelado na cruz','É a tradução aramaica do Tetragramaton'],correct:1,explain:'Abba em aramaico é a forma familiar e íntima de pai — usada por crianças ao pai. Jesus usa em Getsêmani (Mc 14:36): "Abba, Pai, tudo te é possível..." — revelando intimidade filial única mesmo na agonia. Paulo em Rm 8:15 e Gl 4:6 diz que o Espírito de adoção nos faz clamar Abba — mudamos de escravos para filhos com acesso íntimo a Deus.',ref:'Marcos 14:36; Romanos 8:15; Gálatas 4:6'},
  {type:'mc',q:'Qual é a profecia de Joel 2:28-32 e como Pedro a cita em Atos 2 no dia de Pentecostes?',opts:['Joel prometia prosperidade material; Pedro aplicou à expansão do reino','Joel profetizou derramamento do Espírito sobre toda carne — filhos, filhas profetizarão, velhos sonharão, jovens verão visões, servos e servas receberão o Espírito; Pedro em Pentecostes diz: "isto é o que foi dito pelo profeta Joel"','Joel falava do exílio assírio; Pedro usou alegoricamente','Joel prometia o retorno dos exilados; Pedro aplicou ao retorno de Israel ao Templo'],correct:1,explain:'Joel 2:28-32: "Depois disso derramarei o meu Espírito sobre toda carne; vossos filhos e vossas filhas profetizarão... Antes do grande e terrível dia do Senhor, todo aquele que invocar o nome do Senhor será salvo." Pedro em Pentecostes: "Isso é o que foi dito pelo profeta Joel" — o derramamento estava acontecendo ali.',ref:'Joel 2:28-32; Atos 2:16-21'},
  {type:'mc',q:'O que é o "fio escarlate" na história de Raabe em Josué 2, e como ele tipifica a redenção?',opts:['Era uma marca de propriedade filisteia — Raabe era espiã','Era o sinal que os espias mandaram Raabe pendurar na janela para que sua casa fosse poupada — paralelo ao sangue do cordeiro pascal nas ombreiras no Egito, e tipologia da redenção pelo sangue de Cristo','Era o símbolo tribal dos cananeus que indicava neutralidade','Era apenas uma corda para descer os espias pela janela'],correct:1,explain:'Os espias disseram: "Amarra este fio de linha escarlate na janela... todos os da tua casa ficarão salvos." O vermelho/escarlate evoca o sangue: como o sangue nas ombreiras protegeu no Egito, o fio escarlate protegia a casa de Raabe. Raabe — uma prostituta cananeia — é ancestral de Davi e Jesus (Mateus 1:5), salvando-se pela fé.',ref:'Josué 2:18; Mateus 1:5; Hebreus 11:31'},
  {type:'mc',q:'Qual é a primeira aparição do conceito de "aliança" (berit) na Bíblia e com quem Deus a estabeleceu?',opts:['Com Adão no Éden — a aliança das obras','Com Noé após o dilúvio — a aliança do arco-íris, nunca mais destruir a terra com águas','Com Abraão no sacrifício dos animais divididos — a aliança abraâmica','Com Moisés no Sinai — a aliança da lei'],correct:1,explain:'A primeira aliança explícita com o termo berit é com Noé em Gênesis 6:18 (anúncio) e 9:9-17 (confirmação com o arco-íris). É uma aliança universal e incondicional — Deus se compromete unilateralmente a nunca mais destruir toda carne com dilúvio. O arco-íris (qeshet — arco de guerra) é o sinal: Deus pendurou seu arco de guerra.',ref:'Gênesis 6:18; 9:9-17'},
  {type:'mc',q:'O que distingue a aliança com Abraão da aliança com Moisés em termos de condicionamento, segundo Paulo em Gálatas 3?',opts:['Ambas são igualmente condicionais à obediência','A aliança abraâmica é incondicional — baseada na promessa soberana de Deus (Deus passou entre os animais divididos sozinho enquanto Abraão dormia); a mosaica é condicional — "se obedecerdes... sereis meu povo"','A mosaica é a base; a abraâmica é apenas preparatória','Paulo não distingue — trata ambas como a mesma aliança'],correct:1,explain:'Em Gênesis 15, Deus fez passar a tocha de fogo entre as metades dos animais SOZINHO — Abraão estava em sono profundo. Normalmente, ambas as partes passavam indicando responsabilidade mútua. Deus assumiu o ônus sozinho. A aliança sinaítica (Êxodo 19:5-6) é condicional: "se guardardes minha aliança." Paulo usa isso em Gálatas 3:15-18.',ref:'Gênesis 15:17; Êxodo 19:5-6; Gálatas 3:15-18'},
  {type:'mc',q:'Qual é o significado de "Immanuel" em Isaías 7:14, qual palavra hebraica foi usada, e qual debate existe sobre sua tradução?',opts:['Significa "Deus conosco" — a palavra almah claramente significa "virgem virginal" sem debate','Significa "Deus conosco" — a palavra almah (jovem em idade de casar) pode significar virgem ou jovem mulher; a LXX traduziu por parthenos (virgem); Mateus 1:23 cita a LXX como cumprimento messiânico','Significa "Deus salva" — é sinônimo de Josué/Jesus','Significa "força de Deus" — foi usada referindo-se a Ezequias'],correct:1,explain:'Immanuel = "Immanu El" = Deus conosco. A palavra hebraica é almah (jovem/donzela — mulher em idade de casar, sem necessariamente implicar virgindade técnica). A LXX (tradução grega do AT feita por judeus) escolheu parthenos (virgem) ao traduzir. Mateus 1:23 cita a LXX aplicando ao nascimento virginal de Jesus — cumprimento superior ao contexto histórico imediato de Isaías.',ref:'Isaías 7:14; Mateus 1:22-23'},
  {type:'mc',q:'Qual é a visão de Ezequiel sobre a glória (kavod) de Deus saindo do Templo antes da destruição de Jerusalém?',opts:['A glória saiu instantaneamente numa explosão de luz','A glória se move gradualmente: do Santo dos Santos para o limiar do Templo (Ez 9), depois para o querubim leste do Templo (Ez 10), depois para a porta leste da cidade (Ez 11) — e finalmente parte para o monte a leste (Olivos). Retorna em Ezequiel 43','A glória nunca saiu — o Templo foi destruído com a glória dentro','A glória saiu e nunca mais voltou — simbolizando o fim de Israel'],correct:1,explain:'Ezequiel descreve a partida gradual da glória (kavod) como luto solene: 9:3 — da arca para o limiar; 10:4 — se eleva; 10:18-19 — para a porta leste do Templo; 11:22-23 — para o monte ao oriente (Monte das Oliveiras). Abandono gradual antes da destruição. Em Ezequiel 43:1-5 a glória retorna pelo mesmo caminho do leste.',ref:'Ezequiel 9:3; 10:4,18-19; 11:22-23; 43:1-5'},
  {type:'mc',q:'O que é o "Dia do Senhor" (Yom YHWH) nos profetas e como ele é tanto julgamento quanto salvação?',opts:['É apenas o Shabat semanal ampliado ao nível cósmico','É um conceito dual: dia de julgamento aterrorizante contra os inimigos de Deus E contra Israel quando desobediente (Amós 5:18-20: "ai dos que desejam o dia do Senhor — será trevas"); também dia de salvação e restauração do remanescente fiel','É exclusivamente um evento futuro sem aplicação histórica','É apenas um dia de adoração e festa no Templo'],correct:1,explain:'Amós surpreende: o povo desejava o Dia do Senhor pensando que era só para julgar os inimigos — Amós diz que será trevas para Israel também. Joel usa para o exército de gafanhotos E para o juízo escatológico. Sofonias 1:14-15 descreve sua grandeza. Mas o Dia também inclui salvação: Joel 2:32: "todo que invocar o Senhor será salvo."',ref:'Amós 5:18-20; Joel 2:1-2,28-32; Sofonias 1:14-15'},
  {type:'mc',q:'Qual é o nome do homem que encontrou o livro da lei no Templo no tempo do rei Josias, e quais foram as consequências?',opts:['Ezequias, o sumo sacerdote — Josias chorou e se arrependeu; a nação se reformou','Hilquias, o sumo sacerdote, achou o livro da lei; Josias rasgou as vestes ao ouvi-lo; consultou a profetisa Hulda; ela profetizou que o julgamento não viria em sua vida; então Josias fez a maior reforma e celebrou a Páscoa desde os dias dos juízes','Sofonias, o escriba — Josias destruiu os altares imediatamente','Jeremias achou o rolo; Josias o queimou como Jeoaquim'],correct:1,explain:'Hilquias, o sumo sacerdote, encontrou o livro da lei no Templo durante as obras de reforma. Safã o leu ao rei Josias que rasgou as vestes. Consultaram Hulda, a profetisa. Ela disse: o julgamento virá, mas não nos dias de Josias porque seu coração foi mole. Josias fez aliança com o Senhor, destruiu altares e lugares altos e celebrou a Páscoa (2 Reis 22-23).',ref:'2 Reis 22:8-20; 23:1-25'},
  {type:'mc',q:'O que é o "Tetragrama" (YHWH) e por que os judeus pararam de pronunciá-lo?',opts:['É o nome em quatro letras de Deus — yod-he-vav-he; os judeus pararam após o exílio babilônico por reverência extrema ao terceiro mandamento','É o nome secreto ensinado apenas aos sumos sacerdotes; parou de ser pronunciado após a destruição do segundo Templo','É apenas um título genérico para Deus; a tradição de não pronunciar é medieval','É uma sigla das quatro qualidades divinas: poder, sabedoria, amor, eternidade'],correct:0,explain:'O Tetragramaton (YHWH — yod-he-vav-he) é o nome pessoal de Deus revelado a Moisés no Êxodo 3:14-15. Pronunciado provavelmente como Yahweh. Após o exílio, por reverência ao terceiro mandamento (não tomar o nome em vão), os judeus substituíram pela leitura de Adonai (Senhor) ou HaShem (o Nome). Por isso nossas Bíblias têm SENHOR em maiúsculas.',ref:'Êxodo 3:14-15; 20:7'},
  {type:'mc',q:'Qual episódio bíblico envolve Uzá estendendo a mão para segurar a Arca da Aliança, e qual foi o resultado?',opts:['Uzá a segurou e foi abençoado por seu zelo','Uzá a segurou quando os bois tropeçaram; Deus o feriu e ele morreu ali mesmo; Davi ficou indignado e com medo e chamou o lugar de Perez-Uzá','Uzá a derrubou acidentalmente; foi exilado como punição','Uzá era levita autorizado; segurou sem consequências'],correct:1,explain:'Ao transportar a Arca num carro (contra as instruções levíticas de carregar nos ombros), os bois tropeçaram e Uzá estendeu a mão para segurar. A ira do Senhor se acendeu e ele morreu ali. Davi ficou indignado e com medo, chamou o lugar de Perez-Uzá. Depois aprendeu a transportar a Arca conforme a lei e ela foi para a casa de Obede-Edom.',ref:'2 Samuel 6:6-8; 1 Crônicas 15:13'},
  {type:'mc',q:'Qual é a promessa da "aliança davídica" em 2 Samuel 7 e como o NT a aplica a Jesus?',opts:['Davi recebeu promessa de riqueza e longa vida','Deus prometeu a Davi que seu filho construiria a casa para o nome do Senhor e que estabeleceria o trono do seu reino para sempre — a dinastia não terá fim; o NT aplica isso a Jesus como o filho de Davi cujo reino é eterno','Davi recebeu apenas a promessa de vitória sobre seus inimigos','A aliança davídica é condicional: se os filhos guardassem a lei'],correct:1,explain:'2 Samuel 7:12-16: Quando teus dias se completarem... levantarei tua descendência... estabelecerei o trono do teu reino para sempre. "Serei seu pai e ele será meu filho." Salomão cumpriu parcialmente. Mas o trono eterno aponta além — Lucas 1:32-33 diz que Jesus receberá o trono de seu pai Davi e seu reino não terá fim. É a promessa messiânica central.',ref:'2 Samuel 7:12-16; Lucas 1:32-33'},
  {type:'mc',q:'O que era o "Anno Domini" (Era Cristã) e quem a calculou — e qual erro ela contém?',opts:['Foi calculada por Eusébio de Cesareia sem erros','Foi calculada por Dionísio, o Pequeno, no séc. 6; mas ele errou cerca de 4-7 anos — Jesus provavelmente nasceu entre 6-4 a.C., antes da "era cristã" começar, pois Herodes o Grande morreu em 4 a.C.','É um cálculo perfeito confirmado por todos os historiadores','Foi calculada com base no censo de Quirino — portanto sem erro possível'],correct:1,explain:'Dionísio, o Pequeno (séc. 6 d.C.), calculou o nascimento de Cristo para criar o sistema Anno Domini. Mas errou: colocou o nascimento de Jesus alguns anos tarde demais. Como Herodes o Grande (que mandou matar os bebês) morreu em 4 a.C., Jesus nasceu antes disso — provavelmente entre 6-4 a.C. O paradoxo: Jesus nasceu "antes de Cristo".',ref:'Mateus 2:1; Lucas 1:5'},
  {type:'mc',q:'Qual é o significado da transfiguração em Mateus 17 e quem apareceu com Jesus?',opts:['Foi uma visão do futuro Templo glorificado; apareceram Abraão e Moisés','Jesus ficou transfigurado — rosto brilhante como sol, vestes brancas como luz; Moisés e Elias apareceram conversando com ele; a nuvem de glória os cobriu; voz: Este é meu Filho amado — representando lei (Moisés) e profetas (Elias) cedendo lugar ao Filho','Foi uma visão de Pentecostes antecipada; apareceram João Batista e Elias','Pedro teve alucinação; os outros dois não viram nada'],correct:1,explain:'A transfiguração (metamorfose) revela a glória divina velada na encarnação. Moisés (a Lei) e Elias (os Profetas) convertem com Jesus — toda a Escritura hebraica aponta para Ele. Pedro quer fazer três tendas — nuvem o cobre. Voz: "Este é meu Filho amado, nele me agrado — ouvi-o." Só Jesus fica. A Lei e os Profetas apontam para o Filho.',ref:'Mateus 17:1-8'},
