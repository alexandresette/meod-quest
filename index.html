  {type:'mc',q:'Qual é o nome do homem que encontrou o livro da lei no Templo no tempo do rei Josias, e quais foram as consequências?',opts:['Ezequias, o sumo sacerdote, encontrou o rolo e Josias chorou e se arrependeu publicamente','Sofonias, o escriba real, encontrou o rolo e Josias destruiu todos os altares em três dias','Hilquias, o sumo sacerdote, achou o livro da lei; Josias rasgou as vestes','Jeremias achou o rolo profético e Josias o queimou coluna por coluna como fez Jeoaquim'],correct:2,explain:'Hilquias, o sumo sacerdote, encontrou o livro da lei no Templo durante as obras de reforma. Safã o leu ao rei Josias que rasgou as vestes. Consultaram Hulda, a profetisa. Ela disse: o julgamento virá, mas não nos dias de Josias porque seu coração foi mole. Josias fez aliança com o Senhor, destruiu altares e lugares altos e celebrou a Páscoa (2 Reis 22-23).',ref:'2 Reis 22:8-20; 23:1-25'},
  {type:'mc',q:'O que é o "Tetragrama" (YHWH) e por que os judeus pararam de pronunciá-lo?',opts:['Não tem aplicação messiânica — Jesus só usou o episódio como exemplo de cura física pelo fé','A serpente representava o domínio do Egito; Jesus a aplicou ao sistema religioso romano','Moisés fez isso por magia egípcia e Jesus explicitamente rejeitou essa conexão com Moisés','Israel foi picado por serpentes ardentes; Moisés fez serpente de bronze no alto de um poste'],correct:3,explain:'O Tetragramaton (YHWH — yod-he-vav-he) é o nome pessoal de Deus revelado a Moisés no Êxodo 3:14-15. Pronunciado provavelmente como Yahweh. Após o exílio, por reverência ao terceiro mandamento (não tomar o nome em vão), os judeus substituíram pela leitura de Adonai (Senhor) ou HaShem (o Nome). Por isso nossas Bíblias têm SENHOR em maiúsculas.',ref:'Êxodo 3:14-15; 20:7'},
  {type:'mc',q:'Qual episódio bíblico envolve Uzá estendendo a mão para segurar a Arca da Aliança, e qual foi o resultado?',opts:['Uzá a segurou com autorização levítica e foi abençoado por seu zelo em proteger a Arca','Uzá a derrubou acidentalmente no ribeiro Quedrom; foi exilado para Damasco como punição','Uzá era levita plenamente autorizado e segurou sem qualquer consequência divina negativa','Uzá estendeu a mão quando os bois tropeçaram; Deus o feriu e ele morreu ali mesmo; Davi chamou o lugar de Perez-Uzá'],correct:3,explain:'Ao transportar a Arca num carro (contra as instruções levíticas de carregar nos ombros), os bois tropeçaram e Uzá estendeu a mão para segurar. A ira do Senhor se acendeu e ele morreu ali. Davi ficou indignado e com medo, chamou o lugar de Perez-Uzá. Depois aprendeu a transportar a Arca conforme a lei e ela foi para a casa de Obede-Edom.',ref:'2 Samuel 6:6-8; 1 Crônicas 15:13'},
  {type:'mc',q:'Qual é a promessa da "aliança davídica" em 2 Samuel 7 e como o NT a aplica a Jesus?',opts:['Davi recebeu promessa de longa vida pessoal, grande riqueza e vitória sobre todos os inimigos','Deus prometeu a Davi que seu filho construiria o Templo e que o trono do seu reino seria estabelecido','Davi recebeu apenas promessa de vitória militar sobre os filisteus, moabitas e arameus','A aliança davídica é condicional: dependia de que os filhos guardassem a lei de Moisés'],correct:1,explain:'2 Samuel 7:12-16: Quando teus dias se completarem... levantarei tua descendência... estabelecerei o trono do teu reino para sempre. "Serei seu pai e ele será meu filho." Salomão cumpriu parcialmente. Mas o trono eterno aponta além — Lucas 1:32-33 diz que Jesus receberá o trono de seu pai Davi e seu reino não terá fim. É a promessa messiânica central.',ref:'2 Samuel 7:12-16; Lucas 1:32-33'},
  {type:'mc',q:'O que era o "Anno Domini" (Era Cristã) e quem a calculou — e qual erro ela contém?',opts:['Foi calculada por Eusébio de Cesareia no séc. 4 e confirmada sem erros pelos concílios','É cálculo perfeito confirmado por todos os historiadores antigos e modernos sem exceção','Foi calculada por Dionísio, o Pequeno, no séc. 6; ele errou cerca de 4-7 anos','Foi calculada com base no censo de Quirino de Lucas 2 — portanto historicamente precisa'],correct:2,explain:'Dionísio, o Pequeno (séc. 6 d.C.), calculou o nascimento de Cristo para criar o sistema Anno Domini. Mas errou: colocou o nascimento de Jesus alguns anos tarde demais. Como Herodes o Grande (que mandou matar os bebês) morreu em 4 a.C., Jesus nasceu antes disso — provavelmente entre 6-4 a.C. O paradoxo: Jesus nasceu "antes de Cristo".',ref:'Mateus 2:1; Lucas 1:5'},
  {type:'mc',q:'Qual é o significado da transfiguração em Mateus 17 e quem apareceu com Jesus?',opts:['Foi visão do futuro Templo glorificado com Abraão e Moisés sentados nos tronos de honra','Jesus ficou transfigurado — rosto brilhante como sol, vestes brancas','Foi visão de Pentecostes antecipada com João Batista e Elias descendo como línguas de fogo','Pedro teve uma alucinação por exaustão; os outros dois discípulos não viram absolutamente nada'],correct:1,explain:'A transfiguração (metamorfose) revela a glória divina velada na encarnação. Moisés (a Lei) e Elias (os Profetas) convertem com Jesus — toda a Escritura hebraica aponta para Ele. Pedro quer fazer três tendas — nuvem o cobre. Voz: "Este é meu Filho amado, nele me agrado — ouvi-o." Só Jesus fica. A Lei e os Profetas apontam para o Filho.',ref:'Mateus 17:1-8'},
  {type:'mc',q:'Qual é o significado da "segunda morte" mencionada em Apocalipse 20-21?',opts:['É a morte física do corpo que ocorre após a morte espiritual já sofrida na queda do Éden','É o lago de fogo — a morte eterna separada de Deus após o julgamento do Grande Trono Branco','É a morte física que ocorre durante o Armagedon para os exércitos das nações reunidas','É o julgamento purgatório intermediário que ocorre antes da ressurreição e do julgamento final'],correct:1,explain:'Apocalipse 20:14: "A morte e o inferno foram lançados no lago de fogo. Esta é a segunda morte." 21:8: os incrédulos "terão a sua parte no lago que arde com fogo e enxofre, que é a segunda morte." Primeira morte = morte física/biológica. Segunda morte = separação eterna de Deus. O vencedor (Ap 2:11) não sofrerá dano da segunda morte.',ref:'Apocalipse 20:14; 21:8; 2:11'},
  {type:'mc',q:'Qual é o episódio da serpente de bronze em Números 21 e como Jesus o aplica a si mesmo em João 3?',opts:['Israel foi atacado por serpentes ardentes; Moisés fez serpente de bronze num poste; quem olhasse vivia','Não tem aplicação messiânica — Jesus só usou o episódio como exemplo histórico de cura miraculosa','A serpente representava o domínio do Egito; Jesus a aplicou para falar da derrota de Roma','Moisés fez isso por magia aprendida no Egito e Jesus explicitamente rejeitou essa conexão'],correct:0,explain:'Números 21:8-9: serpentes ardentes picavam o povo que pecou. Deus mandou Moisés fazer uma serpente de bronze e pô-la num poste — quem olhasse vivia. Jesus em João 3:14-15: "Como Moisés levantou a serpente no deserto, assim importa que o Filho do Homem seja levantado, para que todo o que nele crer tenha a vida eterna." Tipologia da cruz: olhar pela fé.',ref:'Números 21:8-9; João 3:14-15'},
  {type:'mc',q:'Qual é a estrutura quiástica (quiasmo) e como ela aparece na Bíblia hebraica?',opts:['É técnica de rima poética sem significado estrutural teológico específico ou intencional','É usada apenas em hebraico do AT; no NT grego não existe nenhuma estrutura quiástica','É técnica de memorização sem propósito literário ou hermenêutico nos textos sagrados','É estrutura literária em espelho (A-B-C-B-A) onde o centro é o ponto principal'],correct:3,explain:'Quiasmo (do grego chi, X) é estrutura A-B-C-B-A onde o centro carrega o peso temático. Exemplo: Gênesis 1 é quiástico (dias 1-3 paralelos com 4-6, dia 7 no centro). O Sermão da Montanha tem estrutura quiástica. João 1 tem quiasmo elaborado. Salmo 51 é quiástico. Reconhecer quiasmos revela ênfases que a tradução frequentemente obscurece.',ref:'Gênesis 1; João 1; Salmo 51'},
  {type:'mc',q:'O que é a "Didaquê" e por que ela é significativa para o estudo do NT e da Igreja primitiva?',opts:['É texto gnóstico do séc. 3 rejeitado unanimemente pela Igreja e queimado nos concílios','É comentário de Orígenes sobre o Evangelho de João escrito em Alexandria no séc. 3','É liturgia medieval falsamente atribuída ao período apostólico pelos monges coptas','É o Ensinamento dos Doze Apóstolos (séc. 1) — descreve batismo, jejum, eucaristia, orações e'],correct:3,explain:'A Didaquê (Grego: ensinamento) foi descoberta em 1873 e data provavelmente do fim do séc. 1. Contém: instruções morais (dois caminhos), ritual batismal (preferência por água corrente, mas aceitando derramamento), jejum (quarta e sexta), Pai Nosso três vezes ao dia, liturgia eucarística com "Maranata", estrutura de liderança. É janela única para o culto apostólico.',ref:'Didaquê 7-10; 1 Coríntios 11:17-34'},
  {type:'mc',q:'Qual é o significado da frase "Filho de Deus" no contexto do AT e como Jesus a radicaliza no NT?',opts:['No AT nunca foi usado para seres humanos — Jesus inventou completamente o título como auto-designação','É apenas título de honra sem nenhuma implicação ontológica ou de natureza divina real','No AT: usado para anjos, Israel e o rei davídico; Jesus radicaliza com pré-existência (Jo 8:58), igualdade com','No AT significava literalmente filho biológico de Deus gerado por relação física com o divino'],correct:2,explain:'"Filhos de Deus" no AT: anjos (Jó 1:6), Israel (Êxodo 4:22), rei (Salmo 2:7 — citado na transfiguração e batismo de Jesus). Jesus usa "Filho" de forma que os ouvintes entendiam como blasfêmia (João 5:18: os judeus buscavam matá-lo porque se fazia igual a Deus). Romanos 1:4: declarado Filho de Deus com poder pela ressurreição.',ref:'Salmo 2:7; João 5:18; Romanos 1:4'},
  {type:'mc',q:'Qual é a "Regra de Fé" (Regula Fidei) nos Pais da Igreja e como ela funcionava na interpretação bíblica?',opts:['Era conjunto de leis canônicas sobre disciplina eclesiástica decididas no Concílio de Niceia','Era a regra técnica de como copiar manuscritos sagrados sem introduzir erros textuais','Era lei eclesiástica específica sobre quem tinha autoridade para batizar e presidir a eucaristia','Era resumo do ensinamento apostólico (predecessora do Credo) que os Pais usavam como parâmetro'],correct:3,explain:'A Regula Fidei (Ireneu, Contra as Heresias; Tertuliano, De Praescriptione) era o sumário do ensinamento apostólico transmitido pelas igrejas fundadas pelos apóstolos. Funcionava como filtro hermenêutico: se uma interpretação contrariar o que os apóstolos ensinaram e a Igreja sempre creu, está errada. Protegeu contra releituras gnósticas da Bíblia.',ref:'Ireneu, Contra as Heresias 1.10.1; Gálatas 1:8-9'},
  {type:'mc',q:'Qual foi a ordem cronológica dos escritos do NT — qual veio primeiro e qual por último, segundo o consenso acadêmico?',opts:['Os Evangelhos foram escritos primeiro (30-50 d.C.); as epístolas de Paulo foram as últimas (~90 d.C.)','Mateus foi o primeiro Evangelho (~30 d.C.); Romanos foi o último escrito antes da perseguição','As cartas de Paulo são as mais antigas (1 Tessalonicenses ~50 d.C.); os Evangelhos vieram depois; Apocalipse por último (~95 d.C.)','Todos foram escritos simultaneamente pelos apóstolos antes de 70 d.C. para preservar as memórias'],correct:2,explain:'1 Tessalonicências (~50 d.C.) é provavelmente o escrito mais antigo do NT. As cartas paulinas precedem os Evangelhos sinóticos. Marcos (~65-70 d.C.) é geralmente considerado o primeiro Evangelho. Mateus e Lucas usaram Marcos como fonte (~80-85 d.C.). João (~90-95 d.C.) é o mais tardio dos Evangelhos. Apocalipse (~95 d.C.) — Domiciano — é provavelmente o último.',ref:'1 Tessalonicenses 1:1; Marcos 13:14; João 21:23-24; Apocalipse 1:9'}
,{type:'mc',q:'Qual é o significado do "véu partido" no momento da morte de Jesus em Mateus 27:51?',opts:['Simbolizava apenas o fim do sacerdócio judaico como instituição religiosa sem acesso divino','O véu separava o Santo dos Santos (separação entre Deus e humanidade pelo pecado) rasgou de cima a','Era sinal do terremoto que destruiu a ala sudeste do Templo junto com outras estruturas','Representava o fim das cerimônias mosaicas e o início da lei oral transmitida pelos rabinos'],correct:1,explain:'Mateus 27:51: "o véu do santuário rasgou-se em dois de alto a baixo." O véu de baixo para cima indicaria ação humana; de cima para baixo indica ação divina. O Santo dos Santos (acesso somente ao sumo sacerdote uma vez por ano) agora é aberto a todos. Hebreus 10:19-20: temos ousadia para entrar no Santo dos Santos pelo sangue de Jesus, pelo novo e vivo caminho.',ref:'Mateus 27:51; Hebreus 10:19-20; Levítico 16:2'}
]
