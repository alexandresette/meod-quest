  {type:'mc',q:'Qual versículo é frequentemente chamado de "o Evangelho em miniatura"?',opts:['Mateus 28:19','Romanos 8:28','João 3:16','Hebreus 11:1'],correct:2,explain:'"Porque Deus amou o mundo de tal maneira que deu o seu Filho unigênito, para que todo aquele que nele crê não pereça, mas tenha a vida eterna."',ref:'João 3:16'},
  {type:'mc',q:'Qual homem do NT ajudou José de Arimateia a preparar o corpo de Jesus?',opts:['Nicodemos','Zaqueu','Barnabé','Filipe'],correct:0,explain:'Nicodemos, que havia visitado Jesus de noite (Jo 3), trouxe mirra e aloés para preparar o corpo. Juntos com José de Arimateia, o sepultaram.',ref:'João 19:39-40'},
  {type:'mc',q:'Qual é a declaração central de 1 Coríntios 15?',opts:['O amor é o maior dom','A ressurreição de Cristo é o fundamento da fé','A unidade do corpo de Cristo','O uso correto dos dons espirituais'],correct:1,explain:'"Se Cristo não ressuscitou, é vã a nossa pregação e vã também a vossa fé." A ressurreição corporal é o centro da teologia paulina.',ref:'1 Coríntios 15:14'},
  {type:'mc',q:'Qual é o significado da palavra "Batismo" em grego?',opts:['Purificação','Imersão/mergulho','Unção','Consagração'],correct:1,explain:'"Baptizein" em grego significa mergulhar ou imergir. Os debates históricos sobre o modo do batismo (imersão, aspersão) giram em torno deste significado original.',ref:'Mateus 3:16 / Etimologia grega'},
  {type:'mc',q:'Qual profeta do AT ministrou principalmente em Nínive, a capital da Assíria?',opts:['Jonas','Naum','Amós','Sofonias'],correct:0,explain:'Jonas foi enviado a Nínive para pregar o arrependimento. Naum também profetizou contra Nínive — mas um século depois, quando a cidade voltou ao mal.',ref:'Jonas 1:2 / Naum 1:1'},
  {type:'mc',q:'Qual foi a resposta de Deus a Jó após todo seu sofrimento?',opts:['Ele explicou a razão do sofrimento','Ele revelou Sua grandeza e perguntou onde estava Jó na criação','Ele prometeu riquezas dobradas imediatamente','Ele pediu desculpas a Jó'],correct:1,explain:'Deus respondeu a Jó do meio do redemoinho com perguntas poderosas sobre a criação — não deu explicações, mas revelou Sua glória incomparável.',ref:'Jó 38:1-7'},
  {type:'mc',q:'Qual era o ofício de Esdras em Israel?',opts:['Rei','Sacerdote e escriba versado na lei de Moisés','General do exército','Governador persa'],correct:1,explain:'"Esdras era um escriba versado na lei de Moisés... tinha disposto o seu coração a esquadrinhar a lei do Senhor, a cumpri-la e a ensinar os seus estatutos."',ref:'Esdras 7:6,10'},
  {type:'mc',q:'A frase "O Senhor é meu pastor" está em qual salmo?',opts:['Salmo 1','Salmo 22','Salmo 23','Salmo 91'],correct:2,explain:'O Salmo 23, escrito por Davi, ex-pastor de ovelhas, começa com esta metáfora central do cuidado de Deus — um dos textos bíblicos mais memorados.',ref:'Salmo 23:1'},
  {type:'mc',q:'Qual cidade foi destruída por enxofre e fogo por causa da perversidade de seus habitantes?',opts:['Nínive','Babilônia','Sodoma e Gomorra','Jericó'],correct:2,explain:'Gênesis 19 — Deus destruiu Sodoma e Gomorra com enxofre e fogo. Ló e suas filhas escaparam; a esposa olhou para trás e se tornou estátua de sal.',ref:'Gênesis 19:24-26'},
  {type:'mc',q:'Qual carta do NT adverte contra o amor ao dinheiro, chamando-o de raiz de todos os males?',opts:['Tiago','Hebreus','1 Timóteo','1 Coríntios'],correct:2,explain:'"O amor ao dinheiro é a raiz de todos os males." (1 Tm 6:10). Nota: não é o dinheiro em si, mas o amor a ele que é perigoso.',ref:'1 Timóteo 6:10'},
  {type:'mc',q:'Qual evento encerrou o período de 400 anos de silêncio profético antes de João Batista?',opts:['A vinda de Esdras do cativeiro','O nascimento de João Batista e o ministério de Zacarias','A construção do segundo templo','A aliança dos Macabeus'],correct:1,explain:'Após Malaquias (aprox. 430 a.C.), não houve profeta em Israel por cerca de 400 anos. João Batista encerrou esse silêncio como precursor do Messias.',ref:'Malaquias 4:5 / Lucas 1:11-17'},
  {type:'mc',q:'Em qual rio foi batizado Jesus?',opts:['Nilo','Eufrates','Jordão','Quebar'],correct:2,explain:'João Batista batizava no rio Jordão, a leste de Jerusalém. Jesus foi a ele e foi batizado no Jordão, onde o Espírito desceu como pomba.',ref:'Mateus 3:13'},
  {type:'mc',q:'Quantas viagens missionárias Paulo realizou relatadas no livro de Atos?',opts:['1','2','3','4'],correct:2,explain:'O livro de Atos registra três grandes viagens missionárias de Paulo antes de sua viagem final a Roma como prisioneiro.',ref:'Atos 13-14 / 15-18 / 18-21'},
  {type:'mc',q:'Quem era o pai de João Batista?',opts:['José','Zacarias','Simão','Cleofas'],correct:1,explain:'Zacarias era sacerdote idoso da ordem de Abias. O anjo Gabriel anunciou que ele e Isabel teriam um filho chamado João, cheio do Espírito Santo.',ref:'Lucas 1:5-13'},
  {type:'mc',q:'Qual é o significado do nome "Israel"?',opts:['Filho de Deus','Aquele que luta com Deus e prevalece','Povo escolhido','Terra santa'],correct:1,explain:'"Não te chamarás mais Jacó, mas Israel; porque lutaste com Deus e com os homens e prevaleceste." O nome marcou a transformação de Jacó.',ref:'Gênesis 32:28'},
  {type:'mc',q:'Qual era a profissão de Lucas, autor do terceiro Evangelho?',opts:['Pescador','Médico','Cobrador de impostos','Carpinteiro'],correct:1,explain:'"Lucas, o médico amado" — Paulo o chama assim em Colossenses 4:14. Seu vocabulário técnico médico é evidente em seu Evangelho.',ref:'Colossenses 4:14'},
  {type:'mc',q:'Qual livro bíblico contém o Cântico de Débora, um dos textos mais antigos da Bíblia?',opts:['Números','Josué','Juízes','Rute'],correct:2,explain:'Juízes 5 preserva o Cântico de Débora, celebrando a vitória sobre Sísara. É considerado um dos textos hebraicos mais antigos, com características poéticas arcaicas.',ref:'Juízes 5:1-31'},
  {type:'mc',q:'Qual é o primeiro versículo da Bíblia?',opts:['"Toda Escritura é inspirada por Deus."','"No princípio era o Verbo."','"No princípio criou Deus os céus e a terra."','"O Senhor é meu pastor."'],correct:2,explain:'"No princípio criou Deus os céus e a terra" — Gênesis 1:1 é a abertura das Escrituras, estabelecendo Deus como Criador soberano de tudo.',ref:'Gênesis 1:1'},
  {type:'mc',q:'Qual foi o pecado de Uzias que o fez ser atacado de lepra?',opts:['Idolatria','Usurpar o papel do sacerdote queimando incenso no templo','Aliança com a Assíria','Matar profetas'],correct:1,explain:'O rei Uzias, orgulhoso por seu poder, entrou no templo para queimar incenso — papel exclusivo dos sacerdotes. Deus o feriu com lepra imediatamente.',ref:'2 Crônicas 26:16-19'},
  {type:'mc',q:'Qual é o livro mais longo do NT?',opts:['Mateus','João','Atos','Lucas'],correct:3,explain:'O Evangelho de Lucas é o maior livro do NT em extensão, seguido de perto pelo livro de Atos. Juntos formam a maior obra de um único autor no NT.',ref:'Evangelho de Lucas'},
  {type:'mc',q:'Qual parábola Jesus contou para ilustrar quem é o próximo?',opts:['O Filho Pródigo','O Semeador','O Bom Samaritano','Os Talentos'],correct:2,explain:'Para responder "quem é o meu próximo?" Jesus narrou a história de um homem espancado, ignorado por sacerdote e levita, mas socorrido por um samaritano.',ref:'Lucas 10:30-37'},
  {type:'mc',q:'Qual profeta disse "Cria em mim, ó Deus, um coração puro"?',opts:['Isaías','Salomão','Davi','Asafe'],correct:2,explain:'Salmo 51 é o salmo de arrependimento de Davi após ser confrontado por Natã sobre o pecado com Bate-Seba. "Cria em mim um coração puro, ó Deus" (v.10).',ref:'Salmo 51:10'},
  {type:'mc',q:'Quantos livros o Novo Testamento possui?',opts:['25','27','29','30'],correct:1,explain:'O cânon do NT tem 27 livros: 4 Evangelhos, Atos, 13 epístolas paulinas, 8 epístolas gerais (Tiago a Judas) e Apocalipse.',ref:'Cânon NT'},
],
teologo:[
  {type:'mc',q:'Quem foi Eúde e qual detalhe físico foi decisivo para matar o rei Eglom de Moabe?',opts:['Era manco e usou uma lança longa escondida na roupa','Era cego e reconheceu o rei pela voz na sala do trono','Era canhoto e escondeu a espada do lado direito','Era mudo e usou gestos para distrair os guardas de Eglom'],correct:2,explain:'Eúde, filho de Gera, da tribo de Benjamim, era canhoto. Quando os guardas revistaram para entregar o tributo, não sentiram a espada do lado direito — o lado incomum. Ele a enfiou no ventre de Eglom que era muito gordo — a gordura fechou sobre a lâmina.',ref:'Juízes 3:15-22'},
  {type:'mc',q:'O que Shamgar usou para matar 600 filisteus, tornando-se um dos juízes mais obscuros de Israel?',opts:['Um arco feito de madeira de oliveira com flechas longas','Uma aguilhada — estaca usada para conduzir bois','Uma pedra de funda retirada do leito do rio Jordão','Uma espada de dois gumes tomada de um filisteu morto'],correct:1,explain:'Shamgar, filho de Anate, matou 600 filisteus com uma aguilhada (vara de conduzir bois). Tem apenas um versículo dedicado a ele. Depois de Eúde, ele também salvou Israel — e Débora o menciona em seu cântico.',ref:'Juízes 3:31; 5:6'},
  {type:'mc',q:'Qual foi o destino dos 70 filhos de Gideão em Ofrá, e quem foi o único sobrevivente?',opts:['Foram exilados na Síria pelo rei Rezim; sobreviveu Abiézer','Foram assassinados por mercenários filisteus; sobreviveu Peniás','Morreram de praga enviada por Deus; o mais velho sobreviveu','Foram mortos sobre uma pedra por Abimeleque; sobreviveu Jotão'],correct:3,explain:'Abimeleque, filho de uma concubina de Gideão, alugou homens com 70 siclos de prata e matou 70 irmãos seus sobre uma única pedra em Ofrá. Jotão, o mais novo, se escondeu e fugiu. Depois pronunciou a famosa fábula das árvores do monte Gerizim.',ref:'Juízes 9:5-7'},
  {type:'mc',q:'O que Jotão profetizou na fábula das árvores depois que seus irmãos foram mortos por Abimeleque?',opts:['Que Israel seria conquistado pelos amonitas em punição pelo pecado de Siquém','Que fogo sairia de Abimeleque e consumiria Siquém, e de Siquém consumiria Abimeleque','Que Deus levantaria um novo juiz de Manassés para libertar o povo oprimido','Que a linhagem de Gideão seria restaurada através de um filho sobrevivente'],correct:1,explain:'Jotão subiu ao monte Gerizim e gritou: que fogo saia de Abimeleque e consuma Siquém, e fogo de Siquém consuma Abimeleque. A profecia se cumpriu literalmente: Abimeleque destruiu Siquém com sal, e depois morreu vergonhosamente em Tebes.',ref:'Juízes 9:20,57'},
  {type:'mc',q:'Qual mulher matou Abimeleque enquanto ele atacava a torre de Tebes, e qual foi a última ação de Abimeleque?',opts:['Débora desceu da palmeira e cravou uma lança no pescoço de Abimeleque em batalha','Uma mulher anônima jogou uma pedra de mó; ele pediu ao escudeiro que o traspassasse','Jael o envenenou com leite e o encobriu com manto antes de sair da tenda','A filha do rei de Tebes atirou fogo sobre ele do alto da torre da cidade'],correct:1,explain:'Uma mulher anônima jogou um fragmento de pedra de mó sobre a cabeça de Abimeleque e lhe rachei o crânio. Ele, imediatamente, mandou seu escudeiro traspassá-lo com a espada — para não se dizer que morreu pela mão de uma mulher. Assim se cumpriu a profecia de Jotão.',ref:'Juízes 9:53-54'},
  {type:'mc',q:'Qual foi o voto insensato de Jefté antes da batalha contra os amonitas, e quem saiu primeiro de sua casa?',opts:['Prometeu construir um altar em Mispa se Deus lhe desse vitória sobre os amonitas','Prometeu não cortar o cabelo até destruir todos os inimigos de Israel no leste','Prometeu oferecer em holocausto o que saísse de sua porta; sua filha única saiu dançando','Prometeu dar metade dos espólios ao santuário de Siló após a vitória militar'],correct:2,explain:'Jefté prometeu que ofereceria ao Senhor em holocausto o que primeiro saísse de sua casa. Sua filha única saiu ao encontro dele com pandeiros e danças. Ele rasgou as vestes. Ela pediu dois meses para chorar sua virgindade nas montanhas antes que o voto se cumprisse.',ref:'Juízes 11:31-38'},
  {type:'mc',q:'Qual palavra os gileaditas usaram para identificar os efraimitas na passagem do Jordão, matando 42.000?',opts:['Betel — os que não conheciam o santuário eram identificados como inimigos','Shibbolet — os efraimitas diziam Sibbolet, traindo sua origem tribal','Calebá — o nome do ancestral dos quenezitas que serviam nos exércitos','Maanaim — cidade que só os gileaditas sabiam localizar com precisão'],correct:1,explain:'Os gileaditas pediam que cada fugitivo dissesse "Shibbolet". Os efraimitas pronunciavam "Sibbolet" (não conseguiam fazer o som sh). Assim eram identificados e mortos ali mesmo na passagem do Jordão. 42.000 efraimitas morreram dessa forma.',ref:'Juízes 12:5-6'},
  {type:'mc',q:'Qual foi o anjo anúncio do nascimento de Sansão, e qual era a instrição dada à sua mãe antes do nascimento?',opts:['Comeria apenas pão ázimo e mel; a criança seria consagrada ao sacerdócio','Ficaria recluída no tabernáculo por seis meses; a criança seria profeta real','Não beberia vinho nem comeria coisa imunda; a criança seria nazireu desde o ventre','Absteria de toda carne e viveria em pureza ritual; a criança seria rei ungido'],correct:2,explain:'O anjo do Senhor apareceu à mulher estéril de Manoá: não bebesses vinho nem licor, nem comesses coisa imunda — pois conceberás um filho. Nenhuma navalha tocaria sua cabeça, pois ele seria nazireu de Deus desde o ventre. Ela seria quem contou ao marido.',ref:'Juízes 13:3-5'},
  {type:'mc',q:'O que aconteceu com Sansão quando ele matou 30 homens de Ascalom para pagar a aposta da charada?',opts:['Sua esposa fugiu com mercadores filisteus que passavam por Timna na colheita','Seu sogro a casou com o chefe dos filisteus como garantia de paz entre as tribos','Sansão a repudiou ao descobrir que ela havia revelado a charada sob pressão','Seu sogro deu sua esposa ao paraninfo — o amigo que o havia acompanhado no casamento'],correct:3,explain:'Quando Sansão voltou ao pagamento, descobriu que seu sogro havia dado sua esposa ao paraninfo — o amigo que o havia acompanhado. O sogro justificou dizendo que pensou que Sansão a odiava. Isso desencadeou o ciclo de vinganças que incluiu raposas com archotes e 1.000 mortos com maxilar de jumento.',ref:'Juízes 15:1-2'},
  {type:'mc',q:'Com o que Sansão matou 1.000 filisteus no lugar chamado Ramate-Lehi, e o que aconteceu depois?',opts:['Com um arco improvvisado de madeira de figueira que encontrou no campo de batalha','Com pedras do rio Soréque que usou como projéteis por toda a tarde da batalha','Com a queixada de jumento; Deus fez brotar água do próprio dente quando Sansão teve sede','Com um osso de boi que encontrou no campo após a vitória sobre os trezentos'],correct:2,explain:'Sansão achou uma queixada de jumento fresca e matou mil filisteus. Chamou o lugar de Ramate-Lehi (colina do maxilar). Com sede extrema, clamou a Deus: "Tu deste esta grande vitória... e eu morrerei de sede?" Deus rasgou o solo e saiu água do próprio dente do maxilar.',ref:'Juízes 15:15-19'},
  {type:'mc',q:'Qual foi a verdadeira fonte da força de Sansão conforme a narrativa de Juízes?',opts:['A unção física passada pelo toque das mãos de seu pai Manoá na infância de Sansão','O cabelo era símbolo do voto nazireu; o poder vinha do Espírito de Deus enquanto o voto era honrado','Um anel de ouro gravado com o nome de Deus que o anjo entregou ao nascer','A força vinha de uma dieta especial que sua mãe manteve durante toda a gravidez'],correct:1,explain:'O cabelo não era a fonte mágica da força — era o símbolo visível do voto nazireu. Quando foi cortado, o Espírito do Senhor se afastou dele. A força vinha do Espírito de Deus em cumprimento do chamado nazireu. Quando o cabelo cresceu de novo e ele clamou, o Espírito voltou.',ref:'Juízes 16:17-20,28'},
  {type:'mc',q:'Qual foi o nome do pai de Rute e qual o detalhe que mostra a profundidade de sua lealdade a Noemi?',opts:['Seu pai era Elimeléque; ela recusou toda riqueza de Moabe para ficar com sua sogra','Ela não tinha pai vivo; escolheu Noemi por uma dívida de gratidão do passado','Ela não tem pai identificado; disse que onde Noemi morresse ela também morreria — aliança total','Seu pai era Boaz; foi um acordo matrimonial arranjado entre as famílias aliadas'],correct:2,explain:'Rute não tem pai identificado no texto. A fala de Rute a Noemi é uma das mais belas declarações de aliança da Bíblia: "Para onde tu deres, darei; onde tu ficares, ficarei; teu povo será meu povo e teu Deus será meu Deus. Onde tu morreres, morrerei". É modelo de hesed — amor fiel de aliança.',ref:'Rute 1:16-17'},
  {type:'mc',q:'O que era o "resgate do parente mais próximo" (goel) na lei de Israel, e como isso se aplica à história de Rute?',opts:['Era o direito exclusivo do primogênito de herdar todos os bens do pai na morte','Era o sistema de dízimos recolhidos pelo sacerdote em nome de toda a família extensa','Era a obrigação de vingar o sangue do parente morto dentro do prazo de um ano','Era o dever do parente próximo de resgatar terras, libertar escravos e casar com a viúva'],correct:3,explain:'O goel (redentor/parente resgatador) devia: resgatar terras vendidas por necessidade, libertar parentes escravizados, e no casamento de levirato, levantar nome ao morto casando com a viúva. Boaz era parente de Elimeleque. O parente mais próximo desistiu — e Boaz a redimiu, tornando-se tipo de Cristo Redentor.',ref:'Rute 3:9; 4:9-10; Levítico 25:25'},
  {type:'mc',q:'Qual foi o gesto simbólico pelo qual o parente mais próximo cedeu o direito de redenção a Boaz em Rute 4?',opts:['O parente mais próximo tirou a sandália e a deu a Boaz diante dos anciãos na porta da cidade','Boaz e o parente partiram um pão diante das doze testemunhas e o repartiram solenemente','O parente escreveu seu nome numa pedra e a quebrou em sinal de renúncia pública','Boaz ungiu o parente com azeite na testa como confirmação da transferência de direitos'],correct:0,explain:'O parente mais próximo tirou sua sandália e a deu a Boaz — costume antigo em Israel para confirmar uma transação de resgate ou troca de direito. Era feito publicamente na porta da cidade diante de testemunhas. Eles chamavam isso de "o testemunho em Israel".',ref:'Rute 4:7-8'},
  {type:'mc',q:'Quantos dias Elias andou no deserto depois de ser alimentado pelo anjo, até chegar ao monte Horebe?',opts:['Quarenta dias e noites até Horebe — com a força da comida do anjo que o tocou duas vezes','Sete dias de jejum completo até chegar ao ribeiro de Querite perto do Jordão','Vinte dias caminhando pelo deserto de Judá antes de alcançar o monte Sinai','Cem dias escondido na caverna de Obadias onde os profetas foram alimentados'],correct:0,explain:'O anjo do Senhor tocou Elias duas vezes sob o zimbro e disse: "levanta e come, porque o caminho é longo demais para ti". Elias levantou, comeu e bebeu e, com a força daquela comida, andou quarenta dias e quarenta noites até Horebe, o monte de Deus.',ref:'1 Reis 19:7-8'},
  {type:'mc',q:'O que Deus disse a Elias que havia reservado em Israel que nunca se curvara a Baal?',opts:['Quinhentos guerreiros fiéis escondidos nas montanhas de Gileade por Obadias','Sete mil pessoas que nunca se dobraram a Baal nem o beijaram — remanescente invisível','Mil sacerdotes escondidos em grupos de cinquenta nas cavernas por todo o reino','Uma geração inteira de jovens de Judá que Deus separou para o tempo da restauração'],correct:1,explain:'Quando Elias disse "só eu fiquei, e buscam a minha vida", Deus respondeu: "Eu reservei para mim sete mil em Israel — todos os joelhos que não se dobraram a Baal, e todas as bocas que não o beijaram." Um remanescente invisível que Elias desconhecia.',ref:'1 Reis 19:18'},
  {type:'mc',q:'Quais eram os três que Elias deveria ungir segundo a comissão que recebeu em Horebe?',opts:['Hazael como rei da Síria, Jeú como rei de Israel e Eliseu como profeta em seu lugar','Eliseu como profeta, Joás como rei de Israel e Naum como sacerdote do Templo','Jeú como rei de Israel, Josias como rei de Judá e Isaías como profeta de Jerusalém','Elias devia ungir apenas Eliseu pois os outros seriam designados diretamente por Deus'],correct:0,explain:'Na caverna do Horebe, Deus comissionou Elias a ungir três: Hazael como rei da Síria, Jeú filho de Ninsi como rei sobre Israel, e Eliseu filho de Safate como profeta em seu lugar. Quem escapar da espada de Hazael, Jeú o matará; quem escapar de Jeú, Eliseu o matará.',ref:'1 Reis 19:15-17'},
  {type:'mc',q:'O que aconteceu na vinha de Nabote e qual profecia Elias pronunciou sobre Acabe e Jezabel?',opts:['Jezabel forjou acusações de blasfêmia e mandou matar Nabote; Elias profetizou que cães lamberiam o sangue de Acabe e comeriam Jezabel em Jezreel','Acabe comprou a vinha de Nabote por cem siclos; Elias profetizou que a dinastia de Acabe acabaria na terceira geração','Nabote vendeu a vinha por vontade própria; Elias profetizou que Israel seria disperso entre as nações do norte','Acabe tomou a vinha pela força com seus soldados; Elias profetizou sete anos de seca sobre toda a região'],correct:0,explain:'Jezabel forjou acusações de blasfêmia contra Nabote, que foi apedrejado. Acabe tomou a vinha. Elias foi ao encontro dele e profetizou: no lugar onde os cães lamberam o sangue de Nabote, lamberão o teu sangue. E de Jezabel: os cães a comerão junto ao muro de Jezreel.',ref:'1 Reis 21:13,19,23'},
  {type:'mc',q:'Como morreu o rei Acabe, e como a profecia de Elias se cumpriu literalmente?',opts:['Foi atingido por flecha aleatória em Ramote; sangue encheu o carro e cães o lamberam no tanque de Samaria','Foi morto diretamente pela espada de Jeú filho de Ninsi no vale de Jezreel na batalha decisiva','Morreu de doença depois que Eliseu profetizou contra ele na porta da cidade de Jericó','Foi morto em batalha contra os arameus; seu sangue foi derramado no vale de Jezreel'],correct:0,explain:'Acabe disfarçado foi atingido ao acaso por uma flecha entre as juntas da armadura. Ficou de pé no carro até morrer ao anoitecer. Seu sangue escorreu para o fundo do carro. Lavaram o carro no tanque de Samaria, e os cães lamberam o sangue enquanto as prostitutas se banhavam — conforme a palavra do Senhor.',ref:'1 Reis 22:34-38'},
  {type:'mc',q:'Como Elizeu recebeu a porção dupla do espírito de Elias e qual era a condição?',opts:['Precisava jejuar quarenta dias no mesmo lugar onde Elias havia jejuado no Horebe','Precisava ver Elias subindo; se visse receberia, se não, não — e ele viu e recebeu','Precisava lavar-se sete vezes no Jordão como Naamã lavou para receber a cura','Precisava permanecer em oração no monte Carmelo até que o Espírito descesse sobre ele'],correct:1,explain:'Elias disse: "Pediste coisa difícil. Se me vires quando eu for tomado de ti, assim será para ti; se não, não será assim." Eliseu viu o carro de fogo, os cavalos de fogo e Elias subindo num redemoinho. Pegou o manto que havia caído, bateu nas águas do Jordão — e elas se dividiram.',ref:'2 Reis 2:10-14'},
  {type:'mc',q:'O que Eliseu fez quando os meninos de Betel o escarneceram chamando-o de "cabeça careca", e quantos foram feridos?',opts:['Trinta meninos ficaram cegos após Eliseu orar e pedir proteção ao Senhor em Jericó','Uma fenda abriu a terra e engoliu setenta jovens que jogaram pedras no profeta','Duas ursas saíram da floresta e dilaceraram quarenta e dois meninos que o escarneceram','Nada aconteceu; o relato é metafórico sobre o respeito devido aos profetas de Deus'],correct:2,explain:'Eliseu virou-se, olhou para eles e os amaldiçoou em nome do Senhor: "Subi, cabeça careca!" Duas ursas saíram da floresta e dilaceraram 42 meninos. O episódio mostra que zombar do profeta de Deus era zombar da autoridade divina — não era simples brincadeira infantil.',ref:'2 Reis 2:23-24'},
  {type:'mc',q:'O que aconteceu com os ossos de Eliseu após sua morte, registrado em 2 Reis 13?',opts:['Seus ossos foram levados a Jerusalém e honrados no Templo por ordem do rei Josias','Um morto tocou seus ossos ao ser lançado no sepulcro e ressuscitou imediatamente','Seus ossos desapareceram misteriosamente como os de Moisés na planície de Moabe','Foram guardados numa arca de cedro como os ossos de José que veio do Egito'],correct:1,explain:'Enquanto sepultavam um homem, avistaram uma banda de moabitas e lançaram o morto no sepulcro de Eliseu. Quando os ossos do morto tocaram os ossos de Eliseu, ele reviveu e ficou de pé. É o único milagre póstumo registrado no Antigo Testamento.',ref:'2 Reis 13:21'},
  {type:'mc',q:'Qual detalhe específico sobre Naamã, o general sírio curado por Eliseu, revela sua condição paradoxal segundo 2 Reis 5:1?',opts:['Era valoroso e de alta estima mas era leproso — Deus dera vitória por sua mão mas ele estava doente','Era rico mas de família escrava resgatada nos tempos de Ben-Hadade rei da Síria','Era fiel a um deus da Síria mas servia secretamente a um rei que adorava Baal','Era israelita de nascimento mas vivia na Síria desde a infância após ser capturado'],correct:0,explain:'O texto diz: "Naamã, general do exército do rei da Síria, era grande homem e de alta estima diante do seu senhor... era também valente guerreiro; mas era leproso." A tensão é deliberada: Deus havia dado vitória pela sua mão, mas ele carregava lepra. A cura veio de uma serva israelita escrava.',ref:'2 Reis 5:1'},
  {type:'mc',q:'Qual foi a reação de Naamã quando Eliseu mandou que ele se lavasse 7 vezes no Jordão?',opts:['Ficou furioso — esperava ritual mais impressionante e achava os rios da Síria superiores','Obedeceu imediatamente com fé inabalável e mergulhou as sete vezes sem questionar','Pediu um sinal visível do profeta antes de se comprometer com um ritual estrangeiro','Mandou um servo sírio mergulhar primeiro para testar se as águas eram realmente curativas'],correct:0,explain:'Naamã ficou irado: esperava que o profeta viesse, invocasse o nome do Senhor, pusesse a mão sobre o lugar e curasse. Disse: "Porventura não são melhores o Abana e o Farfar, rios de Damasco, do que todas as águas de Israel?" Seus servos o convenceram com sabedoria: "Se fosse coisa difícil..."',ref:'2 Reis 5:11-13'},
  {type:'mc',q:'O que Geazi, servo de Eliseu, fez depois da cura de Naamã, e qual foi o seu castigo?',opts:['Correu atrás de Naamã e mentiu para obter prata e roupas; recebeu a lepra de Naamã para sempre','Roubou o sacrifício de gratidão de Naamã que estava na carroça; foi exilado para o leste','Contou o segredo do poder de Eliseu aos capitães sírios; ficou mudo até a morte','Desobedeceu a Eliseu numa missão profética; perdeu o cargo de servo do profeta'],correct:0,explain:'Geazi correu atrás de Naamã dizendo que Eliseu havia pedido um talento de prata e duas mudas de roupa para dois filhos de profetas. Naamã deu dois talentos. Quando Geazi voltou, Eliseu disse: "Não foi meu espírito contigo?" E a lepra de Naamã se transferiu a Geazi e à sua descendência para sempre.',ref:'2 Reis 5:20-27'},
  {type:'mc',q:'Qual é o significado profético do sinal que Isaías deu ao rei Acaz em Isaías 7:14, e qual era o contexto histórico imediato?',opts:['Era uma promessa para após o exílio babilônico; Acaz pediu o sinal para confirmar a restauração','Israel e Síria ameaçavam Jerusalém; Isaías disse que a jovem (almah) conceberia e antes da criança crescer','Era profecia exclusivamente messiânica sem nenhuma aplicação histórica imediata no tempo de Isaías','Acaz pediu o sinal voluntariamente após uma grave derrota militar contra os arameus'],correct:1,explain:'A coalização de Rezim (Síria) e Peca (Israel) ameaçava Jerusalém. Acaz recusou pedir sinal. Isaías deu o sinal de Deus: almah (jovem/virgem) conceberá e chamará Emanuel. Antes da criança saber rejeitar o mal, as terras dos dois reis seriam abandonadas — cumprimento histórico imediato e tipo messiânico futuro.',ref:'Isaías 7:1,14,16'},
  {type:'mc',q:'Qual profecia de Isaías descreve um servo sofredor que "foi ferido pelas nossas transgressões" e é identificado no NT com Jesus?',opts:['Isaías 40:3 — voz que clama no deserto, preparai o caminho do Senhor na solidão','Isaías 42:1-4 — servo escolhido em quem Deus se agrada, não grita nas ruas','Isaías 61:1-2 — o Espírito do Senhor está sobre mim para proclamar liberdade aos cativos','Isaías 52:13–53:12 — o servo desprezado, ferido pelas transgressões, levado como cordeiro ao matadouro'],correct:3,explain:'Isaías 52:13–53:12 é o quarto Cântico do Servo Sofredor. Descreve alguém desprezado, ferido pelas transgressões do povo, levado como cordeiro ao matadouro, sem beleza, cujas chagas nos curam. Filipe usou este texto para evangelizar o etíope. É a profecia messiânica mais citada no NT.',ref:'Isaías 53:5; Atos 8:32-35'},
  {type:'mc',q:'Qual profecia de Miqueias menciona Belém pelo nome como origem do governador de Israel, e qual frase aponta para sua pré-existência eterna?',opts:['Miqueias 4:1 — no fim dos dias o monte da casa do Senhor será exaltado acima dos montes','Miqueias 6:8 — o que o Senhor pede: praticar justiça, amar a misericórdia e andar humildemente','Miqueias 5:2 — Belém Efrata, pequena entre os milhares de Judá; cujas saídas são desde os dias da eternidade','Miqueias 7:18 — Deus que perdoa iniquidade e passa por alto a transgressão do remanescente'],correct:2,explain:'Miqueias 5:2: "Tu, Belém Efrata, pequena entre os milhares de Judá, de ti me sairá o que há de reinar em Israel; cujas saídas são desde os tempos antigos, desde os dias da eternidade." Dois aspectos: origem humana em Belém (nascimento) e origem divina eterna. Citada pelos escribas em Mateus 2:6.',ref:'Miqueias 5:2; Mateus 2:6'},
  {type:'mc',q:'O que o profeta Amós disse quando Amazias, sacerdote de Betel, ordenou que parasse de profetizar?',opts:['Saiu em silêncio respeitando a autoridade sacerdotal estabelecida pelo rei Jeroboão','Convocou o povo de Betel para um confronto como Elias havia feito no monte Carmelo','Recitou a lei de Moisés sobre os falsos sacerdotes e declarou o julgamento de Deus','Disse: não sou profeta nem filho de profeta, sou pastor e cultivador de sicômoros — o Senhor me enviou'],correct:3,explain:'Amazias mandou Amós ir para Judá. Amós respondeu: "Não sou profeta, nem filho de profeta; sou pastor e cultivador de sicômoros. Mas o Senhor me tomou de detrás do rebanho e disse: vai, profetiza ao meu povo Israel." Era de Tecoa em Judá mas profetizava no reino do Norte.',ref:'Amós 7:14-15'},
  {type:'mc',q:'O que Oseias foi ordenado a fazer com Gômer depois que ela o abandonou pelos amantes, e qual era o preço?',opts:['Foi instruído a ignorá-la completamente como Deus havia ignorado Israel por seus ídolos','Comprou-a de volta por quinze siclos de prata e uma homer e meia de cevada — símbolo do amor de Deus por Israel infiel','Foi instruído a casá-la com outro homem justo e aguardar que ela voltasse arrependida','Foi instruído a orá-la com jejum de quarenta dias para que fosse libertada de uma maldição'],correct:1,explain:'Deus disse a Oseias: "Vai, ama ainda a mulher amada de seu amigo e adúltera, como o Senhor ama os filhos de Israel." Oseias a comprou por 15 siclos de prata e uma homer e meia de cevada. Disse: ficarás comigo muitos dias; não serás de nenhum homem — símbolo do Israel disciplinado mas amado.',ref:'Oseias 3:1-3'},
  {type:'mc',q:'O que o profeta Ezequiel fez por 390 dias e depois por 40 dias como sinal profético para Israel e Judá?',opts:['Deitou sobre o lado esquerdo por 390 dias (iniquidade de Israel) e sobre o direito por 40','Ficou mudo e se comunicava por sinais — proibido de abrir a boca durante todo o cerco','Jejuou sem comer carne nem beber vinho por 430 dias consecutivos na praça da cidade','Andou descalço e com roupas rasgadas pelas ruas de Jerusalém como luto antecipado'],correct:0,explain:'Deus mandou Ezequiel deitar sobre o lado esquerdo por 390 dias carregando a iniquidade da casa de Israel — cada dia por um ano. Depois sobre o lado direito por 40 dias carregando a iniquidade de Judá. Com uma corda para não virar, e ração de comida pesada diariamente — era o cerco de Jerusalém encenado.',ref:'Ezequiel 4:4-8'},
  {type:'mc',q:'Qual profeta foi proibido de lamentar a morte de sua esposa como sinal para Israel, e o que isso representava?',opts:['Jeremias — a morte da esposa representava a ruptura da aliança e a destruição iminente','Oseias — representava o abandono completo de Israel por Deus após séculos de paciência','Zacarias — representava o fim do sacerdócio levítico e início de um sacerdócio eterno','Ezequiel — a morte da esposa (desejo dos olhos) representava a destruição do Templo (desejo dos olhos de Israel)'],correct:3,explain:'Deus disse a Ezequiel: "Vou tirar de ti o desejo dos teus olhos — não chores, não te lamentes, não derrame lágrimas." Ela morreu à tarde. Ezequiel fez conforme ordenado. O povo perguntou o que significava. Era sinal: quando o Templo — o desejo dos olhos de Israel — fosse destruído, eles também não deveriam lamentar.',ref:'Ezequiel 24:15-24'},
  {type:'mc',q:'Na visão do vale dos ossos secos de Ezequiel 37, o que os ossos representam e em qual ordem a restauração acontece?',opts:['Representam as nações gentias que seriam restauradas antes de Israel no plano final','Representam os mortos ressurretos no fim dos tempos em ordem simultânea e instantânea','Representam os exilados em Babilônia; o Espírito entra primeiro antes de qualquer restauração','Representam Israel; primeiro os ossos se unem, depois nervos e carne, depois pele — por último o espírito (ruah) entra'],correct:3,explain:'Os ossos = "toda a casa de Israel" (v.11). A sequência é precisa: os ossos se aproximam uns dos outros, nervos e carne os cobrem, pele os recobre — mas não havia espírito neles. Então Deus manda Ezequiel profetizar ao vento (ruah) que venha soprar — e eles viveram. Processo: restauração física depois spiritual.',ref:'Ezequiel 37:1-14'},
  {type:'mc',q:'Qual profeta menor tem apenas 21 versículos e trata exclusivamente do julgamento de Edom por se alegrar com a queda de Jerusalém?',opts:['Naum — 47 versículos contra Nínive; descreve o julgamento após o arrependimento de Jonas','Habacuque — 56 versículos que contêm o diálogo único entre o profeta e Deus soberano','Sofonias — 53 versículos profetizando o Dia do Senhor contra Judá e as nações vizinhas','Abdias — apenas 21 versículos, trata do julgamento de Edom por se alegrar com a queda de Jerusalém'],correct:3,explain:'Abdias é o livro mais curto do AT com apenas 1 capítulo e 21 versículos. Profetiza contra Edom (descendentes de Esaú, irmão de Jacó) que se alegraram quando Babilônia destruiu Jerusalém, bloquearam fugitivos e entregaram sobreviventes. "Como fizeste, assim te farão... tua recompensa voltará sobre tua cabeça."',ref:'Abdias 1:10-14'},
  {type:'mc',q:'O que o profeta Naum profetizou e qual era seu contexto histórico em relação ao livro de Jonas?',opts:['Profetizou a queda de Babilônia duzentos anos após Marduk ter derrotado os exércitos assírios','Profetizou a restauração de Israel no norte após o exílio assírio ordenado por Tiglate-Pileser','Profetizou a queda de Nínive cerca de 150 anos após o arrependimento em Jonas, quando voltou ao mal extremo','Profetizou contra Moabe e Edom durante o reinado de Josias antes da reforma religiosa'],correct:2,explain:'Jonas pregou em Nínive (capital da Assíria) e a cidade se arrependeu. 150 anos depois, Naum profetiza sua destruição inevitável — a cidade voltou ao extremo da crueldade. "Nínive é destruída! Quem chorará por ela?" Nínive caiu em 612 a.C. para babilônios e medos — exatamente como profetizado.',ref:'Naum 1:1; 3:7; Jonas 3:10'},
  {type:'mc',q:'Qual é o "diálogo" único no livro de Habacuque e o que o torna estruturalmente diferente de outros livros proféticos?',opts:['O profeta questiona Deus duas vezes e Deus responde duas vezes — conversa sobre injustiça e soberania divina','É uma série de visões sem diálogo real — Habacuque recebe revelações passivas sem interação','É uma liturgia de lamento usada no Templo de Jerusalém durante o período de reformas','Habacuque profetiza exclusivamente em forma de parábolas sobre pastores e seus rebanhos'],correct:0,explain:'Habacuque é único: o profeta faz perguntas a Deus e Deus responde. 1ª pergunta: por que toleras a violência em Judá? Deus: levanto os caldeus. 2ª pergunta: como usar um povo mais ímpio para punir Judá? Deus: a sua alma se ensoberba; mas o justo viverá pela sua fé (2:4). Termina num hino de rendição total.',ref:'Habacuque 1:2-4; 2:1-4; 3:17-19'},
  {type:'mc',q:'Qual versículo de Habacuque 2:4 é citado três vezes no NT por Paulo e no livro de Hebreus e se tornou central na Reforma?',opts:['Deus nunca abandona seu servo fiel mesmo na mais profunda escuridão da tribulação','Porque o Senhor está no seu santo templo — cale-se diante dele toda a terra','O justo pela sua fé (emunah) viverá — citado em Romanos 1:17, Gálatas 3:11 e Hebreus 10:38','Ainda que a figueira não floresça nem haja fruto na vide — ainda assim me alegrarei'],correct:2,explain:'"O justo pela sua fé (emunah — fidelidade/fé) viverá." Citado em Romanos 1:17 (justificação pela fé), Gálatas 3:11 (contraste com a lei) e Hebreus 10:38 (perseverança pela fé). Foi o versículo que iluminou Lutero na torre e desencadeou a Reforma Protestante.',ref:'Habacuque 2:4; Romanos 1:17; Gálatas 3:11'},
  {type:'mc',q:'O que aconteceu na noite em que o jovem Rute (Eutico) caiu da janela do terceiro andar enquanto Paulo pregava em Trôade?',opts:['Êutico caiu morto da janela do terceiro andar; Paulo deitou sobre ele, abraçou e disse: a vida está nele — e ele ressuscitou','Paulo orou à distância e Êutico se curou sozinho sem que Paulo descesse do terceiro andar','Lucas o tratou medicamente com ervas e curativos e Êutico sobreviveu graças ao cuidado médico','Paulo continuou pregando sem interrupção e Êutico acordou naturalmente pela manhã'],correct:0,explain:'Eutico (um jovem) estava sentado na janela do 3º andar ouvindo Paulo pregar até meia-noite. Caiu profundo sono, caiu lá de cima e foi levantado morto. Paulo desceu, se deitou sobre ele, o abraçou e disse: "Não vos perturbeis, pois a vida está nele." O moço ressuscitou e Paulo continuou pregando até o amanhecer.',ref:'Atos 20:9-12'},
  {type:'mc',q:'Quem era Areopagita, convertido no discurso de Paulo no Areópago de Atenas, e qual outra pessoa o acompanhou na fé?',opts:['Félix, o Areopagita, e sua concubina Drusila que havia abandonado seu marido herodes','Dionísio, o Areopagita, e uma mulher chamada Dâmaris — conversões pequenas mas significativas em Atenas','Estéfanas, o Areopagita líder do tribunal, e Fortunato secretário dos registros da cidade','Crispo, o arcopagita presidente, e toda a sua família incluindo escravos e libertos'],correct:1,explain:'Depois do discurso de Paulo sobre o "Deus desconhecido" e a ressurreição no Areópago, a maioria escarneceu. Mas alguns creram: Dionísio, o Areopagita, e uma mulher chamada Dâmaris, e outros com eles. Foi uma conversão pequena numericamente mas significativa — Dionísio era membro do prestigioso tribunal ateniense.',ref:'Atos 17:34'},
  {type:'mc',q:'O que Paulo revela sobre o "aguilhão na carne" em 2 Coríntios 12, quantas vezes pediu remoção e qual foi a resposta?',opts:['Um mensageiro de Satanás para esbofeteá-lo; pediu três vezes','Uma doença nos olhos que o cegava periodicamente; pediu sete vezes; Deus curou completamente','Perseguições contínuas dos judaizantes; pediu quarenta vezes; Deus enviou um anjo para defendê-lo','Oposição dos falsos apóstolos em Corinto; pediu uma única vez; Deus prometeu destruí-los'],correct:0,explain:'Paulo descreve um "aguilhão na carne — mensageiro de Satanás para me esbofetear" dado para evitar que se exaltasse (após visões incontáveis). Rogou três vezes ao Senhor para que o removesse. A resposta: "A minha graça te basta, porque o meu poder se aperfeiçoa na fraqueza." Paulo então se gloriou em suas fraquezas.',ref:'2 Coríntios 12:7-9'},
  {type:'mc',q:'Qual é a diferença entre as palavras gregas "agape", "philia" e "eros" e como isso aparece no diálogo de Jesus com Pedro em João 21?',opts:['Jesus usa agape duas vezes e Pedro responde com philia; na terceira Jesus desce ao nível de philia de Pedro, o que o comoveu','São sinônimos no grego koinê — a diferença é apenas estilística entre autores diferentes','Jesus usa eros no sentido espiritual de amor transcendente; Pedro responde com agape comum','Não há diferença real no grego koinê do NT; o mesmo amor é expresso com termos intercambiáveis'],correct:0,explain:'Jesus pergunta duas vezes: "Me amas (agapas)?" Pedro responde: "Te amo (philo)". Na terceira vez Jesus usa "me amas (phileis)?" — desceu ao nível de Pedro. Pedro ficou triste não por ser a 3ª vez mas porque Jesus usou seu próprio termo, questionando até esse amor mais simples. É uma pedagogia de restauração.',ref:'João 21:15-17'},
  {type:'mc',q:'Qual é o significado do termo hebraico "hesed" e por que é considerado praticamente intraduzível?',opts:['Significa apenas misericórdia — equivale perfeitamente ao português e ao latim misericordia','Significa temor reverente diante da majestade divina e é sinônimo direto de yirah','É o nome secreto de Deus revelado a Moisés no Sinai e contido nos dez mandamentos','Combina amor, lealdade, bondade e fidelidade dentro do contexto de uma aliança — nenhuma palavra capta totalmente'],correct:3,explain:'Hesed (חֶסֶד) é traduzido como misericórdia, bondade amorosa, amor fiel, graça. Mas nenhuma palavra capta a totalidade: é amor que age dentro de um compromisso de aliança — leal, ativo, sacrificial, imerecido. O Salmo 136 repete "ki le\'olam hasdo" (porque o seu hesed dura para sempre) em cada um dos 26 versículos.',ref:'Rute 1:8; Salmo 136; Êxodo 34:6-7'},
  {type:'mc',q:'Qual é a função do "Servo do Senhor" nos quatro Cânticos do Servo em Isaías e como eles se distinguem do restante do livro?',opts:['Poemas sobre Ciro, rei persa que libertou Israel do exílio babilônico por decreto real','Hinos litúrgicos usados pelos sacerdotes levíticos nas festividades do Templo de Salomão','Visões do próprio Isaías descrevendo seu chamado profético e suas tentativas de recusa','Quatro poemas (42:1-4; 49:1-6; 50:4-9; 52:13-53:12) sobre servo misterioso cujo sofrimento'],correct:3,explain:'Os quatro Cânticos do Servo têm uma figura misteriosa distinta do Israel coletivo: chamado desde o ventre, unge para libertar, aprende pela obediência sofrida, e no quarto cântico sofre vicariamente pelos pecados de muitos. Filipe em Atos 8:32 usa o 4º para evangelizar o etíope explicando que é Jesus.',ref:'Isaías 42:1-4; 49:1-6; 50:4-9; 52:13—53:12'},
  {type:'mc',q:'O que é a "nova aliança" anunciada por Jeremias 31:31-34 e em que ela difere fundamentalmente da aliança do Sinai?',opts:['A lei será inscrita no coração; todos conhecerão a Deus diretamente; os pecados serão perdoados definitivamente','É idêntica à aliança mosaica, apenas renovada e confirmada após o exílio babilônico','É uma aliança exclusivamente com os gentios que excluiu Israel da promessa da redenção','É condicional baseada no cumprimento perfeito da lei aperfeiçoada pelos profetas do NT'],correct:0,explain:'Jeremias 31:31-34 anuncia a "nova aliança" (berit hadashah): não como a do Sinai que quebraram. A diferença: (1) lei interior — inscrita no coração; (2) conhecimento direto de Deus por todos; (3) perdão completo e definitivo dos pecados. Jesus na Última Ceia disse: "este cálice é a nova aliança no meu sangue."',ref:'Jeremias 31:31-34; Lucas 22:20; Hebreus 8:8-12'},
  {type:'mc',q:'O que aconteceu quando Jeremias ditou para Baraque as profecias em um rolo, e qual foi a reação do rei Jeoaquim?',opts:['O rolo foi lido no Templo e o povo se arrependeu; Jeoaquim jejuou e mandou preservar três cópias','Jeoaquim rasgou o rolo em quatro partes mas mandou preservar uma cópia no arquivo do Templo','Jeoaquim cortou colunas do rolo com canivete e jogou no braseiro; Deus mandou Jeremias escrever tudo de novo com mais julgamentos','Baraque foi preso pelos guardas reais e o rolo confiscado; Jeremias fugiu para o Egito imediatamente'],correct:2,explain:'Baraque leu o rolo no Templo. Príncipes pediram que Jeremias e Baraque se escondessem. O rolo foi lido ao rei no inverno junto ao braseiro. À medida que Jeudi lia 3 ou 4 colunas, Jeoaquim cortava com um canivete e jogava no fogo — sem temor. Deus mandou Jeremias escrever tudo novamente acrescentando mais julgamentos.',ref:'Jeremias 36:23-32'},
  {type:'mc',q:'O que o rei Dario fez na noite em que Daniel foi lançado na cova dos leões, e o que disse ao encontrá-lo vivo de manhã?',opts:['Dormiu em paz confiando no Deus de Daniel após ordenar que os guardas vigiassem a pedra','Enviou dois guardas reais durante toda a noite para monitorar e reportar as horas','Passou a noite em jejum sem música nem sono; de manhã cedo correu à cova e clamou pelo Deus de Daniel','Saiu da capital por vergonha e não quis ouvir o resultado da sentença que ele mesmo assinou'],correct:2,explain:'O rei foi ao palácio, passou a noite em jejum, não levou instrumentos musicais, e o sono fugiu dele. De manhã muito cedo correu à cova e clamou com voz angustiada: "Daniel, servo do Deus vivo, o teu Deus, a quem serves sempre, foi capaz de te livrar dos leões?" Daniel respondeu vivo — o rei regozijou muito.',ref:'Daniel 6:18-23'},
  {type:'mc',q:'Qual é a visão de Daniel em Daniel 7 e o que são o "Ancião de Dias" e o "Filho do Homem" nela?',opts:['Uma visão de quatro reinos terrestres apenas sem figuras celestes ou implicação messiânica','O Ancião de Dias é Deus em trono de fogo; o Filho do Homem vem em nuvens e recebe domínio eterno','São figuras dos arcanjos Miguel e Gabriel que administram os destinos das nações','O Ancião de Dias é Adão ressurreto; o Filho do Homem é o povo de Israel coletivo'],correct:1,explain:'Daniel vê quatro bestas (reinos), depois o Ancião de Dias num trono de chamas com rios de fogo. O Filho do Homem vem sobre nuvens e recebe do Ancião domínio eterno que nunca passará. Jesus usou "Filho do Homem" como auto-designação preferida — uma afirmação velada de divindade e autoridade escatológica.',ref:'Daniel 7:9-14; Marcos 14:62'},
  {type:'mc',q:'O que é a "abominação da desolação" mencionada em Daniel 9:27, 11:31 e 12:11 e como Jesus a usa em Mateus 24?',opts:['Profecia de múltiplo cumprimento: Antíoco IV em 168 a.C. e futuramente como sinal da grande','É símbolo genérico de toda forma de idolatria praticada no Israel do período dos reis','Refere-se exclusivamente a Nabucodonosor que erigiu uma estátua de ouro no Templo','É a destruição do Templo em 70 d.C. pelo general Tito sem nenhuma aplicação futura'],correct:0,explain:'A abominação da desolação foi cumprida primeiro por Antíoco IV que colocou um altar a Zeus no Templo e sacrificou porco (168 a.C.). Em Mateus 24:15 Jesus diz: "quando virdes a abominação da desolação de que falou Daniel... (quem lê entenda) fujam para os montes." Aponta para um cumprimento escatológico futuro também.',ref:'Daniel 9:27; 11:31; Mateus 24:15'},
  {type:'mc',q:'Quais são as "70 semanas" de Daniel 9:24-27 e sobre o que elas tratam?',opts:['Setenta semanas literais de 7 dias — 490 dias de julgamento imediato sobre Jerusalém','Períodos simbólicos sem cronologia real que representam a soberania de Deus sobre a história','Setenta gerações completas desde Adão até o fim do mundo calculadas pela genealogia','Setenta heptadas (grupos de 7 anos = 490 anos) determinadas para acabar a transgressão e trazer a'],correct:3,explain:'Gabriel explica: 70 semanas (shavuim — heptadas, grupos de 7) = 490 anos são determinadas sobre teu povo para: acabar transgressão, fazer expiação pelo pecado, trazer justiça eterna, cumprir visão e ungir o Santo dos Santos. A estrutura: 7+62+1 semanas, com o Messias chegando e sendo cortado após as 69.',ref:'Daniel 9:24-27'},
  {type:'mc',q:'O que Rispa, filha de Aiá, fez pelos corpos dos filhos e netos de Saul que foram entregues aos gibeonitas?',opts:['Ungiu os corpos com especiarias caras e os sepultou secretamente nas colinas de Gileade','Clamou imediatamente ao rei Davi pela justiça antes que os corpos fossem expostos','Estendeu saco sobre a rocha desde o começo da ceifa até a chuva cair, impedindo aves e feras de tocarem os corpos','Fugiu para fora de Israel carregando os corpos para enterrá-los em terra neutra'],correct:2,explain:'Rispa, concubina de Saul, tomou saco e o estendeu sobre a rocha desde o começo da ceifa de cevada até que as chuvas do céu caíram sobre eles — meses. Impediu que as aves do céu os tocassem de dia e as feras do campo de noite. Quando Davi soube, foi buscar os ossos de Saul e Jônatas e deu sepultamento honroso a todos.',ref:'2 Samuel 21:10-14'},
  {type:'mc',q:'Qual foi o pecado de Davi no censo de Israel em 2 Samuel 24, e qual das três punições ele escolheu?',opts:['O censo era proibido pela lei de Moisés; Davi escolheu sete anos de fome sobre Israel','O censo cobrou imposto duplo proibido; Davi escolheu o exílio voluntário de três meses','Davi incluiu estrangeiros residentes no censo; escolheu derrota militar por três horas','Davi numerou o povo por orgulho militar (confiança em números, não em Deus)'],correct:3,explain:'Joabe advertiu Davi mas ele insistiu. Depois ficou com o coração pesado. Deus deu três opções: 7 anos de fome, 3 meses de fuga dos inimigos, ou 3 dias de pestilência. Davi disse: "Caia eu nas mãos do Senhor (pestilência), porque as suas misericórdias são muitas; mas não caia nas mãos dos homens." 70.000 morreram.',ref:'2 Samuel 24:10-15'},
  {type:'mc',q:'Qual mulher sunamita reconheceu Eliseu como homem santo de Deus e preparou um aposento para ele em sua casa?',opts:['A viúva de Sarepta que alimentou Elias com o último punhado de farinha e azeite','A mulher de Jerubaal que escondeu o profeta Gideão durante a perseguição midianita','A mulher sunamita anônima — rica, que preparou cama, mesa, cadeira e candeeiro para','Abigail, esposa de Nabal o Carmeli, que trouxe provisões para Davi e seus homens'],correct:2,explain:'A mulher sunamita (não nomeada) disse a seu marido: "Certamente este que sempre passa por nós é santo homem de Deus; façamos-lhe um pequeno aposento na parede com cama, mesa, cadeira e candeeiro." Em retribuição, Deus lhe deu um filho. Quando o filho morreu, Eliseu o ressuscitou.',ref:'2 Reis 4:9-10'},
  {type:'mc',q:'Qual é a distinção entre o Santo Lugar e o Santo dos Santos no Tabernáculo/Templo, e o que havia em cada um?',opts:['Santo Lugar: a Arca da Aliança; Santo dos Santos: o altar de incenso, menorá e pias','Santo Lugar: pias, lavatórios e altar de bronze; Santo dos Santos: o trono de Deus visível','Santo Lugar: menorá, mesa dos pães, altar de incenso; Santo dos Santos: apenas a Arca da Aliança com os querubins','Santo Lugar e Santo dos Santos eram idênticos em mobília — distinguiam-se apenas pelo acesso'],correct:2,explain:'No Santo Lugar (lugar santo): o candelabro de ouro (menorá), a mesa dos pães da proposição (12 pães) e o altar de incenso. No Santo dos Santos (Qodesh HaQodashim): somente a Arca da Aliança coberta pelos dois querubins de ouro com o propiciatório. Separados pelo véu que se rasgou no momento da morte de Jesus.',ref:'Êxodo 26:33-35; 37:1-29; Mateus 27:51'},
  {type:'mc',q:'O que era o Dia da Expiação (Yom Kippur) em Levítico 16 e qual era o papel dos dois bodes no ritual?',opts:['Ambos os bodes eram sacrificados no altar — os dois simbolizavam os mesmos aspectos da expiação','Ambos os bodes eram soltos no deserto — simbolizando o perdão duplo e a libertação completa','Um bode ia para o povo como refeição festiva e o outro ficava reservado para os sacerdotes','Um bode sacrificado pelo Senhor como oferta pelo pecado; o outro (Azazel) recebia a confissão dos pecados e era solto no deserto'],correct:3,explain:'Dois bodes: sobre um Arão lançava sorte "para o Senhor" — era sacrificado como oferta pelo pecado. Sobre o outro lançava sorte "para Azazel" — o sumo sacerdote confessava sobre sua cabeça todas as iniquidades de Israel e um homem designado o levava para o deserto. Dois aspectos da expiação: sacrifício e remoção do pecado.',ref:'Levítico 16:7-22'},
  {type:'mc',q:'Qual profecia de Zacarias 9:9 é cumprida na entrada de Jesus em Jerusalém e qual detalhe específico ela menciona?',opts:['Alegra-te, ó filha de Sião; o teu rei vem a ti, justo e salvador, humilde e montado num jumento','O rei virá sobre nuvens de glória para julgar a terra com vara de ferro e fogo consumidor','Eu enviarei o meu mensageiro que preparará o caminho antes da chegada do Senhor ao Templo','O teu rei virá em poder e glória e a sua voz será como trovão sobre os mares agitados'],correct:0,explain:'Zacarias 9:9: "Regozijai-vos muito, ó filha de Sião; exultai, ó filha de Jerusalém; eis que o teu rei vem a ti, justo e Salvador, humilde, e montado sobre um jumento, sobre um jumentinho, filho de jumenta." Mateus 21:5 e João 12:15 citam explicitamente essa profecia na entrada triunfal. A humildade messiânica é central.',ref:'Zacarias 9:9; Mateus 21:5'},
  {type:'mc',q:'O que são os "30 siclos de prata" em Zacarias 11:12-13 e como Mateus os aplica a Judas?',opts:['Era o salário mensal de um profeta; Mateus não faz conexão direta com a traição de Judas','Era o preço do resgate de prisioneiro de guerra; aplicado à libertação de Barrabás no julgamento','O pastor foi avaliado em 30 siclos — preço de escravo — e jogados no Templo para o oleiro; Mateus 27 aplica ao dinheiro de Judas','Era oferta voluntária ao Templo de Salomão; não tem relação com a morte de Judas Iscariotes'],correct:2,explain:'Em Zacarias 11 o pastor pede seu salário: 30 siclos — o preço de um escravo gored (Êxodo 21:32). Jogou-os na casa do Senhor, para o oleiro. Mateus 27:9-10 diz: então se cumpriu o dito por Jeremias (citando Zacarias): os 30 siclos jogados no Templo foram usados para comprar o campo do oleiro. Preço irrisório dado ao Messias.',ref:'Zacarias 11:12-13; Mateus 27:9-10'},
  {type:'mc',q:'Qual é o último versículo do Antigo Testamento (Malaquias 4:6) e por que é significativo na transição para o NT?',opts:['Promete a reconstrução do Templo glorificado antes que o sol se ponha no último dia','Anuncia o fim completo do sacerdócio levítico e o início de um sacerdócio eterno no deserto','Envia o profeta Elias que voltará o coração dos pais aos filhos — caso contrário, maldição sobre a terra','Promete que Israel nunca mais será disperso entre as nações após o retorno do exílio'],correct:2,explain:'Malaquias 4:5-6: "Eis que eu vos enviarei o profeta Elias... ele tornará o coração dos pais para os filhos... para que eu não venha e fira a terra de maldição." O AT termina com uma promessa e uma ameaça — e com Elias. O anjo diz a Zacarias que João Batista virá "no espírito e poder de Elias" (Lucas 1:17).',ref:'Malaquias 4:5-6; Lucas 1:17'},
  {type:'mc',q:'Qual é o significado do batismo de João em contraste com o batismo cristão segundo os próprios evangelhos e Paulo?',opts:['João batizava com água para arrependimento; Jesus batizaria com Espírito Santo e fogo','São idênticos — João já batizava em nome do Pai, Filho e Espírito Santo antes de Jesus','O batismo de João era superior pois vinha diretamente de Deus sem intermediário humano','João ensinava que seu batismo substituía a circuncisão para os judeus e gentios convertidos'],correct:0,explain:'João diz: "Eu vos batizo com água para arrependimento; mas aquele que vem depois de mim... vos batizará com o Espírito Santo e com fogo." Em Atos 19:1-6, Paulo encontra discípulos de João em Éfeso que não conheciam o Espírito Santo. Paulo os batizou em nome do Senhor Jesus e o Espírito desceu.',ref:'Mateus 3:11; Atos 19:1-6'},
  {type:'mc',q:'Qual é o "pecado não perdoável" que Jesus descreve em Mateus 12:31-32 e qual era o contexto que o provocou?',opts:['Negação pública de Jesus diante das autoridades romanas em momento de perseguição violenta','Apostasia deliberada após receber pleno conhecimento da verdade segundo Hebreus 6:4-6','Blasfêmia contra o Espírito Santo — atribuir ao diabo as obras do Espírito','Perseguição sistemática de cristãos até a morte como Paulo havia feito antes da conversão'],correct:2,explain:'Os fariseus disseram: "Este não expulsa demônios senão por Belzebu, príncipe dos demônios." Jesus respondeu: todo pecado é perdoável, mas blasfêmia contra o Espírito Santo não será perdoada — nem neste século nem no vindouro. É o pecado de atribuir ao mal o que é claramente obra do Espírito de Deus.',ref:'Mateus 12:24,31-32'},
  {type:'mc',q:'Qual é a estrutura do Sermão da Montanha em Mateus 5-7 e o que são as "bem-aventuranças"?',opts:['É lista de leis que substituem completamente a lei mosaica como novo código de conduta','É sermão político contra a ocupação romana que usa linguagem religiosa como disfarce','É a nova torá de Jesus: as bem-aventuranças (makarios = abençoado) descrevem o caráter do cidadão do','As bem-aventuranças são promessas exclusivamente escatológicas sem aplicação na vida presente'],correct:2,explain:'O Sermão da Montanha (eco do Sinai) é a descrição do caráter e ética do Reino. As bem-aventuranças (do latim beatus, do grego makarios) descrevem quem entra no Reino: pobre em espírito, que chora, manso, que tem fome de justiça. São descritivas do discípulo, não condições para ser salvo. Paralelo com as Bem-Aventuranças de Lucas 6 (Sermão da Planície).',ref:'Mateus 5:3-12; Lucas 6:20-23'},
  {type:'mc',q:'O que significa "maranata" em 1 Coríntios 16:22 e em Apocalipse 22:20?',opts:['É aramaico: maran ata = Nosso Senhor, vem! — clamor litúrgico da igreja primitiva pedindo a volta de Cristo','Significa amém em aramaico — confirmação litúrgica usada no final das orações sinagogas','Significa que a paz de Deus seja com vocês — saudação usada nos cultos domésticos','É bênção sacerdotal judaica adaptada pelos cristãos gentios para uso nas assembleias'],correct:0,explain:'"Maranata" (μαράνα θά) é aramaico: maran atha = "Nosso Senhor, vem!" ou marana tha = "Nosso Senhor veio." Era clamor litúrgico da igreja primitiva — especialmente durante a Ceia do Senhor. Aparece também na Didaquê (séc. 1): "Venha a graça e passe este mundo. Hosana ao Deus de Davi. Maranata!" Apocalipse termina com o mesmo: "Vem, Senhor Jesus."',ref:'1 Coríntios 16:22; Apocalipse 22:20; Didaquê 10:6'},
  {type:'mc',q:'Qual é o argumento de Paulo sobre Abraão em Gálatas 3 para provar que a justificação é pela fé e não pela lei?',opts:['Abraão guardou todos os mandamentos antes de Moisés porque a lei moral é eterna e imutável','Abraão foi justificado pela fé 430 anos ANTES da lei do Sinai — lei não anula aliança já ratificada por Deus','Abraão foi justificado pela circuncisão que recebeu como sinal de sua aliança com Deus','A lei de Abraão era mais simples que a mosaica e por isso suficiente para a justificação'],correct:1,explain:'Paulo argumenta: Abraão creu em Deus e isso lhe foi imputado como justiça (Gn 15:6). A lei veio 430 anos depois. Uma aliança (diatheke) legalmente ratificada não pode ser invalidada por algo posterior. Logo, a promessa a Abraão não depende da lei. A lei foi acrescentada por causa das transgressões até vir a Semente prometida.',ref:'Gálatas 3:6-17; Gênesis 15:6'},
  {type:'mc',q:'O que Paulo quer dizer com "a lei é nosso aio para nos conduzir a Cristo" em Gálatas 3:24?',opts:['A lei salva quem a cumpre perfeitamente até Cristo chegar e inaugurar a nova aliança','A lei continua sendo o guia moral principal mesmo após a conversão e a chegada da fé','O aio (paidagogos) era escravo-guardião que conduzia à escola','A lei foi substituída pelo mandamento do amor ao próximo que resume toda a ética cristã'],correct:2,explain:'Paidagogos não era o professor — era o escravo que acompanhava e guardava a criança, às vezes com disciplina severa. Paulo usa a imagem para dizer que a lei exerce função pedagógica revelando o pecado e apontando para Cristo. "Mas, vinda a fé, já não estamos debaixo do aio" (3:25) — não a aboliu, mas completou sua função.',ref:'Gálatas 3:24-25'},
  {type:'mc',q:'Qual é o argumento central de Hebreus sobre Melquisedeque e por que ele prova que Cristo é superior ao sacerdócio levítico?',opts:['Melquisedeque era mais velho que os levitas — portanto superior por antiguidade cronológica','Melquisedeque era rei e sacerdote ao mesmo tempo provando dupla autoridade real e sagrada','Melquisedeque ofereceu pão e vinho a Abraão prefigurando diretamente a eucaristia cristã','Abraão (pai de Levitas) pagou dízimos a Melquisedeque — Levi nos rins de Abraão pagou'],correct:3,explain:'Hebreus 7 argumenta: (1) Abraão deu dízimos a Melquisedeque — como Levi estava nos rins de Abraão, Levi pagou dízimos ao maior; (2) Melquisedeque abençoou Abraão — o menor é abençoado pelo maior; (3) sem pai, mãe, genealogia, início nem fim de vida registrados — prefigura sacerdote eterno. Logo a ordem de Melquisedeque supera a levítica.',ref:'Hebreus 7:4-17; Gênesis 14:18-20'},
  {type:'mc',q:'O que é a "fé" no famoso capítulo de Hebreus 11 e como o autor a define no versículo 1?',opts:['É crença intelectual nos fatos históricos e doutrinários registrados nas Escrituras','É submissão total à autoridade hierárquica da Igreja e dos seus representantes oficiais','É a certeza (hypostasis) das coisas que se esperam e a prova (elenchos) das coisas que não se','É garantia de prosperidade material e saúde física em resposta à oração persistente'],correct:2,explain:'Hebreus 11:1: "A fé é a certeza (hypostasis = substância, base firme) das coisas que se esperam, e a prova (elenchos = evidência, demonstração) das coisas que se não veem." A fé não é mera esperança vaga mas tem substância — é a realidade antecipada do que ainda não se vê. O capítulo lista Abel, Enoque, Noé, Abraão...',ref:'Hebreus 11:1'},
  {type:'mc',q:'Qual foi a primeira das sete cartas de Apocalipse (capítulos 2-3) e qual era a crítica específica à Igreja de Éfeso?',opts:['Éfeso — elogiada por suportar perseguição romana; criticada pela mornidão espiritual gradual','Esmirna — elogiada por sua riqueza espiritual na pobreza; criticada por tolerar Jezabel','Pérgamo — elogiada pela fé firme; criticada por praticar a doutrina de Balaão e os nicolaítas','Éfeso — elogiada por trabalho, perseverança e discernimento doutrinário; criticada por abandonar o primeiro amor'],correct:3,explain:'Éfeso é a primeira. Cristo a elogia: obras, trabalho, perseverança, ódio às obras dos nicolaítas, teste de falsos apóstolos. Mas: "Tenho contra ti que abandonaste o teu primeiro amor." Ameaça: removerei o teu candeeiro. Promessa ao vencedor: comerá da árvore da vida no paraíso de Deus.',ref:'Apocalipse 2:1-7'},
  {type:'mc',q:'O que distingue a Igreja de Esmirna entre as sete cartas e qual promessa ela recebe?',opts:['É a única das sete igrejas que recebe apenas críticas e nenhum elogio de Cristo','É elogiada por sua riqueza material e prometida expansão e prosperidade crescente','É criticada pela falta de perseverança diante das tribulações mas prometida restauração','É uma das duas igrejas sem crítica — pobre materialmente mas rica espiritualmente'],correct:3,explain:'A Esmirna (junto com Filadélfia) não recebe nenhuma crítica — apenas encorajamento. "Conheço a tua tribulação, pobreza (mas és rico)... Não temas o que estás para sofrer... sê fiel até à morte e eu te darei a coroa da vida. O vencedor não sofrerá dano da segunda morte." Estava sob grave perseguição.',ref:'Apocalipse 2:8-11'},
  {type:'mc',q:'Qual é a crítica à Igreja de Laodiceia e por que Jesus diz que está à porta batendo?',opts:['É criticada pela perseguição que sofre dos romanos; Jesus está batendo para libertá-la','É criticada por tolerar falsos apóstolos nas reuniões; Jesus está avisando do julgamento','É a única sem elogios e sem promessas específicas — apenas sentença de julgamento final','É criticada por ser morna (nem fria nem quente) — Cristo a vomitará'],correct:3,explain:'Laodiceia: "Sei as tuas obras, que não és frio nem quente... porque és morno, vomitar-te-ei da minha boca." A cidade era rica (centro bancário, lã e colírio), mas a Igreja copiou essa confiança na riqueza. A imagem mais perturbadora: Cristo fora de sua própria Igreja batendo à porta. "Se alguém ouvir minha voz e abrir..."',ref:'Apocalipse 3:14-20'},
  {type:'mc',q:'O que é "gematria" e como ela é relevante para interpretar o número 666 em Apocalipse 13:18?',opts:['É técnica de memorização usada pelos escribas para ordenar os rolos do AT de forma prática','É forma de codificação secreta inventada pelos cristãos para esconder Apocalipse dos romanos','Atribui valor numérico às letras — Nero César em hebraico soma exatamente 666; texto diz: calcule o número de um homem','É método hermenêutico de interpretar todas as profecias como alegorias numéricas eternas'],correct:2,explain:'Gematria atribui valores numéricos a letras (alef=1, bet=2, etc.). Nero César transliterado para hebraico (nrwn qsr = nun+resh+waw+nun + qoph+samek+resh) soma exatamente 666. Alguns manuscritos têm 616 — que soma o nome latino "Nero Caesar". O texto em si instrui: "calcule o número de um homem" — aponta para uma pessoa real.',ref:'Apocalipse 13:18'},
  {type:'mc',q:'Qual é a cena do Trono em Apocalipse 4-5 e qual é o significado do Cordeiro que parece ter sido morto?',opts:['O Cordeiro em pé mas com marcas de imolação — o Ressurreto com cicatrizes','É apenas visão de adoração angélica sem significado cristológico ou messiânico específico','O Cordeiro representa Israel o povo sofredor e ressuscitado de entre as nações gentias','É Cristo na segunda vinda apenas sem relação com a encarnação ou o sofrimento da cruz'],correct:0,explain:'O Cordeiro (arnion — diminutivo, vulnerable) está em pé (ressurreto) mas como imolado (marcas visíveis). É o único digno de abrir o livro selado — ninguém no céu, na terra ou debaixo da terra. Os 4 seres viventes e 24 anciãos adoram com harpa e incenso (orações dos santos). Nova canção: "foste morto e com teu sangue compraste para Deus homens de toda nação."',ref:'Apocalipse 5:6-10'},
  {type:'mc',q:'O que significa "parusia" (parousia) no NT e como era usado no mundo greco-romano antes de Paulo?',opts:['Era chegada oficial de rei/imperador a uma cidade com pompa','Significa apenas paz — um cumprimento litúrgico equivalente ao shalom hebraico no NT','Significa fim do mundo — destruição total e recriação do cosmos segundo a cosmologia grega','É sinônimo exato de anastasia — a ressurreição final dos mortos no último dia'],correct:0,explain:'Parousia era termo técnico para a visita oficial de um rei ou general a uma cidade — com celebração, delegação de boas-vindas. Em 1 Tessalonicenses 4:17, os crentes sobem ao encontro (apantesis) do Senhor — o mesmo gesto dos cidadãos que saíam para escortar o rei de volta. Não uma saída do mundo, mas uma boas-vindas escortada.',ref:'1 Tessalonicenses 4:15-17'},
  {type:'mc',q:'O que é o "mistério" (mysterion) que Paulo revela em Efésios 3 e que foi escondido nas eras anteriores?',opts:['A ressurreição dos mortos no terceiro dia — segredo escondido desde a criação do mundo','O nome secreto de Deus que Paulo recebeu na visão do terceiro céu e não pôde revelar','A identidade do Anticristo que estava escondida nas profecias de Daniel e Ezequiel','Judeus e gentios num único corpo (a Igreja) como co-herdeiros e co-participantes'],correct:3,explain:'Paulo diz que o mistério foi ocultado desde os séculos e gerações mas agora foi manifestado: os gentios são co-herdeiros (sygkleronoma), co-membros do mesmo corpo (syssoma) e co-participantes (symmetocha) da promessa em Cristo Jesus. O AT vislumbrava bênção às nações mas não explicitava essa igualdade radical num único corpo.',ref:'Efésios 3:4-6'},
  {type:'mc',q:'Qual é a distinção teológica entre "justificação" e "santificação" na teologia paulina?',opts:['Justificação é o início da fé; santificação é reservada apenas para os muito avançados espiritualmente','Justificação (dikaiosis) é ato forense declaratório instantâneo; santificação é processo progressivo de conformação à imagem de Cristo','Ambas são conquistadas pelo esforço humano acumulado ao longo de anos de disciplina espiritual','Justificação é para judeus que cumprem a lei; santificação é o processo adicional para gentios'],correct:1,explain:'Justificação: Deus nos declara justos (não nos faz gradualmente justos) com base na obra de Cristo — é posicional, forense, instantânea (Romanos 5:1). Santificação: processo progressivo de ser transformado à imagem do Filho (Romanos 8:29; 2 Coríntios 3:18; Filipenses 1:6). Uma é o status, a outra é a transformação da vida.',ref:'Romanos 5:1; 8:29; 2 Coríntios 3:18'},
  {type:'mc',q:'Qual é o argumento de Paulo em Romanos 9-11 sobre a rejeição de Israel e o que ele chama de "mistério" em 11:25?',opts:['Israel foi permanentemente rejeitado e substituído pela Igreja como novo Israel de Deus','A rejeição de Israel é parcial e temporária: endurecimento dura até a plenitude dos gentios entrar','Israel nunca foi rejeitado — a distinção entre Israel étnico e a Igreja é completamente falsa','Paulo ensina que os judeus são salvos pela lei mesmo sem Cristo pois o pacto de Sinai persiste'],correct:1,explain:'Romanos 11:25-26: "não quero que ignoreis este mistério: que o endurecimento em parte aconteceu a Israel até que a plenitude dos gentios haja entrado. E assim todo o Israel será salvo." Paulo usa a metáfora da oliveira: ramos naturais (Israel) foram cortados; ramos selvagens (gentios) enxertados; Deus pode reenxertar os naturais.',ref:'Romanos 11:11,25-26'},
  {type:'mc',q:'Qual é a visão de Isaías no capítulo 6 do trono de Deus, o que os serafins gritavam, e como ela moldou o chamado do profeta?',opts:['Isaías viu anjos cantando e foi chamado sem sentir indignidade pessoal ou necessidade de purificação','Isaías viu o Senhor alto e sublime, serafins gritando Santo, Santo, Santo; brasa purificou seus lábios; disse: envia-me','Isaías viu um carro de fogo como Elias havia visto; foi chamado para ser rei sobre as tribos','Isaías viu o Templo sendo destruído em visão profética; foi chamado para profetizar o exílio'],correct:1,explain:'Isaías 6: trono alto, orla da veste enchendo o Templo, serafins com 6 asas gritando qadosh qadosh qadosh (Santo, Santo, Santo). Isaías: "Ai de mim! Sou perdido, pois sou homem de lábios impuros." Brasa do altar tocou seus lábios: "tua iniquidade está tirada." Então ouviu: "Quem enviarei?" Isaías: "Aqui estou, envia-me."',ref:'Isaías 6:1-8'},
  {type:'mc',q:'Qual é o "novo éxodo" em Isaías 40-55 e como ele se relaciona ao éxodo histórico do Egito?',opts:['É metáfora poética sem relação histórica com o êxodo do Egito ou com qualquer evento real','Isaías 40-55 anuncia segundo êxodo maior: Deus abrirá caminho no deserto como abriu o Mar Vermelho','É exclusivamente sobre o retorno físico da Babilônia sem nenhum significado espiritual mais profundo','É profecia do fim dos tempos que não tem relação com o exílio babilônico do século VI'],correct:1,explain:'Isaías 43:16-21: "Não vos lembreis das coisas passadas... eis que farei uma coisa nova." Deus fará caminho no deserto e rios no ermo — eco do êxodo (nuvem, mar, maná) mas em escala maior. O servo (Ciro/Israel/o Servo messiânico) conduzirá o novo povo. João Batista cita Isaías 40:3 para seu próprio papel no novo êxodo de Jesus.',ref:'Isaías 40:3; 43:16-21; Lucas 3:4'},
  {type:'mc',q:'O que é a "Shekinah" na tradição judaica e como aparece (mesmo que o termo não seja bíblico) nas Escrituras?',opts:['É o nome secreto de Deus — o Tetragramaton revelado a Moisés no meio da sarça ardente','É a presença gloriosa habitante de Deus — manifesta na nuvem e fogo do Êxodo, enchendo o','É uma visão mística reservada exclusivamente aos sumos sacerdotes no Santo dos Santos','É o anjo do Senhor com forma visível que guiou Israel pela coluna de nuvem e fogo'],correct:1,explain:'Shekinah (de shakan — habitar, morar) não aparece literalmente mas o conceito está em toda Bíblia: nuvem e fogo no Tabernáculo (Êxodo 40:34), glória enchendo o Templo de Salomão (1 Reis 8:10-11), glória partindo em Ezequiel 10-11. João 1:14 usa eskénosen (armou tenda entre nós) — a Shekinah se tornou carne em Jesus.',ref:'Êxodo 40:34-35; 1 Reis 8:10-11; João 1:14'},
  {type:'mc',q:'Qual foi o papel de Nicodemos em João e o que seus três aparecimentos revelam sobre sua jornada de fé?',opts:['Foi opositor constante de Jesus que nunca se converteu apesar das três conversas noturnas','Foi o primeiro convertido de Jerusalém e batizado antes de Pentecostes por João o apóstolo','Era irmão de José de Arimateia e os dois sempre creram em Jesus desde o início do ministério','Aparece três vezes: à noite (Jo 3); defendendo Jesus no Sinédrio (Jo 7:50)'],correct:3,explain:'João apresenta Nicodemos em progressão: primeiro "de noite" (trevas = ignorância espiritual) fazendo perguntas sinceras (Jo 3). Depois, defendendo Jesus no Sinédrio: "acaso a nossa lei condena alguém sem primeiro ouvi-lo?" (Jo 7:51). Por último, com José de Arimateia, traz 100 libras de mirra e aloés para o sepultamento — ato público de discipulado.',ref:'João 3:2; 7:50-51; 19:39'},
  {type:'mc',q:'Qual é o significado de "Abba" em Marcos 14:36 e por que Paulo o usa em Romanos 8:15 e Gálatas 4:6?',opts:['É aramaico para pai na forma íntima familiar; Jesus usa em Getsêmani revelando intimidade','É título formal de respeito equivalente a Excelentíssimo ou Venerável na cultura judaica','É nome hebraico secreto de Deus revelado na hora da crucificação e escondido no NT','É tradução aramaica do Tetragramaton usada apenas em contextos de adoração solene'],correct:0,explain:'Abba em aramaico é a forma familiar e íntima de pai — usada por crianças ao pai. Jesus usa em Getsêmani (Mc 14:36): "Abba, Pai, tudo te é possível..." — revelando intimidade filial única mesmo na agonia. Paulo em Rm 8:15 e Gl 4:6 diz que o Espírito de adoção nos faz clamar Abba — mudamos de escravos para filhos com acesso íntimo a Deus.',ref:'Marcos 14:36; Romanos 8:15; Gálatas 4:6'},
  {type:'mc',q:'Qual é a profecia de Joel 2:28-32 e como Pedro a cita em Atos 2 no dia de Pentecostes?',opts:['Joel prometia prosperidade material e colheita abundante; Pedro aplicou à expansão do reino','Joel profetizou derramamento do Espírito sobre toda carne — filhos, filhas, servos profetizarão','Joel falava do exílio assírio do século VIII e Pedro usou alegoricamente sem relação histórica','Joel prometia o retorno físico dos exilados da Babilônia; Pedro aplicou ao retorno ao Templo'],correct:1,explain:'Joel 2:28-32: "Depois disso derramarei o meu Espírito sobre toda carne; vossos filhos e vossas filhas profetizarão... Antes do grande e terrível dia do Senhor, todo aquele que invocar o nome do Senhor será salvo." Pedro em Pentecostes: "Isso é o que foi dito pelo profeta Joel" — o derramamento estava acontecendo ali.',ref:'Joel 2:28-32; Atos 2:16-21'},
  {type:'mc',q:'O que é o "fio escarlate" na história de Raabe em Josué 2, e como ele tipifica a redenção?',opts:['Era sinal que os espias mandaram pendurar na janela para proteger sua casa','Era marca de propriedade filisteia que mostrava que Raabe era agente duplo dos inimigos','Era símbolo tribal dos cananeus que sinalizava neutralidade nas guerras entre cidades','Era apenas a corda de lã vermelha que Raabe usou para descer os espias pela muralha'],correct:0,explain:'Os espias disseram: "Amarra este fio de linha escarlate na janela... todos os da tua casa ficarão salvos." O vermelho/escarlate evoca o sangue: como o sangue nas ombreiras protegeu no Egito, o fio escarlate protegia a casa de Raabe. Raabe — uma prostituta cananeia — é ancestral de Davi e Jesus (Mateus 1:5), salvando-se pela fé.',ref:'Josué 2:18; Mateus 1:5; Hebreus 11:31'},
  {type:'mc',q:'Qual é a primeira aparição do conceito de "aliança" (berit) na Bíblia e com quem Deus a estabeleceu?',opts:['Com Adão no Éden — a aliança das obras que prometia vida pelo cumprimento perfeito','Com Noé após o dilúvio — aliança universal e incondicional com o arco-íris como sinal','Com Abraão no sacrifício dos animais divididos — a aliança abraâmica da promessa','Com Moisés no Sinai — a aliança condicional da lei dada ao povo liberto do Egito'],correct:1,explain:'A primeira aliança explícita com o termo berit é com Noé em Gênesis 6:18 (anúncio) e 9:9-17 (confirmação com o arco-íris). É uma aliança universal e incondicional — Deus se compromete unilateralmente a nunca mais destruir toda carne com dilúvio. O arco-íris (qeshet — arco de guerra) é o sinal: Deus pendurou seu arco de guerra.',ref:'Gênesis 6:18; 9:9-17'},
  {type:'mc',q:'O que distingue a aliança com Abraão da aliança com Moisés em termos de condicionamento, segundo Paulo em Gálatas 3?',opts:['Ambas são igualmente condicionais à obediência perfeita — a diferença é apenas cronológica','A mosaica é a base fundamental; a abraâmica é apenas preparatória e subordinada à lei','Paulo não distingue as duas alianças — trata ambas como expressões da mesma graça','A abraâmica é incondicional — Deus passou entre os animais sozinho enquanto Abraão dormia'],correct:3,explain:'Em Gênesis 15, Deus fez passar a tocha de fogo entre as metades dos animais SOZINHO — Abraão estava em sono profundo. Normalmente, ambas as partes passavam indicando responsabilidade mútua. Deus assumiu o ônus sozinho. A aliança sinaítica (Êxodo 19:5-6) é condicional: "se guardardes minha aliança." Paulo usa isso em Gálatas 3:15-18.',ref:'Gênesis 15:17; Êxodo 19:5-6; Gálatas 3:15-18'},
  {type:'mc',q:'Qual é o significado de "Immanuel" em Isaías 7:14, qual palavra hebraica foi usada, e qual debate existe sobre sua tradução?',opts:['Significa Deus conosco — almah (jovem) pode ser virgem ou jovem mulher; LXX traduziu parthenos','Significa Deus conosco — almah claramente sempre significa virgem virginal sem nenhum debate','Significa Deus salva — é sinônimo exato de Josué e Jesus na tradição hebraica do AT','Significa força de Deus — foi usada historicamente referindo-se apenas ao rei Ezequias'],correct:0,explain:'Immanuel = "Immanu El" = Deus conosco. A palavra hebraica é almah (jovem/donzela — mulher em idade de casar, sem necessariamente implicar virgindade técnica). A LXX (tradução grega do AT feita por judeus) escolheu parthenos (virgem) ao traduzir. Mateus 1:23 cita a LXX aplicando ao nascimento virginal de Jesus — cumprimento superior ao contexto histórico imediato de Isaías.',ref:'Isaías 7:14; Mateus 1:22-23'},
  {type:'mc',q:'Qual é a visão de Ezequiel sobre a glória (kavod) de Deus saindo do Templo antes da destruição de Jerusalém?',opts:['A glória saiu instantaneamente numa explosão de luz dourada visível de toda Jerusalém','A glória se move gradualmente: do Santo dos Santos para o limiar do Templo, depois para o','A glória nunca saiu do Templo — este foi destruído com a presença de Deus ainda dentro','A glória saiu e nunca mais voltou simbolizando o abandono permanente do povo de Israel'],correct:1,explain:'Ezequiel descreve a partida gradual da glória (kavod) como luto solene: 9:3 — da arca para o limiar; 10:4 — se eleva; 10:18-19 — para a porta leste do Templo; 11:22-23 — para o monte ao oriente (Monte das Oliveiras). Abandono gradual antes da destruição. Em Ezequiel 43:1-5 a glória retorna pelo mesmo caminho do leste.',ref:'Ezequiel 9:3; 10:4,18-19; 11:22-23; 43:1-5'},
  {type:'mc',q:'O que é o "Dia do Senhor" (Yom YHWH) nos profetas e como ele é tanto julgamento quanto salvação?',opts:['É conceito dual: julgamento contra inimigos E contra Israel desobediente (Amós: será trevas)','É apenas o Shabat semanal ampliado ao nível cósmico — descanso universal de Deus e da criação','É exclusivamente evento futuro escatológico sem nenhuma aplicação histórica ou imediata','É dia de adoração e festa no Templo quando toda a nação se reunia em Jerusalém'],correct:0,explain:'Amós surpreende: o povo desejava o Dia do Senhor pensando que era só para julgar os inimigos — Amós diz que será trevas para Israel também. Joel usa para o exército de gafanhotos E para o juízo escatológico. Sofonias 1:14-15 descreve sua grandeza. Mas o Dia também inclui salvação: Joel 2:32: "todo que invocar o Senhor será salvo."',ref:'Amós 5:18-20; Joel 2:1-2,28-32; Sofonias 1:14-15'},
