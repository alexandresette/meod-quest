  {type:'mc',q:'Qual profeta do AT ministrou principalmente em Nínive, a capital da Assíria?',opts:['Jonas','Naum','Amós','Sofonias'],correct:0,explain:'Jonas foi enviado a Nínive para pregar o arrependimento. Naum também profetizou contra Nínive — mas um século depois, quando a cidade voltou ao mal.',ref:'Jonas 1:2 / Naum 1:1'},
  {type:'mc',q:'Qual foi a resposta de Deus a Jó após todo seu sofrimento?',opts:['Ele explicou a razão do sofrimento','Ele revelou Sua grandeza e perguntou onde estava Jó na criação','Ele prometeu riquezas dobradas imediatamente','Ele pediu desculpas a Jó'],correct:1,explain:'Deus respondeu a Jó do meio do redemoinho com perguntas poderosas sobre a criação — não deu explicações, mas revelou Sua glória incomparável.',ref:'Jó 38:1-7'},
  {type:'mc',q:'Qual era o ofício de Esdras em Israel?',opts:['Rei','Sacerdote e escriba versado na lei de Moisés','General do exército','Governador persa'],correct:1,explain:'"Esdras era um escriba versado na lei de Moisés... tinha disposto o seu coração a esquadrinhar a lei do Senhor, a cumpri-la e a ensinar os seus estatutos."',ref:'Esdras 7:6,10'},
  {type:'mc',q:'A frase "O Senhor é meu pastor" está em qual salmo?',opts:['Salmo 1','Salmo 22','Salmo 23','Salmo 91'],correct:2,explain:'O Salmo 23, escrito por Davi, ex-pastor de ovelhas, começa com esta metáfora central do cuidado de Deus — um dos textos bíblicos mais memorados.',ref:'Salmo 23:1'},
  {type:'mc',q:'Qual cidade foi destruída por enxofre e fogo por causa da perversidade de seus habitantes?',opts:['Nínive','Babilônia','Sodoma e Gomorra','Jericó'],correct:2,explain:'Gênesis 19 — Deus destruiu Sodoma e Gomorra com enxofre e fogo. Ló e suas filhas escaparam; a esposa olhou para trás e se tornou estátua de sal.',ref:'Gênesis 19:24-26'},
  {type:'mc',q:'Qual carta do NT adverte contra o amor ao dinheiro, chamando-o de raiz de todos os males?',opts:['Tiago','Hebreus','1 Timóteo','1 Coríntios'],correct:2,explain:'"O amor ao dinheiro é a raiz de todos os males." (1 Tm 6:10). Nota: não é o dinheiro em si, mas o amor a ele que é perigoso.',ref:'1 Timóteo 6:10'},
  {type:'mc',q:'Qual evento encerrou o período de 400 anos de silêncio profético antes de João Batista?',opts:['A vinda de Esdras do cativeiro','O nascimento de João Batista e o ministério de Zacarias','A construção do segundo templo','A aliança dos Macabeus'],correct:1,explain:'Após Malaquias (aprox. 430 a.C.), não houve profeta em Israel por cerca de 400 anos. João Batista encerrou esse silêncio como precursor do Messias.',ref:'Malaquias 4:5 / Lucas 1:11-17'},
  {type:'mc',q:'Em qual rio foi batizado Jesus?',opts:['Nilo','Eufrates','Jordão','Quebar'],correct:2,explain:'João Batista batizava no rio Jordão, a leste de Jerusalém. Jesus foi a ele e foi batizado no Jordão, onde o Espírito desceu como pomba.',ref:'Mateus 3:13'},
  {type:'mc',q:'Quantas viagens missionárias Paulo realizou relatadas no livro de Atos?',opts:['1','2','3','4'],correct:2,explain:'O livro de Atos registra três grandes viagens missionárias de Paulo antes de sua viagem final a Roma como prisioneiro.',ref:'Atos 13-14 / 15-18 / 18-21'},
  {type:'mc',q:'Quem era o pai de João Batista?',opts:['José','Zacarias','Simão','Cleofas'],correct:1,explain:'Zacarias era sacerdote idoso da ordem de Abias. O anjo Gabriel anunciou que ele e Isabel teriam um filho chamado João, cheio do Espírito Santo.',ref:'Lucas 1:5-13'},
  {type:'mc',q:'Qual é o significado do nome "Israel"?',opts:['Filho de Deus','Aquele que luta com Deus e prevalece','Povo escolhido','Terra santa'],correct:1,explain:'"Não te chamarás mais Jacó, mas Israel; porque lutaste com Deus e com os homens e prevaleceste." O nome marcou a transformação de Jacó.',ref:'Gênesis 32:28'},
  {type:'mc',q:'Qual era a profissão de Lucas, autor do terceiro Evangelho?',opts:['Pescador','Médico','Cobrador de impostos','Carpinteiro'],correct:1,explain:'"Lucas, o médico amado" — Paulo o chama assim em Colossenses 4:14. Seu vocabulário técnico médico é evidente em seu Evangelho.',ref:'Colossenses 4:14'},
  {type:'mc',q:'Qual livro bíblico contém o Cântico de Débora, um dos textos mais antigos da Bíblia?',opts:['Números','Josué','Juízes','Rute'],correct:2,explain:'Juízes 5 preserva o Cântico de Débora, celebrando a vitória sobre Sísara. É considerado um dos textos hebraicos mais antigos, com características poéticas arcaicas.',ref:'Juízes 5:1-31'},
  {type:'mc',q:'Qual é o primeiro versículo da Bíblia?',opts:['"Toda Escritura é inspirada por Deus."','"No princípio era o Verbo."','"No princípio criou Deus os céus e a terra."','"O Senhor é meu pastor."'],correct:2,explain:'"No princípio criou Deus os céus e a terra" — Gênesis 1:1 é a abertura das Escrituras, estabelecendo Deus como Criador soberano de tudo.',ref:'Gênesis 1:1'},
  {type:'mc',q:'Qual foi o pecado de Uzias que o fez ser atacado de lepra?',opts:['Idolatria','Usurpar o papel do sacerdote queimando incenso no templo','Aliança com a Assíria','Matar profetas'],correct:1,explain:'O rei Uzias, orgulhoso por seu poder, entrou no templo para queimar incenso — papel exclusivo dos sacerdotes. Deus o feriu com lepra imediatamente.',ref:'2 Crônicas 26:16-19'},
  {type:'mc',q:'Qual é o livro mais longo do NT?',opts:['Mateus','João','Atos','Lucas'],correct:3,explain:'O Evangelho de Lucas é o maior livro do NT em extensão, seguido de perto pelo livro de Atos. Juntos formam a maior obra de um único autor no NT.',ref:'Evangelho de Lucas'},
  {type:'mc',q:'Qual parábola Jesus contou para ilustrar quem é o próximo?',opts:['O Filho Pródigo','O Semeador','O Bom Samaritano','Os Talentos'],correct:2,explain:'Para responder "quem é o meu próximo?" Jesus narrou a história de um homem espancado, ignorado por sacerdote e levita, mas socorrido por um samaritano.',ref:'Lucas 10:30-37'},
  {type:'mc',q:'Qual profeta disse "Cria em mim, ó Deus, um coração puro"?',opts:['Isaías','Salomão','Davi','Asafe'],correct:2,explain:'Salmo 51 é o salmo de arrependimento de Davi após ser confrontado por Natã sobre o pecado com Bate-Seba. "Cria em mim um coração puro, ó Deus" (v.10).',ref:'Salmo 51:10'},
  {type:'mc',q:'Quantos livros o Novo Testamento possui?',opts:['25','27','29','30'],correct:1,explain:'O cânon do NT tem 27 livros: 4 Evangelhos, Atos, 13 epístolas paulinas, 8 epístolas gerais (Tiago a Judas) e Apocalipse.',ref:'Cânon NT'},
],
teologo:[
  {type:'mc',q:'O termo hebraico "meod" (מְאֹד) em Deuteronômio 6:5 significa:',opts:['Alma (nefesh)','Coração (lebab)','Força extrema / intensidade máxima','Mente racional (biná)'],correct:2,explain:'"Meod" denota intensidade máxima. O Shema pede amor com lebab (coração/vontade), nefesh (alma/ser) e meod (força e intensidade total).',ref:'Deuteronômio 6:5'},
  {type:'mc',q:'Qual concílio definiu o cânon de 27 livros do NT em 397 d.C.?',opts:['Niceia (325)','Calcedônia (451)','Terceiro Concílio de Cartago (397)','Éfeso (431)'],correct:2,explain:'O Terceiro Concílio de Cartago ratificou o cânon de 27 livros do NT. O Concílio de Hipona (393) havia feito lista similar.',ref:'Concílio de Cartago, 397 d.C.'},
  {type:'mc',q:'O Documento Q (Quelle) na crítica sinótica é:',opts:['Cartas perdidas de Paulo','O Evangelho de Marcos em aramaico','Fonte hipotética com ditos de Jesus compartilhados por Mateus e Lucas','O Evangelho secreto de João'],correct:2,explain:'A teoria das duas fontes: Mateus e Lucas usaram Marcos + fonte "Q" (alemão Quelle = fonte), que conteria principalmente ditos de Jesus.',ref:'Teoria das Fontes Sinóticas'},
  {type:'mc',q:'O que significa "kenose" na cristologia?',opts:['A ressurreição corporal de Cristo','A segunda vinda gloriosa','A dupla natureza de Cristo','O esvaziamento voluntário de prerrogativas divinas na encarnação'],correct:3,explain:'De Filipenses 2:7 — "esvaziou-se a si mesmo". A kenose descreve Cristo renunciando voluntariamente ao uso independente de atributos divinos ao encarnar-Se.',ref:'Filipenses 2:6-8'},
  {type:'mc',q:'Qual heresia afirmava que a humanidade de Cristo era ilusória?',opts:['Arianismo','Nestorianismo','Docetismo','Pelagianismo'],correct:2,explain:'O Docetismo (gr. "dokein" = parecer) ensinava que Cristo apenas parecia humano. 1 João 4:2 é refutação direta.',ref:'1 João 4:2'},
  {type:'mc',q:'Na teologia reformada, a justificação é:',opts:['Participação nos sacramentos','Sinônimo de santificação','Processo progressivo de se tornar justo','Declaração judicial de inocência baseada na justiça imputada de Cristo'],correct:3,explain:'Justificação é forense — Deus declara o pecador justo com base na justiça de Cristo imputada pela fé. É instantânea, não progressiva.',ref:'Romanos 3:21-26 / Lutero'},
  {type:'mc',q:'O "chesed" (חֶסֶד) hebraico significa:',opts:['Amor leal e bondade pactual','Misericórdia emocional passageira','Perdão judicial','Graça comum'],correct:0,explain:'"Chesed" é amor fiel dentro de aliança — comprometimento leal que persiste mesmo quando a outra parte falha. É a característica mais constante do Deus do AT.',ref:'Êxodo 34:6 / Salmo 136'},
  {type:'mc',q:'O argumento ontológico de Anselmo afirma:',opts:['O ser do qual nada maior pode ser concebido deve existir na realidade','A moral universal exige um Legislador divino','A experiência religiosa aponta para Deus','O cosmo exige uma primeira causa'],correct:0,explain:'"Deus é aquele do qual nada maior pode ser pensado." Se existisse só na mente, algo maior poderia ser concebido — contradição. Logo Deus existe necessariamente.',ref:'Proslogion, Anselmo (1078)'},
  {type:'mc',q:'A "pericórese" trinitária descreve:',opts:['A criação ex nihilo','Dupla processão do Espírito Santo','Subordinação do Filho ao Pai','Interpenetração e coinherência mútua das três Pessoas divinas'],correct:3,explain:'Pericórese (João Damasceno) — cada Pessoa da Trindade habita plenamente nas outras sem se confundirem ou separarem. É a comunhão perfeita intratrinitária.',ref:'João Damasceno, séc. VIII'},
  {type:'mc',q:'O Concílio de Niceia (325) usou qual termo para afirmar a divindade do Filho?',opts:['Heteroousios (de substância diferente)','Agennetos (não gerado)','Homoiousios (semelhante em substância)','Homoousios (de mesma substância)'],correct:3,explain:'"Homoousios" foi o termo-chave contra Ário. Niceia afirmou que o Filho é da mesma substância do Pai — plena divindade.',ref:'Concílio de Niceia, 325 d.C.'},
  {type:'mc',q:'Qual livro bíblico não menciona o nome de Deus?',opts:['Rute','Cantares de Salomão','Ester','Jó'],correct:2,explain:'O livro de Ester não menciona "Deus" ou "Senhor" — omissão intencional que convida o leitor a reconhecer a providência divina oculta na história.',ref:'Livro de Ester'},
  {type:'mc',q:'A Teologia da Libertação de Gustavo Gutiérrez usa qual paradigma central?',opts:['O Calvário como expiação individual','O Pentecostes','A criação ex nihilo','O Êxodo como libertação integral'],correct:3,explain:'Gutiérrez (Peru, 1971) usa o Êxodo como modelo de libertação política, social e espiritual, articulando a "opção preferencial pelos pobres".',ref:'Gutiérrez, "Teologia da Libertação" (1971)'},
  {type:'mc',q:'O prólogo de João (Jo 1:1-18) tem qual propósito literário?',opts:['Narrar o nascimento de Jesus em Belém','Estabelecer a identidade cósmica de Jesus como Logos eterno','Apresentar João Batista como Messias','Resumir os sete sinais'],correct:1,explain:'O prólogo joanino — provavelmente hino cristológico — enquadra toda a narrativa: Jesus é o Logos eterno encarnado. É a chave hermenêutica do Evangelho.',ref:'João 1:1-18'},
  {type:'mc',q:'A distinção luterana entre Lei e Evangelho serve para:',opts:['Explicar a predestinação','Provar que o AT foi abolido','Mostrar que a Lei condena; o Evangelho liberta pela graça','Defender os sacramentos'],correct:2,explain:'Para Lutero, a Lei revela o pecado e condena; o Evangelho anuncia a graça gratuita em Cristo. Distinção fundamental na hermenêutica reformadora.',ref:'Lutero / Confissão de Augsburgo (1530)'},
  {type:'mc',q:'No grego do NT, "agape" difere de "eros" pois:',opts:['Não há diferença relevante','São sinônimos','Agape é incondicional e sacrificial; eros é desejante/romântico e ausente no NT','Agape é humano; eros é divino'],correct:2,explain:'"Agape" é amor volitivo, incondicional e sacrificial. "Eros" (amor desejante) não aparece no NT. Também existe "philia" (amor fraternal).',ref:'1 Coríntios 13 / João 3:16'},
  {type:'mc',q:'A "sola scriptura" reformada significa:',opts:['A Escritura é autoridade suprema — norma que normatiza todas as demais normas','Somente o NT tem autoridade','A Bíblia só pode ser interpretada pelo magistério','Razão e tradição devem ser ignoradas'],correct:0,explain:'"Sola scriptura" = Escritura como "norma normans non normata". Razão e tradição são instrumentos legítimos, mas submetidos à autoridade final da Escritura.',ref:'Reforma Protestante / Westminster I.2'},
  {type:'mc',q:'O debate entre amilenismo e premilenismo trata de:',opts:['Se Jesus voltará visivelmente','Se haverá juízo final','Se o AT tem validade','Se os "1000 anos" do Ap 20 são reinado espiritual presente ou reino literal futuro'],correct:3,explain:'Amilenismo: os 1000 anos = reinado espiritual de Cristo na era da Igreja. Premilenismo: Cristo voltará antes de um reino literal de 1000 anos na terra.',ref:'Apocalipse 20:1-6'},
  {type:'mc',q:'A "dupla predestinação" calvinista afirma:',opts:['Deus predestina uns à salvação e outros à condenação para Sua glória','Somente os salvos são predestinados','É igual à doutrina armínia','Deus apenas prevê as escolhas humanas'],correct:0,explain:'Calvino e o Sínodo de Dort ensinaram que Deus soberanamente elege uns à salvação e repruva outros para condenação. Posição controversa mesmo dentro do calvinismo.',ref:'Calvino, Institutos III.21 / Sínodo de Dort (1619)'},
  {type:'mc',q:'A exegese histórico-gramatical busca:',opts:['O sentido pretendido pelo autor original em seu contexto histórico','Alegorizar o texto','Tipologia mediada','Eisegese do intérprete'],correct:0,explain:'A exegese histórico-gramatical busca o sentido original que o autor humano pretendia, considerando gramática, contexto e gênero literário.',ref:'Hermenêutica Bíblica'},
  {type:'mc',q:'O que distingue tipologia de alegoria na hermenêutica?',opts:['Tipologia vê padrões históricos reais prefigurando Cristo; alegoria impõe significados sem âncora histórica','Alegoria é mais fiel ao texto','Tipologia é só do NT','São idênticas'],correct:0,explain:'Tipologia: eventos históricos reais do AT (Adão, cordeiro pascal) prefiguram Cristo. Alegoria: significados espirituais sem base histórica necessária.',ref:'Romanos 5:14 / Hermenêutica'},
  {type:'mc',q:'A "Nova Perspectiva sobre Paulo" de N.T. Wright afirma que:',opts:['Paulo pregava salvação puramente individual','Romanos trata da fidelidade pactual de Deus e da redefinição do povo em Cristo','Paulo rejeitava o AT','A justificação é progressiva'],correct:1,explain:'Wright argumenta que "justiça de Deus" em Romanos = fidelidade à aliança. A "justificação" não é só experiência individual, mas declaração de quem pertence ao povo de Deus.',ref:'N.T. Wright, "What Saint Paul Really Said" (1997)'},
  {type:'mc',q:'A "analogia fidei" hermenêutica significa:',opts:['Cada livro bíblico é independente','O AT contradiz o NT','A Bíblia é interpretada pelo magistério papal','Passagens obscuras devem ser interpretadas à luz das claras da própria Escritura'],correct:3,explain:'"Analogia fidei" — a Escritura interpreta a Escritura. Textos obscuros são iluminados por textos claros dentro da unidade da Revelação divina.',ref:'Confissão de Westminster I.9'},
  {type:'mc',q:'Os Massoretas adicionaram ao hebraico bíblico:',opts:['Os sinais vocálicos (nekudot) para preservar a pronúncia','Os capítulos e versículos','A pontuação grega','Os consonantes originais'],correct:0,explain:'Os Massoretas (séc. 6-10 d.C.) adicionaram os nekudot (pontos vocálicos) ao texto consonantal para preservar a tradição oral de leitura sinagogal.',ref:'Tradição Massorética'},
  {type:'mc',q:'A distinção entre justificação e santificação é:',opts:['Santificação precede a justificação','Justificação é progressiva','São sinônimos','Justificação é posicional e instantânea; santificação é progressiva e contínua'],correct:3,explain:'Justificação: declaração judicial de justo, instantânea, baseada em Cristo. Santificação: processo progressivo de transformação pelo Espírito Santo.',ref:'Romanos 3:21-26 / 2 Coríntios 3:18'},
  {type:'mc',q:'O Teísmo Aberto (Open Theism) propõe:',opts:['Deus predestina tudo incondicionalmente','Deus limitou voluntariamente Seu conhecimento do futuro para preservar a liberdade humana','Salvação depende só das escolhas humanas','O futuro é determinado pela presciência divina'],correct:1,explain:'Pinnock e Boyd propõem que Deus voluntariamente limitou Seu conhecimento do futuro livre para que a liberdade humana seja genuína. Posição controversa.',ref:'Pinnock, "The Openness of God" (1994)'},
  {type:'mc',q:'"Logos" no prólogo de João significa além de "Palavra":',opts:['Apenas comunicação verbal','Razão divina criativa — combina o dabar hebraico com o logos estoico','Nome pessoal do Pai','Um anjo mensageiro'],correct:1,explain:'João funde o "dabar" hebraico (palavra ativa de Deus na história) com o "logos" grego estoico (razão ordenadora). Cristo é a Razão divina encarnada.',ref:'João 1:1-3,14'},
  {type:'mc',q:'A "imago Dei" tem três dimensões clássicas. Qual NÃO é uma delas?',opts:['Substantiva (capacidades racionais e morais)','Funcional (mordomia sobre a criação)','Relacional (comunhão com Deus)','Sacramental (mediação de graça)'],correct:3,explain:'As três dimensões: substantiva, funcional e relacional. "Sacramental" não é categoria padrão da imago Dei na teologia sistemática.',ref:'Gênesis 1:26-28'},
  {type:'mc',q:'A heresia pelagiana condenada em 418 d.C. afirmava:',opts:['O Espírito procede só do Pai','Cristo tinha só natureza divina','O ser humano pode alcançar salvação pela força da própria vontade, sem graça especial','O Filho é subordinado ao Pai'],correct:2,explain:'Pelágio: o ser humano nasce neutro e pode obedecer a Deus pela própria força moral. Agostinho refutou: a graça de Deus é necessária e precedente.',ref:'Concílio de Cartago, 418 d.C. / Agostinho'},
  {type:'mc',q:'O molinismo de Luís de Molina propõe:',opts:['Salvação depende só de escolhas humanas','O futuro é totalmente aberto','Predestinação incondicional','Deus usa scientia media — conhecimento de como livres-arbítrios responderiam em qualquer circunstância'],correct:3,explain:'Molina propôs "scientia media" — Deus ordena a criação usando Seu conhecimento de contrafactuais de liberdade, compatibilizando soberania e liberdade.',ref:'Luís de Molina, "Concordia" (1588)'},
  {type:'mc',q:'O argumento central de Paulo pela ressurreição em 1 Coríntios 15:',opts:['A ressurreição foi só espiritual','Os discípulos inventaram a história','O túmulo vazio confirmado pelos romanos','Se Cristo não ressuscitou, a fé é vã e os mortos em Cristo pereceram'],correct:3,explain:'"Se Cristo não ressuscitou, é vã a nossa pregação e vã a vossa fé." A ressurreição corporal histórica é o fundamento inegociável do Evangelho.',ref:'1 Coríntios 15:14-19'},
  {type:'mc',q:'Qual concílio condenou o Nestorianismo e confirmou Maria como Theotokos?',opts:['Niceia (325)','Calcedônia (451)','Éfeso (431)','Cartago (397)'],correct:2,explain:'O Concílio de Éfeso (431) condenou Nestório e afirmou que Maria é "Theotokos" (Mãe de Deus), porque Jesus é uma única pessoa divina-humana.',ref:'Concílio de Éfeso, 431 d.C.'},
  {type:'mc',q:'O "sola fide" reformado afirma:',opts:['Somente pela graça o pecador é salvo','Somente Cristo é mediador','Somente a Bíblia é autoridade','Somente pela fé o pecador é justificado, sem obras meritórias'],correct:3,explain:'"Sola fide" — somente pela fé — é o artigo pelo qual a Igreja fica de pé ou cai (Lutero). Romanos 3:28: "o homem é justificado pela fé sem as obras da lei."',ref:'Romanos 3:28 / Lutero'},
  {type:'mc',q:'O argumento cosmológico de Tomás de Aquino parte de:',opts:['Todo efeito tem causa; não há regressão infinita; logo há uma Causa Primeira','A consciência moral','O design do universo','A beleza da criação'],correct:0,explain:'"Primeira Via": tudo tem uma causa, a série não pode ser infinita, logo deve haver uma Causa Primeira não causada = Deus.',ref:'Suma Teológica, Tomás de Aquino (1274)'},
  {type:'mc',q:'A "soteriologia" é o ramo da teologia que estuda:',opts:['A natureza de Deus (Trindade)','A doutrina da salvação','A criação e providência divina','As últimas coisas (escatologia)'],correct:1,explain:'Soteriologia (gr. "soteria" = salvação) estuda todos os aspectos da salvação: eleição, regeneração, fé, justificação, santificação e glorificação.',ref:'Teologia Sistemática'},

  {type:'mc',q:'O que é a "Septuaginta" (LXX)?',opts:['Tradução grega do AT feita por 70 (ou 72) estudiosos em Alexandria','A tradução latina da Bíblia por Jerônimo','O texto aramaico do NT','O texto hebraico Massorético'],correct:0,explain:'A LXX (Septuaginta) foi traduzida em Alexandria entre sécs. III-II a.C. por estudiosos judeus. É o AT usado pelos autores do NT e pela Igreja primitiva.',ref:'Carta de Aristeas / séc. III a.C.'},
  {type:'mc',q:'O "filioque" (E do Filho) na doutrina trinitária foi:',opts:['Inserido unilateralmente pelo Ocidente no Credo de Niceno-Constantinopolitano, gerando o Cisma de 1054','Rejeitado por Agostinho','Proposto pelo Concílio de Calcedônia','Acrescentado ao Credo de Niceia pelo Concílio de Éfeso'],correct:0,explain:'O filioque ("que procede do Pai E do Filho") foi adicionado pelo Ocidente. O Oriente defendia que o Espírito procede só do Pai. Foi um dos pivôs do Grande Cisma de 1054.',ref:'Cisma do Oriente e Ocidente, 1054'},
  {type:'mc',q:'O que distingue a "inspiração plenária verbal" da "inspiração conceitual"?',opts:['Plenária verbal: as palavras mesmas foram inspiradas; conceitual: apenas as ideias','Plenária verbal é mais liberal','Conceitual admite erros nos conceitos','São idênticas'],correct:0,explain:'Inspiração plenária verbal sustenta que o próprio texto das Escrituras é divinamente inspirado, não apenas os conceitos ou intenções dos autores.',ref:'2 Timóteo 3:16-17 / Teologia Bíblica'},
  {type:'mc',q:'A "doutrina da Trindade econômica versus imanente" refere-se a:',opts:['Trindade na história da salvação vs. Trindade em si mesma na eternidade','Divisão de funções econômicas','Diferença entre AT e NT','Posições de Ariano vs. Niceia'],correct:0,explain:'Trindade econômica = como as três Pessoas operam na história da salvação. Trindade imanente (ontológica) = o ser intratrinitário eterno. Karl Rahner: "a Trindade econômica É a Trindade imanente."',ref:'Karl Rahner / Teologia Sistemática'},
  {type:'mc',q:'O que é "eisegese" em hermenêutica?',opts:['Leitura contextual','Trazer significados externos para o texto em vez de extrair o sentido do texto','Estudo das formas literárias','Análise dos manuscritos'],correct:1,explain:'Eisegese = ler para dentro (eis = para dentro em grego) — impor ao texto um significado pré-determinado. O oposto de exegese (ler para fora = extrair o sentido original).',ref:'Hermenêutica Bíblica'},
  {type:'mc',q:'Qual é a diferença entre "apócrifos" e "pseudoepígrafos"?',opts:['Apócrifos são livros de autoria questionável; pseudoepígrafos têm autoria falsamente atribuída','Apócrifos são mais antigos','Pseudoepígrafos são apenas gregos','São sinônimos'],correct:0,explain:'Apócrifos: livros de canonicidade debatida. Pseudoepígrafos: textos atribuídos a personagens bíblicos (Enoque, Moisés) mas escritos muito depois — autoria falsa.',ref:'Cânon Bíblico / Literatura Intertestamentária'},
  {type:'mc',q:'O "Sitz im Leben" (situação na vida) na crítica das formas refere-se a:',opts:['O contexto geográfico','O contexto social e religioso original em que uma tradição oral nasceu','A data de composição','O autor original'],correct:1,explain:'Hermann Gunkel desenvolveu o conceito: cada perícope bíblica nasce de uma situação concreta (culto, lei, sabedoria). Entender o Sitz im Leben é chave para a crítica das formas.',ref:'Hermann Gunkel / Crítica das Formas'},
  {type:'mc',q:'O "Sacramento da Eucaristia" gerou debate entre Lutero (consubstanciação) e Zuínglio porque:',opts:['Discordavam sobre quem podia presidir','Lutero: Cristo está real mas não fisicamente no pão; Zuínglio: é simbólico e memorial','Lutero queria abolir a Eucaristia','Zuínglio defendia a transubstanciação'],correct:1,explain:'Na Colóquio de Marburgo (1529), Lutero defendeu a presença real de Cristo "em, com e sob" os elementos (consubstanciação). Zuínglio defendia que é memorial simbólico.',ref:'Colóquio de Marburgo, 1529'},
  {type:'mc',q:'A distinção entre "teologia natural" e "teologia revelada" é:',opts:['Natural é superior','Revelada não precisa de razão','São opostas e excludentes','Natural: conhecimento de Deus pela razão e criação; Revelada: conhecimento pela Escritura e Cristo'],correct:3,explain:'Teologia natural (Romanos 1:19-20) é o conhecimento de Deus acessível pela razão e criação. Teologia revelada depende da revelação especial nas Escrituras e em Cristo.',ref:'Romanos 1:19-20 / Tomás de Aquino'},
  {type:'mc',q:'O que é o "princípio da analogia" na historiografia bíblica de Ernst Troeltsch?',opts:['Eventos históricos únicos podem ser compreendidos pela analogia com eventos conhecidos — implica que milagres devem ser rejeitados','A Bíblia usa muitas analogias','Método de leitura tipológica','O passado é incompreensível'],correct:0,explain:'Troeltsch: tudo no passado deve ser compreendido por analogia com o presente. Isso levaria a excluir milagres. Teólogos conservadores rejeitam esta premissa naturalista.',ref:'Ernst Troeltsch / Método Histórico-Crítico'},
  {type:'mc',q:'O que é o "consenso de Lausanne" (1974)?',opts:['Documento sobre a Trindade','Resposta ao Vaticano II','Acordo sobre batismo','Declaração evangélica sobre missão mundial, evangelismo e responsabilidade social'],correct:3,explain:'O Pacto de Lausanne (1974), liderado por Billy Graham e John Stott, definiu a missão integral evangelizando e engajando as necessidades sociais.',ref:'Pacto de Lausanne, 1974'},
  {type:'mc',q:'A "terceira busca pelo Jesus histórico" (Third Quest) se distingue por:',opts:['Focar apenas nos milagres de Jesus','Aceitar todos os evangelhos apócrifos','Rejeitar completamente o NT','Colocar Jesus firmamente no contexto do judaísmo do século I como profeta escatológico'],correct:3,explain:'A Terceira Busca (Sanders, Meier, Wright) situa Jesus no judaísmo do século I como pregador escatológico do Reino — um avanço sobre as buscas anteriores.',ref:'E.P. Sanders, N.T. Wright / Terceira Busca'},
  {type:'mc',q:'Qual é a posição da "teologia do processo" (Whitehead/Cobb)?',opts:['Deus criou o mundo do nada','A Trindade é a base da criação','Deus é imutável e onipotente','Deus é dipolar — persuade mas não controla; sofre com o mundo e é afetado pela história'],correct:3,explain:'A teologia do processo (baseada em Whitehead) propõe um Deus que não é onipotente, mas persuasivo. Deus é afetado pela criação e evolui com ela.',ref:'Whitehead, Process and Reality / Cobb'},
  {type:'mc',q:'O que é o "Canon within the Canon" (cânon dentro do cânon)?',opts:['O AT dentro do NT','A prática de privilegiar certos textos bíblicos como critério de interpretação dos demais','Os livros apócrifos dentro do cânon','O Pentateuco como base do NT'],correct:1,explain:'Lutero privilegiava Romanos e Gálatas. Críticos modernos usam o "cânon interno" metodologicamente. A questão é se isso compromete a autoridade de toda a Escritura.',ref:'Lutero / Hermenêutica Crítica'},
  {type:'mc',q:'A "cristologia de baixo" difere da "cristologia de cima" porque:',opts:['São idênticas','De cima é herética','De baixo nega a divindade; de cima afirma','De baixo parte da humanidade histórica de Jesus chegando à sua divindade; de cima parte da preexistência divina'],correct:3,explain:'"De baixo": começa com Jesus histórico e pergunta como Ele é divino. "De cima": começa com o Logos preexistente que se encarna. João 1 é a cristologia "de cima" por excelência.',ref:'Rahner, Pannenberg, Schillebeeckx / Cristologia'},
  {type:'mc',q:'O "Sínodo de Dort" (1618-1619) definiu os cinco pontos do calvinismo. Qual é o acrônimo em inglês?',opts:['GRACE','TULIP','FAITH','CALVN'],correct:1,explain:'TULIP: Total depravity, Unconditional election, Limited atonement, Irresistible grace, Perseverance of saints. Os cinco pontos em resposta aos Remonstrantes arminianos.',ref:'Sínodo de Dort, 1618-1619'},
  {type:'mc',q:'O que é a "recapitulação" na teologia de Ireneu de Lião?',opts:['A repetição do batismo','Cristo recapitula (resume e restaura) toda a humanidade em Si mesmo, desfazendo o que Adão fez','A releitura do AT','A renovação da aliança'],correct:1,explain:'Ireneu: assim como Adão foi cabeça da humanidade caída, Cristo é a nova cabeça que recapitula (anakephalaiosis) toda a história humana, restaurando o que foi perdido.',ref:'Ireneu, Adversus Haereses / séc. II'},
  {type:'mc',q:'O que distingue a "expiação penal substitutiva" da "teoria moral da expiação"?',opts:['São idênticas','Penal substitutiva: Cristo pagou a pena pelo pecado no lugar dos culpados; moral: a cruz nos influencia moralmente','Penal é protestante; moral é católica','Moral inclui ressurreição; penal não'],correct:1,explain:'Penal substitutiva (Anselmo, Reforma): Cristo satisfez a justiça divina sofrendo a pena pelo pecado humano. Teoria Moral (Abelardo): a cruz é exemplo de amor que nos transforma.',ref:'Anselmo, Cur Deus Homo / Abelardo'},
  {type:'mc',q:'O "Documento de Uppsala" (CMI, 1968) é associado a qual mudança?',opts:['Fundação da aliança evangélica','Defesa da inerrância bíblica','Reorientação do ecumenismo para evangelização social e política','Promulgação do Vaticano II'],correct:2,explain:'A Assembleia de Uppsala do Conselho Mundial de Igrejas marcou uma virada para questões políticas e sociais, gerando reação evangelica que culminou em Lausanne.',ref:'CMI Uppsala, 1968'},
  {type:'mc',q:'A "perspectiva da aliança" (covenant theology) interpreta a Bíblia principalmente por:',opts:['Os sete dias da criação','Duas alianças: obras (Adão) e graça (Cristo), com um único povo de Deus do AT ao NT','Os três ofícios de Cristo','A lei cerimonial'],correct:1,explain:'A teologia da aliança vê a história redentora como continuidade: aliança de obras (Adão), aliança de graça (Cristo). Contrasta com o dispensacionalismo, que divide a história.',ref:'Westminster Confession / Teologia da Aliança'},
  {type:'mc',q:'Qual é a diferença entre "cessacionismo" e "continuacionismo"?',opts:['Cessacionismo é pentecostal','Continuacionismo rejeita a Bíblia','São idênticos','Cessacionismo: dons milagrosos cessaram com o cânon; continuacionismo: todos os dons continuam na era da Igreja'],correct:3,explain:'Cessacionismo (B.B. Warfield): os dons de sinais (línguas, cura) cessaram com o fechamento do cânon. Continuacionismo: todos os dons continuam enquanto a Igreja existe.',ref:'1 Coríntios 12-14 / Warfield'},
  {type:'mc',q:'O que é a "exegese canônica" de Brevard Childs?',opts:['Usar apenas o cânon protestante','Rejeitar a crítica histórica','Ignorar o contexto histórico','Interpretar cada texto em relação ao cânon completo, em vez de isolar perícopes'],correct:3,explain:'Childs propõe que o significado teológico de um texto emerge de seu lugar no cânon final, não apenas de sua origem histórica. Uma reação à hipercrítica histórica.',ref:'Brevard Childs, Introduction to the OT as Scripture'},
  {type:'mc',q:'O "extra Calvinisticum" afirma que:',opts:['A graça é irresistível','Calvino era mais extremo que Lutero na predestinação','O Logos, mesmo encarnado, continua sustentando o universo — não estava inteiramente "contido" em Jesus','Cristo não é divino'],correct:2,explain:'Os luteranos criticavam: o Logos era totalmente contido na humanidade de Jesus. Calvino: o Filho encarnado também está fora (extra) da carne sustentando o cosmos.',ref:'João 1:3 / Calvino, Institutos II.13.4'},
  {type:'mc',q:'O que é "theopneustos" em 2 Timóteo 3:16?',opts:['Título de um bispo','Referência ao Espírito Santo','Nome grego de Deus','Literalmente "soprado por Deus" — a palavra grega para inspirada'],correct:3,explain:'"Theopneustos" (θεόπνευστος) = theos (Deus) + pneō (soprar). "Toda Escritura é inspirada por Deus" — literalmente "soprada por Deus". Base da doutrina da inspiração.',ref:'2 Timóteo 3:16'},
  {type:'mc',q:'A "Confissão de Westminster" (1646) é o documento fundante de qual tradição?',opts:['Luterana','Anglicana','Presbiteriana/Reformada','Batista'],correct:2,explain:'A Confissão de Westminster (1646) é o símbolo doutrinal central do presbiterianismo e de muitas igrejas reformadas, cobrindo toda a teologia sistemática.',ref:'Confissão de Westminster, 1646'},
  {type:'mc',q:'O que é o "círculo hermenêutico"?',opts:['Método de leitura em grupo','O uso de concordâncias','Leitura circular sem saída','A interdependência entre texto e intérprete: compreender o todo exige entender as partes e vice-versa'],correct:3,explain:'Schleiermacher e Dilthey: para entender o todo (Bíblia) é preciso entender as partes; para entender as partes é preciso o todo. A compreensão avança em espiral.',ref:'Schleiermacher / Hermenêutica Filosófica'},
  {type:'mc',q:'A "doutrina da impassibilidade divina" afirma que:',opts:['Deus mudou Sua natureza na encarnação','Deus não se importa com o sofrimento humano','Deus não é afetado por emoções ou sofrimento externo — é imutável em Sua perfeição','Deus sofre com a criação'],correct:2,explain:'A impassibilidade divina (doutrina clássica) afirma que Deus não está sujeito a sofrimento ou paixão como criaturas. Teólogos modernos como Moltmann questionam esta posição.',ref:'Teologia Clássica / Moltmann, O Deus Crucificado'},
  {type:'mc',q:'Qual é a tese central da "teologia da cruz" (theologia crucis) de Lutero?',opts:['A lei é mais importante que o Evangelho','O batismo é a única forma de graça','A glória é o centro da teologia','Deus se revela paradoxalmente no sofrimento e fraqueza da cruz, não na glória e poder'],correct:3,explain:'Lutero contra a "theologia gloriae": Deus não é conhecido pela glória, sabedoria e poder, mas sub contrario — sub cruce, no oposto: fraqueza, sofrimento, cruz.',ref:'Lutero, Heidelberger Disputation (1518)'},
  {type:'mc',q:'A "batalha de Armagedão" em Apocalipse 16 é entendida de quantas formas principais?',opts:['Apenas uma (literal)','Duas: literal (batalha terrena futura) e simbólica (conflito espiritual da história)','Três: pré-milenista literal, amilenar simbólico, pós-milenista gradual','Quatro variações'],correct:2,explain:'As principais leituras: (1) Premilenismo: batalha literal futura em Meggido. (2) Amilenismo: símbolo do conflito cósmico final. (3) Pós-milenismo: derrota gradual do mal.',ref:'Apocalipse 16:16 / Escatologia'},
  {type:'mc',q:'O que é "cessio bonorum" no contexto da teologia da justificação?',opts:['Cessão da justiça de Cristo ao crente e do pecado do crente a Cristo — a "grande troca"','Distribuição de bens na Igreja primitiva','Renúncia ao mundo antes do batismo','Abandono de bens materiais para a salvação'],correct:0,explain:'A "grande troca" ou "communicatio idiomatum salvífico": Cristo tomou o pecado do crente; ao crente é imputada a justiça perfeita de Cristo. Base da justificação forense.',ref:'2 Coríntios 5:21 / Lutero'},
  {type:'mc',q:'O conceito de "missio Dei" (missão de Deus) é atribuído principalmente a:',opts:['Karl Barth e depois desenvolvido por Georg Vicedom','Lutero','Calvino','Billy Graham'],correct:0,explain:'"Missio Dei": a missão não é da Igreja — é de Deus, e a Igreja é convidada a participar da missão que o Pai, Filho e Espírito já estão realizando. Barth elaborou, Vicedom popularizou.',ref:'Karl Barth / Georg Vicedom, Missio Dei (1958)'},
  {type:'mc',q:'O que é o "argumento do design" (teleológico) para a existência de Deus?',opts:['A ordem e o design no universo apontam para um Designer inteligente','A consciência moral exige um Legislador','A experiência religiosa é universal','A existência de Deus é provada pela necessidade de uma Causa Primeira'],correct:0,explain:'O argumento teleológico (Paley, a analogia do relógio) e seu análogo moderno — o argumento do Design Inteligente — argumentam que a complexidade implica um Designer.',ref:'Tomás de Aquino, 5ª Via / William Paley'},
  {type:'mc',q:'A "Lei dos Três Usos" (triplex usus legis) na Reforma inclui:',opts:['Uso político, pedagógico e normativo','Uso cerimonial, moral e civil','Lei antiga, nova e eterna','Lei escrita, oral e espiritual'],correct:0,explain:'(1) Uso civil/político: restringe o pecado na sociedade. (2) Uso pedagógico/teológico: revela o pecado e leva a Cristo. (3) Uso normativo: guia o crente regenerado. Calvino enfatizou o 3º.',ref:'Calvino, Institutos II.7 / Melanchthon'},
  {type:'mc',q:'O que é o "Logos spermatikos" nos apologistas do século II?',opts:['A Torá como Palavra de Deus','O Verbo que gerou o universo fisicamente','A semente do Logos divino presente em toda a razão humana, permitindo alguma verdade fora do cristianismo','O Filho antes da encarnação'],correct:2,explain:'Justino Mártir: o Logos divino semeou (sperma) sua razão em todo ser humano. Filósofos como Sócrates participaram do Logos. Base para o diálogo entre fé e razão.',ref:'Justino Mártir, Apologia I / séc. II'},
  {type:'mc',q:'Qual é o tema central da carta aos Hebreus?',opts:['O papel dos dons espirituais','A justificação pela fé','A segunda vinda de Cristo','A superioridade de Cristo sobre toda a aliança mosaica: sacerdócio, sacrifício e Templo'],correct:3,explain:'Hebreus argumenta metodicamente que Cristo é superior a anjos, Moisés, Josué, Arão — Seu sacerdócio é melhor, Seu sacrifício é final, Sua aliança é nova e perfeita.',ref:'Hebreus 1:1-4 / 10:1-10'},
  {type:'mc',q:'O "credo de Atanásio" (Quicumque Vult) é especialmente importante por:',opts:['Condenar o Islã','Ser o credo mais curto','Formular com precisão a doutrina da Trindade e a dupla natureza de Cristo de forma ortodoxa','Ser o primeiro credo do NT'],correct:2,explain:'O Athanasian Creed formula detalhadamente a Trindade: "nem confundindo as pessoas, nem dividindo a substância" e a dualidade de Cristo — completamente divino e humano.',ref:'Credo de Atanásio / séc. V'},
  {type:'mc',q:'A "hermenêutica suspeita" de Paul Ricoeur e outros afirma:',opts:['A Bíblia deve ser rejeitada','Todo texto pode esconder interesses de poder ou distorções inconscientes que o leitor deve questionar','A hermenêutica é impossível','Somente a tradição importa'],correct:1,explain:'Ricoeur, seguindo Freud, Marx e Nietzsche — "mestres da suspeita" — propõe ler textos questionando interesses ocultos. Importante para teologias da libertação e feminista.',ref:'Paul Ricoeur, De l\'interprétation / 1965'},
  {type:'mc',q:'O que é o "princípio de Sola Gratia" na soteriologia reformada?',opts:['Sola Gratia é idêntico ao Sola Fide','A graça é um dos fatores da salvação','A salvação é inteiramente pela graça de Deus, sem contribuição meritória humana','Graça e obras cooperam igualmente'],correct:2,explain:'"Sola Gratia" — somente pela graça. Deus não salva por méritos humanos, mas por pura graça. É diferente de Sola Fide: graça é a causa; fé é o instrumento receptor.',ref:'Efésios 2:8-9 / Confissão de Augsburgo'},
  {type:'mc',q:'A "Teologia da Missão Integral" de René Padilla propõe:',opts:['Somente evangelismo verbal','A missão abrange proclamação do Evangelho e transformação social como dimensões inseparáveis','A política deve liderar a Igreja','Abandono das missões tradicionais'],correct:1,explain:'Padilla (IFES) cunhou "misión integral" em Lausanne (1974): proclamação e demonstração do Evangelho são inseparáveis — a missão da Igreja envolve toda a realidade humana.',ref:'René Padilla, "Misión Integral" / Lausanne 1974'},
  {type:'mc',q:'Qual é a estrutura do argumento de Anselmo no "Cur Deus Homo"?',opts:['Deus quis humilhar-se livremente','O pecado infinitamente ofende a honra divina; apenas um ser infinito pode reparar; logo Deus se faz homem para oferecer satisfação','Deus sacrificou Cristo para aplacar Sua ira','A expiação é moral e exemplo'],correct:1,explain:'Anselmo (séc. XI): a ofensa ao infinito Deus exige satisfação infinita. Humanos finitos não podem dar. Somente Deus-homem pode: daí a necessidade da encarnação e morte.',ref:'Anselmo, Cur Deus Homo (1098)'},
  {type:'mc',q:'O "semipelagianismo" se distingue do pelagianismo porque:',opts:['Pelagianos aceitam a graça preveniente','São idênticos','Semipelagianos admitem que a graça é necessária mas afirmam que a iniciativa (início da fé) pode vir do ser humano','Semipelagianos rejeitam a Bíblia'],correct:2,explain:'Pelagianos: o ser humano pode se salvar sem graça. Semipelagianos: a graça é necessária, mas o ser humano pode dar o primeiro passo. Condenado no Concílio de Orange (529 d.C.).',ref:'Concílio de Orange, 529 d.C.'},
  {type:'mc',q:'O que a expressão grega "eschaton" significa em teologia?',opts:['Primeiro princípio','A coisa final, o fim dos tempos','Julgamento parcial','O Messias'],correct:1,explain:'"Eschaton" (ἔσχατον) = o último, o fim. Escatologia (logos + eschaton) é o estudo das coisas últimas: morte, ressurreição, julgamento, eternidade.',ref:'Mateus 24:3 / Teologia Sistemática'},
  {type:'mc',q:'O que é o "duplo efeito" na ética teológica de Tomás de Aquino?',opts:['Uma ação pode ter dois efeitos — um bom e um mau — sendo lícita se o efeito bom é intencionado e o mau é tolerado, não desejado','Dois tipos de lei: natural e positiva','O duplo mandamento de amor','Dois fins igualmente válidos para qualquer ato'],correct:0,explain:'O princípio do duplo efeito: uma ação com dois efeitos (ex: cirurgia que salva mas pode causar dor) é moral se (1) o ato em si é bom, (2) o efeito bom não é causado pelo mau.',ref:'Tomás de Aquino, Suma Teológica II-II'},
  {type:'mc',q:'Qual é o argumento de C.S. Lewis no "Trilemma" (Lorde, Louco ou Mentiroso)?',opts:['Jesus foi apenas um grande mestre moral','Jesus afirmou ser Deus; ou era o que disse (Senhor), ou estava mentindo ou era louco — não pode ser apenas bom mestre','A divindade de Jesus é irrelevante','Os evangelhos são mitologia'],correct:1,explain:'C.S. Lewis em "Mere Christianity": Jesus afirmou ser Deus. Ou Ele é Senhor (verdade), ou era Louco (errado sobre si), ou era Mentiroso (consciente). A neutralidade é impossível.',ref:'C.S. Lewis, Mere Christianity (1952)'},
  {type:'mc',q:'O que é o "paradoxo da onipotência" na filosofia da religião?',opts:['Deus pode criar o impossível','Pode Deus criar uma pedra que Ele mesmo não consiga levantar? — questiona se a onipotência é autocontraditória','Deus não é onipotente','A onipotência divina exclui o livre-arbítrio'],correct:1,explain:'O paradoxo da pedra: se Deus pode fazer tudo, pode criar pedra que Ele não levanta? Respostas: onipotência não inclui o logicamente impossível; Deus escolheu autolimitação.',ref:'Filosofia da Religião / Tomás de Aquino'},
  {type:'mc',q:'A teologia de Karl Barth é caracterizada como "neoortodoxa" porque:',opts:['Retorna ao catolicismo romano','Retoma categorias ortodoxas (Palavra de Deus, graça, revelação) rejeitando o liberalismo, mas sem fundamentalismo','Defende a inerrância bíblica plena','É idêntica ao fundamentalismo'],correct:1,explain:'Barth rejeitou o liberalismo protestante (que identificava cultura/progresso com o Reino). Reafirmou: Deus é "totalmente Outro", revelado unicamente em Jesus Cristo.',ref:'Karl Barth, Carta aos Romanos (1919) / Dogmática Eclesiástica'},
  {type:'mc',q:'O que é a "via negativa" (apofática) na teologia?',opts:['Negar a existência de Deus','Conhecer Deus pelo que Ele NÃO é (não limitado, não corpóreo, não temporal) — pois a realidade divina supera toda linguagem positiva','A teologia que nega os milagres','Rejeição da metafísica'],correct:1,explain:'Via apofática (teologia negativa): Deus transcende toda categoria humana. Dizemos o que Deus não é. Dionísio Areopagita e Gregório de Nissa desenvolveram esta tradição.',ref:'Dionísio Areopagita / Teologia Mística'},
  {type:'mc',q:'Qual concílio ecumênico definiu a doutrina das duas naturezas (humana e divina) em Cristo sem mistura, confusão, divisão ou separação?',opts:['Niceia (325)','Éfeso (431)','Calcedônia (451)','Constantinopla II (553)'],correct:2,explain:'O Concílio de Calcedônia (451) formulou o "Horos" calcedonense: Cristo é uma Pessoa em duas naturezas, sem mistura, confusão, divisão ou separação — a definição cristológica clássica.',ref:'Concílio de Calcedônia, 451 d.C.'},
  {type:'mc',q:'O que é o "Sitz im Lesen" (situação na leitura) na hermenêutica contemporânea?',opts:['A situação do leitor atual que inevitavelmente influencia como o texto é lido e interpretado','O contexto geográfico do texto','A língua original do texto','Igual ao Sitz im Leben'],correct:0,explain:'Além do Sitz im Leben (contexto original), há o Sitz im Lesen — o horizonte do leitor. Gadamer: toda interpretação é fusão de horizontes (texto + leitor). Base da hermenêutica pós-moderna.',ref:'Gadamer, Verdade e Método / Hans Robert Jauss'},
  {type:'mc',q:'O que caracteriza a "pneumatologia" como disciplina teológica?',opts:['Estudo da oração','Estudo dos sacramentos','Estudo dos anjos','Estudo do Espírito Santo: sua pessoa, obras e manifestações na Igreja e no crente'],correct:3,explain:'Pneumatologia (pneuma = espírito em grego): ramo da teologia sistemática que estuda a terceira Pessoa da Trindade — identidade, processão, obras e dons do Espírito Santo.',ref:'João 14-16 / Teologia Sistemática'},
  {type:'mc',q:'Qual foi o contributo específico de Agostinho à doutrina do pecado original?',opts:['Limitou o pecado ao corpo','Negou o pecado original','Formulou a transmissão do pecado e da culpa adâmica a toda a humanidade por geração biológica, afetando vontade e razão','Propôs que só Adão pecou'],correct:2,explain:'Agostinho (contra Pelágio) ensinou que toda a humanidade pecou "em Adão", transmitindo culpa e natureza corrompida. A vontade está cativa — só a graça liberta.',ref:'Agostinho, De Peccato Originali / séc. V'},
  {type:'mc',q:'O que é "kerigma" na teologia do NT?',opts:['O ensino sistemático da fé','O núcleo da proclamação apostólica: morte, ressurreição e senhoria de Jesus Cristo','A liturgia semanal','As parábolas de Jesus'],correct:1,explain:'Kerigma (κήρυγμα) = proclamação. C.H. Dodd identificou o kerigma apostólico: Cristo morreu pelos pecados, foi sepultado, ressuscitou, foi exaltado e virá de novo.',ref:'C.H. Dodd, The Apostolic Preaching (1936) / 1 Coríntios 15:3-5'},
  {type:'mc',q:'O "Decálogo" em Êxodo 20 é estruturado em quantas tábuas segundo a tradição reformada?',opts:['Duas tábuas: deveres para com Deus (1-4) e deveres para com o próximo (5-10)','Três tábuas temáticas','Quatro grupos de mandamentos','Uma tábua com dez mandamentos'],correct:0,explain:'A tradição reformada divide o Decálogo em duas tábuas: a primeira (1-4) sobre o amor a Deus; a segunda (5-10) sobre o amor ao próximo — estrutura que Jesus confirma em Marcos 12:30-31.',ref:'Êxodo 20 / Calvino, Institutos II.8'},
  {type:'mc',q:'Qual hermenêutica é central para a Teologia Reformada na interpretação do AT?',opts:['Leitura puramente histórica sem NT','O AT é irrelevante para cristãos','Alegoria pura','A interpretação cristotélica: todo o AT aponta para Cristo como seu telos (fim/cumprimento)'],correct:3,explain:'"Cristo é o fim (telos) da lei" (Rm 10:4). A hermenêutica cristotélica lê o AT esperando que aponte para Cristo — prefigurações tipológicas, profecias e promessas cumpridas.',ref:'Lucas 24:27 / Romanos 10:4'},
  {type:'mc',q:'O que é o "minúsculo 33" no textual crítico do NT?',opts:['Um manuscrito grego do séc. IX chamado "rainha das cursivas" por sua qualidade textual','O 33º capítulo do NT','Código para o texto alexandrino','O menor fragmento do NT'],correct:0,explain:'O minúsculo 33 (séc. IX) é considerado o melhor dos manuscritos minúsculos do NT — chamado "queen of the minuscules". Representa o tipo textual alexandrino.',ref:'Crítica Textual do NT / Bruce Metzger'},
  {type:'mc',q:'A "confessio augustana" (Confissão de Augsburgo, 1530) foi redigida por:',opts:['Ulrico Zuínglio','Martinho Lutero','Filipe Melanchthon','João Calvino'],correct:2,explain:'Melanchthon redigiu os 28 artigos apresentados ao Imperador Carlos V. Lutero estava proibido de entrar no império. É o documento fundante do luteranismo.',ref:'Confissão de Augsburgo, 1530 / Melanchthon'},
  {type:'mc',q:'Qual é o argumento central do livro de Romanos segundo a maioria dos exegetas?',opts:['A justiça de Deus revelada no Evangelho de Jesus Cristo, justificando pela fé judeus e gentios igualmente','A ética cristã cotidiana','A escatologia','A doutrina da predestinação'],correct:0,explain:'"A justiça de Deus se revela de fé em fé" (Rm 1:17). Paulo demonstra que todos — judeus e gentios — são culpados, e que Deus justifica a ambos gratuitamente pela fé em Cristo.',ref:'Romanos 1:16-17 / 3:21-26'},
  {type:'mc',q:'O que é o "iluminismo divino" na gnoseologia de Agostinho?',opts:['A luz solar como metáfora da graça','A mente humana precisa da iluminação direta de Deus para conhecer verdades eternas e imutáveis','O conhecimento empírico é suficiente','Deus revela apenas na Bíblia'],correct:1,explain:'Agostinho: as verdades imutáveis (matemática, ética, Deus) não vêm da experiência. A mente as conhece pela iluminação divina — Deus como "Mestre interior" (De Magistro).',ref:'Agostinho, De Magistro / Solilóquios'},
  {type:'mc',q:'O que é o "princípio de caridade" na interpretação bíblica e filosófica?',opts:['Interpretação alegórica','Dar dinheiro a quem precisa','Interpretar o texto (ou interlocutor) na forma mais favorável possível antes de criticar','Método de leitura piedosa'],correct:2,explain:'O princípio de caridade hermenêutico: antes de refutar, leia o argumento alheio na sua versão mais forte. Aplicado à Bíblia: ler textos difíceis na melhor luz possível.',ref:'Hermenêutica / Donald Davidson'},
  {type:'mc',q:'A "doutrina da providência" distingue "providência geral" de "providência especial" porque:',opts:['Especial é milagres; geral é lei natural','São idênticas','Geral: sustento de toda a criação; especial: cuidado particular de Deus com Seu povo e os eventos da redenção','Geral é AT; especial é NT'],correct:2,explain:'Providência geral: Deus sustenta, preserva e governa toda a criação. Providência especial: intervenção particular no fluxo da história para cumprir propósitos redentivos.',ref:'Mateus 6:26-30 / Calvino, Institutos I.16-17'},

  {type:'mc',q:'O que é a "hypostasis" na teologia trinitária de Calcedônia?',opts:['Pessoa individual subsistente — cada uma das três distinções pessoais na Trindade','Natureza divina','Vontade divina','Substância comum das três Pessoas'],correct:0,explain:'"Hypostasis" (ὑπόστασις) = pessoa subsistente. Na Trindade: três hypostaseis (Pai, Filho, Espírito) numa ousia (substância/natureza). Confundi-los era erro dos modalistass.',ref:'Concílio de Calcedônia / Teologia Trinitária'},
  {type:'mc',q:'O que é o "sensus plenior" na hermenêutica bíblica?',opts:['O sentido literal do texto','Um sentido mais pleno que Deus pretendia além do que o autor humano conscientmente pretendia','O sentido alegórico','O sentido moral do texto'],correct:1,explain:'Sensus plenior (sentido mais pleno): Deus como autor divino pode ter intencionado um significado além do que o autor humano compreendia — especialmente em profecias messiânicas.',ref:'Romanos 15:4 / Hermenêutica Bíblica'},
  {type:'mc',q:'A doutrina da "perseverança dos santos" (Calvino) difere da "segurança eterna" popular porque:',opts:['Calvino rejeitava a perseverança','São idênticas','Perseverança: os eleitos verdadeiramente perseveram até o fim; segurança popular: qualquer conversão garante salvação independentemente da vida','"Segurança eterna" é mais rigorosa'],correct:2,explain:'A perseverança calvinista é robusta: os verdadeiramente eleitos perseveram. A "segurança eterna" popular pode ser mal usada para garantir salvação a conversões superficiais.',ref:'João 10:28 / Calvino, Institutos III.24'},
  {type:'mc',q:'O que é o "gênero apocalíptico" na literatura bíblica?',opts:['Gênero literário que usa visões simbólicas, linguagem codificada e dualismo cósmico para revelar realidades transcendentes','Somente o livro do Apocalipse','Profecias de destruição','Textos sobre o apocalipse nuclear'],correct:0,explain:'O gênero apocalíptico (Daniel, Apocalipse, partes de Ezequiel, Zacarias) usa visões dramáticas, bestas, números simbólicos e cenas celestiais para revelar verdades sobre a história e o fim.',ref:'Daniel 7 / Apocalipse 1:1 / Teologia do NT'},
  {type:'mc',q:'O "Covenant of Redemption" (Pacto de Redenção ou "Pactum Salutis") refere-se a:',opts:['A aliança com Noé','O acordo eterno intratrinitário pelo qual o Filho concordou em encarnar e redimir os eleitos','A aliança da Reforma','O novo pacto em Cristo'],correct:1,explain:'Teologia federal reformada: antes da criação, as três Pessoas da Trindade firmaram um "pactum salutis" — o Pai envia, o Filho se oferece, o Espírito aplica a redenção.',ref:'João 6:37-40 / Teologia Federal'},
  {type:'mc',q:'O que significa "comunicatio idiomatum" na cristologia clássica?',opts:['O ensino dos apóstolos','Comunicação entre as igrejas','A troca de propriedades: os atributos de ambas as naturezas são atribuídos à única Pessoa de Cristo','Trindade como comunicação interna'],correct:2,explain:'"Communicatio idiomatum" (troca das propriedades): porque Cristo é uma única Pessoa com duas naturezas, diz-se que "Deus sofreu" e "o homem criou o universo" — referindo-se à única Pessoa.',ref:'João 1:14 / Concílio de Éfeso / Calcedônia'},
]
};
