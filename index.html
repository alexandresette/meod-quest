<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20viewBox%3D%220%200%20112%2092%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpolygon%20points%3D%220%2C0%2028%2C0%2056%2C58%2084%2C0%20112%2C0%2056%2C92%22%20fill%3D%22%234A90D4%22/%3E%3Cpolygon%20points%3D%2264%2C2%2046%2C40%2058%2C40%2050%2C90%2076%2C34%2063%2C34%2072%2C2%22%20fill%3D%22%23F5A623%22/%3E%3C/svg%3E">
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meod Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated;}
:root{
  --br:#7B3F00;--or:#E07B20;--or2:#9E4E00;--cr:#F5F0DC;--dk:#1a0a00;
  --raso-sky1:#5BBFEA;--raso-sky2:#B8E8FF;
  --fundo-sky1:#4A5568;--fundo-sky2:#B8860B;
  --teo-sky1:#0D1B2A;--teo-sky2:#1A1A2E;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Press Start 2P',monospace;background:#000;}
#game{width:100vw;height:100vh;position:relative;overflow:hidden;}

/* ════ SCENE (fills 100%) ════ */
#scene-bg{position:absolute;inset:0;z-index:0;}
#scene-bg svg{width:100%;height:100%;display:block;}

/* ════ WEATHER ════ */
#weather{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden;}
.rdrop{position:absolute;width:2px;background:linear-gradient(transparent,rgba(160,210,255,.55));pointer-events:none;}
@keyframes rfall{from{top:-8%;}to{top:108%;}}
@keyframes lflash{0%,84%,86%,100%{opacity:0;}85%{opacity:1;background:rgba(210,230,255,.2);}}

/* ════ CHAR LAYER ════ */
#chars{position:absolute;bottom:78px;left:0;right:0;z-index:7;pointer-events:none;display:flex;justify-content:space-between;align-items:flex-end;padding:0 clamp(16px,5vw,80px);}
#char-l,#char-r{flex-shrink:0;}

/* ════ GROUND ════ */
#ground{position:absolute;bottom:0;left:0;right:0;z-index:6;pointer-events:none;}
#ground svg{display:block;width:100%;height:85px;}

/* ════ SCREENS ════ */
.screen{position:absolute;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;}
.screen.active{display:flex;}

/* ════ MENU SCREEN ════ */
#menu-screen{background:transparent;pointer-events:none;}
.mc{pointer-events:all;display:flex;flex-direction:column;align-items:center;gap:13px;margin-top:-40px;}
.logo{font-size:clamp(22px,5vw,46px);color:#fff;
  text-shadow:5px 5px 0 var(--br),3px 3px 0 var(--or),-2px -2px 0 rgba(255,240,150,.25);
  animation:logoF 3s ease-in-out infinite;text-align:center;letter-spacing:2px;}
.tagline{font-size:clamp(6px,.9vw,8px);color:rgba(255,255,210,.9);text-shadow:2px 2px 0 rgba(0,0,0,.8);
  margin:-4px 0 6px;text-align:center;letter-spacing:1px;}
@keyframes logoF{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

/* ════ ANIMATED MENU BG ELEMENTS ════ */
/* clouds drift across menu */
.mcloud{position:absolute;z-index:1;pointer-events:none;opacity:.85;}
.mcloud1{animation:cloudDrift1 22s linear infinite;}
.mcloud2{animation:cloudDrift2 30s linear infinite;}
.mcloud3{animation:cloudDrift3 26s linear infinite;}
@keyframes cloudDrift1{from{transform:translateX(-220px);}to{transform:translateX(calc(100vw + 220px));}}
@keyframes cloudDrift2{from{transform:translateX(-300px);}to{transform:translateX(calc(100vw + 300px));}}
@keyframes cloudDrift3{from{transform:translateX(calc(100vw + 200px));}to{transform:translateX(-200px);}}
/* floating stars on menu */
.mstar{position:absolute;z-index:1;pointer-events:none;
  width:4px;height:4px;background:#FFD700;border-radius:0;
  animation:starTwinkle 2s steps(2) infinite;}
@keyframes starTwinkle{0%,100%{opacity:1;}50%{opacity:.2;}}
/* birds flying */
.mbird{position:absolute;z-index:3;pointer-events:none;font-size:14px;
  animation:birdFly 18s linear infinite;}
@keyframes birdFly{from{transform:translateX(-60px) translateY(0);}
  25%{transform:translateX(25vw) translateY(-15px);}
  50%{transform:translateX(50vw) translateY(5px);}
  75%{transform:translateX(75vw) translateY(-10px);}
  to{transform:translateX(calc(100vw+60px)) translateY(0);}}

/* ════ BUTTONS ════ */
.pbtn{font-family:'Press Start 2P',monospace;font-size:clamp(8px,1.3vw,10px);
  color:#fff;background:var(--or);border:none;padding:12px 26px;cursor:pointer;
  border-bottom:6px solid var(--or2);border-right:4px solid var(--or2);
  border-top:2px solid rgba(255,230,150,.3);border-left:2px solid rgba(255,230,150,.2);
  box-shadow:4px 4px 0 rgba(0,0,0,.5);
  transition:transform .08s,border-bottom-width .08s,box-shadow .08s;
  min-width:200px;text-align:center;}
.pbtn:hover{filter:brightness(1.12);}
.pbtn:active{transform:translate(3px,4px);border-bottom-width:2px;border-right-width:1px;box-shadow:1px 1px 0 rgba(0,0,0,.4);}
.pbtn-blue{background:#3949AB;border-bottom-color:#1a237e;border-right-color:#1a237e;}
.pbtn-red{background:#C62828;border-bottom-color:#7f0000;border-right-color:#7f0000;}
.pbtn-gray{background:#555;border-bottom-color:#222;border-right-color:#222;}
.pbtn-green{background:#2E7D32;border-bottom-color:#1a4d1d;border-right-color:#1a4d1d;}
.pbtn-gold{background:#E65100;border-bottom-color:#BF360C;border-right-color:#BF360C;}

/* ════ MODAL BASE ════ */
.modal-bg{position:absolute;inset:0;z-index:45;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);}
.modal-bg.on{display:flex;}
.mbox{background:var(--cr);border:5px solid var(--dk);box-shadow:10px 10px 0 var(--dk);
  padding:28px 34px;display:flex;flex-direction:column;align-items:center;gap:12px;
  max-width:500px;width:93%;animation:popIn .3s ease;}
@keyframes popIn{from{transform:scale(.72);}to{transform:scale(1);}}
.mbox-title{font-size:14px;color:var(--br);text-align:center;}
.mbox-sub{font-size:6.5px;color:#777;text-align:center;}

/* ════ DIFF SCREEN ════ */
#diff-screen{background:rgba(0,0,0,.55);backdrop-filter:blur(4px);}
.dpanel{background:var(--cr);border:5px solid var(--dk);box-shadow:10px 10px 0 var(--dk);
  padding:26px 32px;display:flex;flex-direction:column;align-items:center;gap:11px;
  max-width:500px;width:93%;}
.dbtn{font-family:'Press Start 2P',monospace;width:100%;padding:12px 16px;
  border:4px solid var(--dk);cursor:pointer;font-size:9px;line-height:1.8;
  text-align:left;box-shadow:5px 5px 0 var(--dk);transition:transform .08s,box-shadow .08s;}
.dbtn:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--dk);filter:brightness(1.07);}
.dbtn:active{transform:translate(5px,5px);box-shadow:0 0 0 var(--dk);}
.dbtn span{font-size:6px;display:block;margin-top:4px;opacity:.75;}
.dbtn-raso{background:#A8E6CF;color:#0d3b24;}
.dbtn-fundo{background:#FFD93D;color:#5a3600;}
.dbtn-teo{background:#FF8A65;color:#5a1500;}

/* ════ LEADERBOARD SCREEN ════ */
#lb-screen{background:rgba(0,0,0,.6);backdrop-filter:blur(4px);}
.lb-panel{background:var(--cr);border:5px solid var(--dk);box-shadow:12px 12px 0 var(--dk);
  padding:26px 32px;max-width:560px;width:93%;display:flex;flex-direction:column;gap:12px;
  max-height:88vh;overflow:hidden;}
.lb-tabs{display:flex;gap:6px;}
.lbtab{font-family:'Press Start 2P',monospace;font-size:7px;padding:8px 12px;
  border:3px solid var(--dk);cursor:pointer;background:#ddd;color:var(--dk);
  box-shadow:3px 3px 0 var(--dk);transition:all .08s;}
.lbtab.active-raso{background:#A8E6CF;color:#0d3b24;}
.lbtab.active-fundo{background:#FFD93D;color:#5a3600;}
.lbtab.active-teologo{background:#9C6FDE;color:#1a0030;}
.lb-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;min-height:200px;}
.lb-row{display:flex;align-items:center;gap:8px;padding:8px 10px;
  border:3px solid var(--dk);background:#fff;font-size:7.5px;color:var(--dk);}
.lb-row.gold{background:#FFF9C4;border-color:#F9A825;}
.lb-row.silver{background:#F5F5F5;border-color:#9E9E9E;}
.lb-row.bronze{background:#FFF0E0;border-color:#A1887F;}
.lb-rank{font-size:11px;min-width:28px;text-align:center;}
.lb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-pts{font-size:8px;color:var(--or2);min-width:56px;text-align:right;}
.lb-time{font-size:6px;color:#888;min-width:42px;text-align:right;}
.lb-correct{font-size:7px;color:#2E7D32;min-width:36px;text-align:right;font-weight:bold;}
.lb-empty{font-size:7px;color:#aaa;text-align:center;padding:28px;opacity:.7;}

/* ════ HUD ════ */
#hud{position:absolute;top:0;left:0;right:0;z-index:30;display:none;
  padding:10px 16px;justify-content:space-between;align-items:center;
  background:linear-gradient(180deg,rgba(0,0,0,.7) 0%,transparent 100%);}
#hud.on{display:flex;}
.hud-l,.hud-r{display:flex;align-items:center;gap:7px;}
.heart{font-size:20px;filter:drop-shadow(0 2px 0 #8b0000);transition:all .25s;}
.heart.dead{filter:grayscale(1) opacity(.25);transform:scale(.75);}
.progbg{width:clamp(80px,12vw,120px);height:14px;background:#111;border:3px solid rgba(255,255,255,.28);overflow:hidden;}
.progfill{height:100%;background:linear-gradient(90deg,#4CAF50,#8BC34A);transition:width .45s;
  box-shadow:inset 0 3px 0 rgba(255,255,255,.2);}
.qnum{font-size:7px;color:#fff;text-shadow:2px 2px 0 #000;}
.dpill{font-size:6px;padding:3px 9px;border:2px solid rgba(255,255,255,.3);
  color:#fff;background:rgba(0,0,0,.4);}
/* Timer bar */
#timer-bar-wrap{position:absolute;top:0;left:0;right:0;z-index:31;height:5px;display:none;}
#timer-bar-wrap.on{display:block;}
#timer-bar{height:5px;background:#FFD700;width:100%;transition:width .25s linear;
  box-shadow:0 0 6px #FFD700;}

/* ════ QUESTION AREA ════ */
#q-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(95%,640px);z-index:25;display:none;animation:slideU .3s ease;}
#q-wrap.on{display:block;}
@keyframes slideU{from{transform:translate(-50%,-44%);opacity:0;}to{transform:translate(-50%,-50%);opacity:1;}}
.qtype-lbl{font-size:clamp(9px,1.6vw,13px);color:#fff;
  text-shadow:3px 3px 0 rgba(0,0,80,.85),-2px -2px 0 rgba(0,0,80,.5);
  text-align:center;margin-bottom:10px;letter-spacing:2px;}
.qbox{background:rgba(245,240,220,.97);border:5px solid var(--dk);
  box-shadow:8px 8px 0 rgba(0,0,0,.65);}
.qbox-inner{padding:20px 24px 16px;}
.q-text{font-size:clamp(10px,1.6vw,13px);color:var(--dk);text-align:center;line-height:2.1;margin-bottom:16px;}
.ogrid{display:grid;gap:9px;}
.ogrid.two{grid-template-columns:1fr 1fr;}
.ogrid.four{grid-template-columns:1fr 1fr;}
.obt{font-family:'Press Start 2P',monospace;font-size:clamp(7.5px,1.15vw,10px);
  padding:12px 8px;border:3px solid var(--dk);background:var(--cr);color:var(--dk);
  cursor:pointer;box-shadow:4px 4px 0 rgba(0,0,0,.38);transition:transform .08s,box-shadow .08s,background .1s;
  line-height:1.6;text-align:center;}
.obt:hover:not(:disabled){background:#fff8d6;transform:translate(-2px,-2px);box-shadow:6px 6px 0 rgba(0,0,0,.38);}
.obt:active:not(:disabled){transform:translate(3px,3px);box-shadow:1px 1px 0 rgba(0,0,0,.38);}
.obt.tv{color:#1a1a1a;font-size:clamp(12px,1.9vw,15px);}
.obt.fv{color:#C62828;font-size:clamp(12px,1.9vw,15px);}
.obt.correct{background:#A8E6CF!important;border-color:#2e7d32!important;color:#0d3b24!important;transform:translate(-2px,-2px);box-shadow:6px 6px 0 #2e7d32!important;}
.obt.wrong{background:#FFCCCC!important;border-color:#c62828!important;color:#5a0000!important;}
.obt:disabled{cursor:default;}
/* QUIT strip below options */
.q-quit-strip{padding:10px 24px 14px;text-align:center;}
.quit-inline{font-family:'Press Start 2P',monospace;font-size:6.5px;color:#888;
  background:transparent;border:2px dashed #bbb;padding:5px 16px;cursor:pointer;
  transition:color .12s,border-color .12s;}
.quit-inline:hover{color:#C62828;border-color:#C62828;}

/* ════ FEEDBACK ════ */
#feedback{position:absolute;inset:0;z-index:40;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.58);backdrop-filter:blur(2px);}
#feedback.on{display:flex;}
.fbcard{background:var(--cr);border:5px solid var(--dk);box-shadow:10px 10px 0 rgba(0,0,0,.65);
  padding:26px 32px;text-align:center;max-width:490px;width:92%;animation:popIn .3s ease;}
.fbbanner{padding:10px 18px;margin-bottom:14px;font-size:15px;letter-spacing:2px;border:3px solid var(--dk);}
.fbbanner.ok{background:#A8E6CF;color:#0d3b24;}
.fbbanner.bad{background:#FFCCCC;color:#5a0000;}
.fb-explain{font-size:clamp(9px,1.45vw,12px);color:#333;line-height:2.1;margin-bottom:10px;text-align:left;}
.fb-ref{font-size:clamp(7px,1.1vw,9px);color:#888;margin-bottom:16px;font-style:italic;}

/* ════ SCORE POPUP ════ */
.spop{position:absolute;z-index:35;font-family:'Press Start 2P',monospace;
  pointer-events:none;animation:popfly 1.3s ease forwards;}
@keyframes popfly{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-70px) scale(1.6);}}

/* ════ NAME ENTRY MODAL ════ */
#name-modal{z-index:60;}
#name-input{font-family:'Press Start 2P',monospace;font-size:11px;
  padding:10px 14px;border:4px solid var(--dk);background:#fff;color:var(--dk);
  width:100%;box-shadow:inset 2px 2px 0 rgba(0,0,0,.15);outline:none;}
#name-input:focus{border-color:var(--or);}

/* ════ RESULT SCREEN ════ */
#result-screen{background:rgba(0,0,0,.62);backdrop-filter:blur(4px);}
.rescard{background:var(--cr);border:5px solid var(--dk);box-shadow:12px 12px 0 rgba(0,0,0,.65);
  padding:30px 36px;text-align:center;max-width:530px;width:92%;animation:popIn .4s ease;}
.res-icon{font-size:55px;margin-bottom:8px;}
.res-title{font-size:clamp(12px,2.6vw,18px);color:var(--br);text-shadow:3px 3px 0 var(--or);margin-bottom:8px;}
.res-stars{font-size:24px;margin-bottom:8px;letter-spacing:5px;}
.res-score{font-size:clamp(9px,1.5vw,12px);color:var(--dk);margin-bottom:6px;}
.res-pts{font-size:clamp(8px,1.3vw,10px);color:#555;margin-bottom:6px;}
.res-verse{font-size:clamp(7.5px,1.2vw,9.5px);color:#555;line-height:2.2;
  border-left:4px solid var(--or);padding:8px 14px;text-align:left;margin:8px 0 18px;}
.res-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* ════ LOADING ════ */
#load-screen{background:#060614;z-index:100;}
.load-title{font-size:clamp(20px,4.5vw,38px);color:var(--or);text-shadow:3px 3px 0 var(--br);
  margin-bottom:22px;animation:logoF 1.5s ease-in-out infinite;}
.lbar-bg{width:300px;height:20px;background:#111;border:4px solid var(--or2);max-width:88vw;}
.lbar-fill{height:100%;background:var(--or);width:0%;transition:width .12s;}
.load-txt{font-size:7px;color:#666;margin-top:12px;}

/* ════ CHAR ANIMATIONS ════ */
@keyframes breathe{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes breatheR{0%,100%{transform:translateY(0) scaleX(-1);}50%{transform:translateY(-5px) scaleX(-1);}}
</style>
</head>
<body>
<div id="game">

<!-- ══ SCENE BG (full 100% SVG) ══ -->
<div id="scene-bg"></div>

<!-- ══ WEATHER ══ -->
<div id="weather"></div>

<!-- ══ ANIMATED MENU ELEMENTS (clouds/birds injected by JS) ══ -->
<div id="menu-anim" style="position:absolute;inset:0;z-index:3;pointer-events:none;"></div>

<!-- ══ CHARACTERS ══ -->
<div id="chars"><div id="char-l"></div><div id="char-r"></div></div>

<!-- ══ GROUND ══ -->
<div id="ground">
<svg viewBox="0 0 800 85" preserveAspectRatio="none">
  <rect x="0" y="0" width="800" height="1" fill="#81C784"/>
  <rect x="0" y="1" width="800" height="14" fill="#4CAF50"/>
  <rect x="0" y="6" width="800" height="4" fill="#66BB6A"/>
  <rect x="0" y="15" width="800" height="70" fill="#8B5E3C"/>
  <rect x="0" y="18" width="800" height="5" fill="#795548"/>
  <rect x="10" y="24" width="56" height="14" fill="#7B5231" opacity=".42"/>
  <rect x="84" y="24" width="56" height="14" fill="#7B5231" opacity=".42"/>
  <rect x="158" y="24" width="56" height="14" fill="#7B5231" opacity=".42"/>
  <rect x="232" y="24" width="56" height="14" fill="#7B5231" opacity=".42"/>
  <rect x="306" y="24" width="56" height="14" fill="#7B5231" opacity=".42"/>
  <rect x="380" y="24" width="56" height="14" fill="#7B5231" opacity=".42"/>
  <rect x="454" y="24" width="56" height="14" fill="#7B5231" opacity=".42"/>
  <rect x="528" y="24" width="56" height="14" fill="#7B5231" opacity=".42"/>
  <rect x="602" y="24" width="56" height="14" fill="#7B5231" opacity=".42"/>
  <rect x="676" y="24" width="56" height="14" fill="#7B5231" opacity=".42"/>
  <rect x="47" y="40" width="56" height="13" fill="#7B5231" opacity=".32"/>
  <rect x="121" y="40" width="56" height="13" fill="#7B5231" opacity=".32"/>
  <rect x="195" y="40" width="56" height="13" fill="#7B5231" opacity=".32"/>
  <rect x="269" y="40" width="56" height="13" fill="#7B5231" opacity=".32"/>
  <rect x="343" y="40" width="56" height="13" fill="#7B5231" opacity=".32"/>
  <rect x="417" y="40" width="56" height="13" fill="#7B5231" opacity=".32"/>
  <rect x="491" y="40" width="56" height="13" fill="#7B5231" opacity=".32"/>
  <rect x="565" y="40" width="56" height="13" fill="#7B5231" opacity=".32"/>
  <rect x="639" y="40" width="56" height="13" fill="#7B5231" opacity=".32"/>
  <rect x="713" y="40" width="56" height="13" fill="#7B5231" opacity=".32"/>
</svg>
</div>

<!-- ══ TIMER BAR ══ -->
<div id="timer-bar-wrap"><div id="timer-bar"></div></div>

<!-- ══ HUD ══ -->
<div id="hud">
  <div class="hud-l">
    <div id="lives-disp"></div>
    <div class="dpill" id="dpill"></div>
    <button id="mute-btn" onclick="G.toggleMute()" style="font-family:'Press Start 2P',monospace;font-size:9px;background:rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.3);color:#fff;padding:4px 8px;cursor:pointer;">🔊</button>
  </div>
  <div class="hud-r">
    <span class="qnum" id="qnum">1/10</span>
    <div class="progbg"><div class="progfill" id="progfill" style="width:0%"></div></div>
    <span style="font-size:18px;filter:drop-shadow(2px 2px 0 #7a5000)">⭐</span>
  </div>
</div>

<!-- ══ QUESTION WRAP ══ -->
<div id="q-wrap">
  <div class="qtype-lbl" id="qtype-lbl"></div>
  <div class="qbox">
    <div class="qbox-inner">
      <div class="q-text" id="q-text"></div>
      <div class="ogrid" id="opts"></div>
    </div>
    <div class="q-quit-strip">
      <button class="quit-inline" onclick="G.confirmQuit()">✕ desistir</button>
    </div>
  </div>
</div>

<!-- ══ FEEDBACK ══ -->
<div id="feedback">
  <div class="fbcard">
    <div class="fbbanner" id="fb-banner"></div>
    <div class="fb-explain" id="fb-explain"></div>
    <div class="fb-ref" id="fb-ref"></div>
    <button class="pbtn" id="fb-next" onclick="G.next()">PRÓXIMA ➜</button>
  </div>
</div>

<!-- ══ PAUSE MODAL ══ -->
<div id="pause-modal" class="modal-bg">
  <div class="mbox">
    <div class="mbox-title">⏸ DESISTIR?</div>

  var timeBonus=Math.max(0,Math.round((30-avgSec)*1.5*correct));
  return base+timeBonus;
}

// ══════════════ WEATHER ══════════════
function setWeather(diff){
  var w=document.getElementById('weather');w.innerHTML='';
  function makeRain(n,speed,tilt,opa){
    for(var i=0;i<n;i++){
      var d=document.createElement('div');d.className='rdrop';
      d.style.cssText='left:'+(Math.random()*110-5)+'%;height:'+(50+Math.random()*70)+'px;'
        +'animation:rfall '+(speed+Math.random()*.5)+'s '+'linear '+(-(Math.random()*1.5))+'s infinite;'
        +'opacity:'+(opa+Math.random()*.25)+';transform:rotate('+tilt+'deg);';
      w.appendChild(d);
    }
  }
  if(diff==='fundo') makeRain(30,.7,8,.25);
  if(diff==='teologo'){
    makeRain(60,.38,20,.35);
    var lf=document.createElement('div');
    lf.style.cssText='position:absolute;inset:0;animation:lflash 4s ease-in-out infinite;pointer-events:none;';
    w.appendChild(lf);
  }
}

// ══════════════ MENU ANIMATIONS ══════════════
function setupMenuAnim(){
  var el=document.getElementById('menu-anim');el.innerHTML='';
  // Animated clouds using SVG elements that drift
  var clouds=[
    {top:'12%',w:130,h:40,delay:'0s',dur:'22s',dir:1},
    {top:'22%',w:100,h:32,delay:'-8s',dur:'30s',dir:1},
    {top:'8%',w:110,h:36,delay:'-4s',dur:'26s',dir:-1},
    {top:'18%',w:80,h:28,delay:'-14s',dur:'28s',dir:1},
  ];
  clouds.forEach(function(c){
    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width',c.w);svg.setAttribute('height',c.h);
    svg.setAttribute('viewBox','0 0 '+c.w+' '+c.h);
    svg.style.cssText='position:absolute;top:'+c.top+';opacity:.82;pointer-events:none;';
    var hw=c.w/2,hh=c.h/2;
    svg.innerHTML='<ellipse cx="'+hw+'" cy="'+(c.h*.6)+'" rx="'+(c.w*.45)+'" ry="'+(c.h*.4)+'" fill="white"/>'
      +'<ellipse cx="'+(c.w*.35)+'" cy="'+(c.h*.42)+'" rx="'+(c.w*.3)+'" ry="'+(c.h*.48)+'" fill="white"/>'
      +'<ellipse cx="'+(c.w*.65)+'" cy="'+(c.h*.45)+'" rx="'+(c.w*.28)+'" ry="'+(c.h*.44)+'" fill="white"/>'
      +'<ellipse cx="'+(c.w*.5)+'" cy="'+(c.h*.32)+'" rx="'+(c.w*.22)+'" ry="'+(c.h*.38)+'" fill="white"/>';
    var startX=c.dir>0?'-'+c.w+'px':'calc(100vw + '+c.w+'px)';
    var endX=c.dir>0?'calc(100vw + '+c.w+'px)':'-'+c.w+'px';
    svg.style.left=startX;
    svg.style.animation='none';
    svg.style.transform='translateX(0)';
    // Use CSS animation via keyframe injection per element
    var animName='cd'+Math.random().toString(36).slice(2,6);
    var styleEl=document.createElement('style');
    styleEl.textContent='@keyframes '+animName+'{from{left:'+startX+';}to{left:'+endX+';}}';
    document.head.appendChild(styleEl);
    svg.style.animation=animName+' '+c.dur+' '+c.delay+' linear infinite';
    el.appendChild(svg);
  });

  // Birds (simple pixel birds using text)
  var birdDelays=['0s','-5s','-11s'];
  var birdTops=['14%','26%','19%'];
  birdDelays.forEach(function(d,i){
    var b=document.createElement('div');
    b.style.cssText='position:absolute;top:'+birdTops[i]+';font-size:12px;opacity:.75;animation:birdFly '+(16+i*4)+'s '+d+' linear infinite;';
    b.textContent='🕊️';
    el.appendChild(b);
  });

  // Twinkling stars in menu sky
  for(var s=0;s<12;s++){
    var st=document.createElement('div');st.className='mstar';
    st.style.cssText='top:'+(4+Math.random()*28)+'%;left:'+(Math.random()*100)+'%;animation-delay:'+(Math.random()*2)+'s;opacity:'+(Math.random()*.5+.3);
    el.appendChild(st);
  }
}

// ══════════════ SCENE + CHARS ══════════════
function setupScene(diff){
  var sc=document.getElementById('scene-bg');
  sc.style.opacity='0';
  sc.innerHTML=Scenes[diff]();
  setTimeout(function(){sc.style.transition='opacity .6s';sc.style.opacity='1';},50);
  setWeather(diff);
  var cl=document.getElementById('char-l'),cr=document.getElementById('char-r');
  if(diff==='raso'){cl.innerHTML=Chars.prophetL();cr.innerHTML=Chars.shepherdR();}
  else if(diff==='fundo'){cl.innerHTML=Chars.warriorL();cr.innerHTML=Chars.scribeR();}
  else{cl.innerHTML=Chars.priestL();cr.innerHTML=Chars.apostleR();}
}

  var sc=document.getElementById('scene-bg');

  sc.style.opacity='1';

  document.getElementById('char-l').innerHTML='';
  document.getElementById('char-r').innerHTML='';
  setupMenuAnim();
}

// ══════════════ SHUFFLE ══════════════
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

var S={diff:'',qs:[],idx:0,lives:5,score:0,combo:0,answered:false,startTime:0,elapsed:0,timer:null,timerSecs:0};
var pendingResult=null;
var lbCurrentTab='raso';
var userHasInteracted=false;

function onFirstInteraction(){
  if(userHasInteracted)return;
  userHasInteracted=true;
  // Resume AudioContext (Chrome policy)
  try{var c=Audio&&Audio.play&&window._audioCtx;if(c&&c.state==='suspended')c.resume();}catch(e){}
  // Start menu music now that we have a user gesture
  var active=document.querySelector('.screen.active');
  if(active&&active.id==='menu-screen')Audio.play('menu');
}
document.addEventListener('click',onFirstInteraction,{once:true});
document.addEventListener('keydown',onFirstInteraction,{once:true});

function show(id){

function lbTab(diff){
  SFX.click();
  lbCurrentTab=diff;
  ['raso','fundo','teologo'].forEach(function(d){
    var t=document.getElementById('lbtab-'+d);
    t.className='lbtab'+(d===diff?' active-'+d:'');
  });
  var list=document.getElementById('lb-list');
  var data=LB.load(diff);
  list.innerHTML='';
  if(!data.length){
    list.innerHTML='<div class="lb-empty">Nenhum registro ainda.<br>Jogue e entre para a história!</div>';
    return;
  }
  var medals=['🥇','🥈','🥉'];
  var rowCls=['gold','silver','bronze'];
  data.forEach(function(entry,i){
    var row=document.createElement('div');
    row.className='lb-row'+(i<3?' '+rowCls[i]:'');
    var mins=Math.floor((entry.secs||0)/60);
    var secs=((entry.secs||0)%60).toString().padStart(2,'0');
    var corr=(entry.correct!==undefined?entry.correct+'/'+entry.total:'');
    row.innerHTML='<span class="lb-rank">'+(i<3?medals[i]:'#'+(i+1))+'</span>'
      +'<span class="lb-name">'+escHtml(entry.name)+'</span>'

  });

function escHtml(s){return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

// ══════════════ TIMER ══════════════
function startTimer(){
  clearInterval(S.timer);
  S.timerSecs=30;
  var bar=document.getElementById('timer-bar');
  bar.style.transition='none';bar.style.width='100%';
  bar.style.background='#FFD700';
  setTimeout(function(){
    bar.style.transition='width .25s linear';
    S.timer=setInterval(function(){
      S.timerSecs--;
      var pct=(S.timerSecs/30)*100;
      bar.style.width=pct+'%';
      if(S.timerSecs<=10){bar.style.background='#FF5722';if(S.timerSecs%2===0)SFX.timerTick();}
      if(S.timerSecs<=0){clearInterval(S.timer);timeUp();}
    },1000);
  },50);
}
function stopTimer(){clearInterval(S.timer);document.getElementById('timer-bar').style.transition='none';}
function timeUp(){
  if(S.answered)return;
  S.answered=true;S.lives--;S.combo=0;SFX.wrong();
  document.querySelectorAll('.obt').forEach(function(b){b.disabled=true;});
  var q=S.qs[S.idx];
  if(q.type==='tf'){
    document.querySelectorAll('.obt').forEach(function(b){
      if((b.classList.contains('tv')&&q.correct)||(!b.classList.contains('tv')&&!q.correct))b.classList.add('correct');
    });
  } else { document.querySelectorAll('.obt')[q.correct].classList.add('correct'); }
  showFeedback(false,'⏰ Tempo esgotado! '+q.explain,q.ref);
  spawnPop(false,'⏰');
}

// ══════════════ START ══════════════
function start(diff){
  SFX.start(diff);
  Audio.play(diff);
  S.diff=diff;
  S.qs=shuffle(QB[diff]).slice(0,10);
  S.idx=0;S.lives=5;S.score=0;S.combo=0;S.elapsed=0;
  S.startTime=Date.now();
  var labels={raso:'🌅 RASO',fundo:'🌧 FUNDO',teologo:'⚡ MEOD (מְאֹד)'};
  document.getElementById('dpill').textContent=labels[diff];
  document.getElementById('hud').classList.add('on');
  document.getElementById('q-wrap').classList.add('on');
  document.getElementById('timer-bar-wrap').classList.add('on');
  setupScene(diff);
  show('game-screen');
  renderQ();
}

// ══════════════ RENDER Q ══════════════
function renderQ(){
  var q=S.qs[S.idx],total=S.qs.length;
  var lv=document.getElementById('lives-disp');lv.innerHTML='';
  for(var i=0;i<5;i++){var h=document.createElement('span');h.className='heart'+(i>=S.lives?' dead':'');h.textContent='❤️';lv.appendChild(h);}
  document.getElementById('progfill').style.width=((S.idx/total)*100)+'%';
  document.getElementById('qnum').textContent=(S.idx+1)+'/'+total;
  document.getElementById('qtype-lbl').textContent=q.type==='tf'?'✦ VERDADEIRO OU FALSO ✦':'✦ MÚLTIPLA ESCOLHA ✦';
  document.getElementById('q-text').textContent=q.q;
  var grid=document.getElementById('opts');grid.innerHTML='';
  if(q.type==='tf'){
    grid.className='ogrid two';
    [['VERDADEIRO','tv'],['FALSO','fv']].forEach(function(p,i){
      var b=document.createElement('button');b.className='obt '+p[1];b.textContent=p[0];
      (function(isT,btn){btn.onclick=function(){checkTF(isT,btn);};})(i===0,b);
      grid.appendChild(b);
    });
  } else {
    grid.className='ogrid four';
    q.opts.forEach(function(o,i){
      var b=document.createElement('button');b.className='obt';
      b.textContent=['A) ','B) ','C) ','D) '][i]+o;
      (function(idx,btn){btn.onclick=function(){checkMC(idx,btn);};})(i,b);
      grid.appendChild(b);
    });
  }
  S.answered=false;
  document.getElementById('feedback').classList.remove('on');
  startTimer();
}

function checkTF(ans,btn){
  if(S.answered)return;S.answered=true;stopTimer();
  var q=S.qs[S.idx];var ok=(ans===q.correct);
  document.querySelectorAll('.obt').forEach(function(b){b.disabled=true;});
  if(ok){btn.classList.add('correct');S.score++;S.combo++;SFX.correct();showFeedback(true,q.explain,q.ref);}
  else{btn.classList.add('wrong');document.querySelectorAll('.obt').forEach(function(b){if((b.classList.contains('tv')&&q.correct)||(!b.classList.contains('tv')&&!q.correct))b.classList.add('correct');});S.lives--;S.combo=0;SFX.wrong();showFeedback(false,q.explain,q.ref);}
  spawnPop(ok);
}
function checkMC(idx,btn){
  if(S.answered)return;S.answered=true;stopTimer();
  var q=S.qs[S.idx];var ok=(idx===q.correct);
  document.querySelectorAll('.obt').forEach(function(b){b.disabled=true;});
  if(ok){btn.classList.add('correct');S.score++;S.combo++;SFX.correct();showFeedback(true,q.explain,q.ref);}
  else{btn.classList.add('wrong');document.querySelectorAll('.obt')[q.correct].classList.add('correct');S.lives--;S.combo=0;SFX.wrong();showFeedback(false,q.explain,q.ref);}
  spawnPop(ok);
}
function spawnPop(ok,label){
  var p=document.createElement('div');p.className='spop';
  var txt=label||(ok?(S.combo>2?'🔥 x'+S.combo+' COMBO!':'+1 ✓'):'✗');
  p.style.cssText='top:42%;left:'+(36+Math.random()*26)+'%;font-size:'+(ok&&S.combo>2?'17px':'13px')+';color:'+(ok?(S.combo>2?'#FF6D00':'#FFD700'):'#FF5252');
  p.textContent=txt;
  document.getElementById('game').appendChild(p);
  setTimeout(function(){p.remove();},1400);
}
function showFeedback(ok,explain,ref){
  var isLast=S.idx>=S.qs.length-1,dead=S.lives<=0;
  var b=document.getElementById('fb-banner');b.textContent=ok?'✓ CORRETO!':'✗ ERRADO!';b.className='fbbanner '+(ok?'ok':'bad');
  document.getElementById('fb-explain').textContent=explain;
  document.getElementById('fb-ref').textContent=ref?'📖 '+ref:'';
  document.getElementById('fb-next').textContent=(isLast||dead)?'VER RESULTADO 🏆':'PRÓXIMA ➜';
  document.getElementById('feedback').classList.add('on');
}
function next(){
  SFX.click();S.idx++;
  if(S.lives<=0||S.idx>=S.qs.length){endGame();return;}
  document.getElementById('feedback').classList.remove('on');
  renderQ();
}

// ══════════════ END GAME ══════════════
function endGame(){
  stopTimer();
  document.getElementById('feedback').classList.remove('on');
  document.getElementById('q-wrap').classList.remove('on');
  document.getElementById('hud').classList.remove('on');
  document.getElementById('timer-bar-wrap').classList.remove('on');
  S.elapsed=Math.round((Date.now()-S.startTime)/1000);
  var total=S.qs.length,pct=Math.round((S.score/total)*100);
  var pts=calcPts(S.score,total,S.elapsed);
  var emoji,title,verse,stars;
  if(pct>=90){emoji='🏆';title='SÁBIO DAS ESCRITURAS!';stars='⭐⭐⭐';SFX.victory();verse='"Bem-aventurado aquele que lê e os que ouvem as palavras desta profecia." — Apocalipse 1:3';}
  else if(pct>=70){emoji='⭐';title='ESTUDIOSO FIEL!';stars='⭐⭐';SFX.victory();verse='"Toda a Escritura é inspirada por Deus e útil para o ensino." — 2 Timóteo 3:16';}
  else if(pct>=50){emoji='📖';title='APRENDIZ DA PALAVRA!';stars='⭐';SFX.click();verse='"A entrada das tuas palavras ilumina; dá entendimento aos simples." — Salmos 119:130';}
  else{emoji='🌱';title='CONTINUA A JORNADA!';stars='';SFX.fail();verse='"Lâmpada para os meus pés é a tua palavra, e luz para o meu caminho." — Salmos 119:105';}
  document.getElementById('res-icon').textContent=emoji;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-stars').textContent=stars;
  document.getElementById('res-score').textContent=S.score+'/'+total+' corretas ('+pct+'%)';
  var mins=Math.floor(S.elapsed/60),secs=(S.elapsed%60).toString().padStart(2,'0');
  document.getElementById('res-pts').textContent='⏱ '+mins+':'+secs+' · 🏅 '+pts+' pontos';
  document.getElementById('res-verse').textContent=verse;
  pendingResult={diff:S.diff,pts:pts,secs:S.elapsed,correct:S.score,total:S.qs.length};
  show('result-screen');
  // Ask name after short delay
  if(pts>0){setTimeout(function(){showNameModal(pts);},600);}
}

function showNameModal(pts){
  var diff=pendingResult?pendingResult.diff:'raso';
  var labels={raso:'🌅 Raso',fundo:'🌧 Fundo',teologo:'⚡ MEOD (מְאֹד)'};
  document.getElementById('name-score-preview').textContent=labels[diff]+' · '+pts+' pontos · Quer entrar para o leaderboard?';
  document.getElementById('name-input').value='';
  document.getElementById('name-modal').classList.add('on');
  setTimeout(function(){document.getElementById('name-input').focus();},100);
}
function saveName(){
  var name=(document.getElementById('name-input').value||'').trim();
  if(!name){document.getElementById('name-input').focus();return;}
  if(pendingResult){LB.add(pendingResult.diff,name,pendingResult.pts,pendingResult.secs,pendingResult.correct,pendingResult.total);}
  document.getElementById('name-modal').classList.remove('on');
  pendingResult=null;
  SFX.click();
}
function skipName(){
  document.getElementById('name-modal').classList.remove('on');
  pendingResult=null;SFX.click();
}

  {type:'tf',q:'Rebeca era esposa de Isaque e mãe de Jacó e Esaú.',correct:true,explain:'Rebeca foi buscada por servo de Abraão para Isaque. Ela foi mãe dos gêmeos Esaú e Jacó, tendo papel central na continuidade da aliança.',ref:'Gênesis 24 / 25:21-26'},
  {type:'tf',q:'A cidade de Nínive estava na região da atual Índia.',correct:false,explain:'Nínive era a capital da Assíria, localizada no atual Iraque (próximo a Mosul). Era uma das maiores cidades do mundo antigo.',ref:'Jonas 1:2'},
  {type:'tf',q:'Salomão foi considerado o homem mais sábio do mundo em sua época.',correct:true,explain:'Deus apareceu a Salomão e ele pediu sabedoria. Deus ficou tão agradado que lhe deu também riquezas e glória incomparáveis.',ref:'1 Reis 3:5-13'},
  {type:'tf',q:'A parábola do Filho Pródigo aparece no Evangelho de Marcos.',correct:false,explain:'A parábola do Filho Pródigo está em Lucas 15:11-32, não em Marcos. Lucas preservou as parábolas mais detalhadas e emocionantes de Jesus.',ref:'Lucas 15:11'},
  {type:'tf',q:'Abraão tinha 75 anos quando saiu de Harã rumo à terra prometida.',correct:true,explain:'"E Abrão tinha setenta e cinco anos quando saiu de Harã." A fé de Abraão em deixar tudo em idade avançada é modelo de obediência em Hebreus.',ref:'Gênesis 12:4'},

  {type:'tf',q:'Adão e Eva foram expulsos do Jardim do Éden após pecarem.',correct:true,explain:'Após comer o fruto proibido, Deus os expulsou do jardim e colocou querubins e uma espada flamejante para guardar o caminho da árvore da vida.',ref:'Gênesis 3:23-24'},
  {type:'tf',q:'Caim matou seu irmão Abel por inveja da oferta aceita por Deus.',correct:true,explain:'Deus aceitou a oferta de Abel (primogênitos do rebanho) mas não a de Caim (frutos da terra). Cheio de ira, Caim levou Abel ao campo e o matou.',ref:'Gênesis 4:3-8'},
  {type:'tf',q:'A Torre de Babel foi construída para alcançar o céu e tornar o povo famoso.',correct:true,explain:'"Venha, edifiquemos uma cidade e uma torre cujo topo chegue ao céu." Deus confundiu as línguas e dispersou o povo pela face da terra.',ref:'Gênesis 11:4-8'},
  {type:'tf',q:'Abraão tinha dois filhos: Ismael e Isaque.',correct:true,explain:'Ismael nasceu de Agar, serva de Sara. Isaque nasceu de Sara quando ela tinha 90 anos, sendo filho da promessa e da aliança.',ref:'Gênesis 16:15 / 21:3'},
  {type:'tf',q:'Esaú vendeu sua primogenitura a Jacó por um prato de lentilhas.',correct:true,explain:'"Vendes hoje a mim a tua primogenitura?" — Jacó aproveitou a fome de Esaú para comprar seu direito de primogênito por um prato de caldo vermelho.',ref:'Gênesis 25:31-33'},
  {type:'tf',q:'O faraó do Egito libertou Israel voluntariamente sem pressão.',correct:false,explain:'O Faraó endureceu seu coração repetidamente, exigindo dez pragas devastadoras. Só após a morte dos primogênitos ele cedeu — temporariamente.',ref:'Êxodo 5-12'},
  {type:'tf',q:'Calebe foi o sucessor de Moisés e liderou Israel através do rio Jordão.',correct:false,explain:'Foi JOSUÉ, não Calebe, quem sucedeu Moisés. Deus disse a Josué: "Como eu estava com Moisés, assim estarei contigo." Calebe foi o outro espião fiel, mas Josué foi o líder designado.',ref:'Josué 1:1-3'},
  {type:'tf',q:'As muralhas de Jericó foram derrubadas por Josué com aríetes durante três dias de batalha.',correct:false,explain:'Não houve aríetes — foi uma estratégia espiritual! O povo marchou em silêncio por seis dias e sete vezes no sétimo. Os sacerdotes tocaram trombetas, o povo gritou e os muros desabaram.',ref:'Josué 6:15-20'},
  {type:'tf',q:'Débora foi a única juíza mulher de Israel mencionada na Bíblia.',correct:true,explain:'Débora era profetisa e juíza de Israel. Ela e o general Baraque lideraram a vitória sobre o exército de Sísara.',ref:'Juízes 4:4-9'},
  {type:'tf',q:'Rute voltou para Moabe após a morte do marido, deixando sua sogra Noemi sozinha.',correct:false,explain:'Foi ORPÁ que voltou para Moabe. Rute declarou: "Onde tu morreres, morrerei eu." Ela ficou com Noemi, foi para Belém, trabalhou na colheita de Boaz e se casou com ele, tornando-se bisavó de Davi.',ref:'Rute 4:9-10'},
  {type:'tf',q:'Eli foi o último juiz de Israel e ungiu Saul como o primeiro rei.',correct:false,explain:'Foi SAMUEL, não Eli, o último juiz e quem ungiu reis. Eli era sumo sacerdote e mentor de Samuel, mas morreu antes da era da monarquia. Samuel ungiu Saul e depois Davi como reis.',ref:'1 Samuel 10:1 / 16:13'},
  {type:'tf',q:'O rei Saul foi rejeitado por desobedecer à ordem de destruir os amalequitas completamente.',correct:true,explain:'"Por desprezares a palavra do Senhor, ele também te rejeitou como rei." Saul poupou o rei Agague e o melhor do rebanho.',ref:'1 Samuel 15:22-23'},
  {type:'tf',q:'Davi construiu o Templo de Jerusalém em sete anos como promessa a Deus.',correct:false,explain:'Foi SALOMÃO, não Davi, quem construiu o Templo. Davi desejou construí-lo, mas Deus disse que seria seu filho quem o faria. Salomão começou no 4º ano de reinado e concluiu em sete anos.',ref:'1 Reis 6:37-38'},
  {type:'tf',q:'O profeta Eliseu desafiou o rei Acabe e anunciou a seca de três anos.',correct:false,explain:'Foi ELIAS, não Eliseu, que anunciou a seca ao rei Acabe. Eliseu foi o sucessor de Elias. A seca durou três anos e meio, sendo encerrada após o duelo com os profetas de Baal no Carmelo.',ref:'1 Reis 17:1 / Tiago 5:17'},
  {type:'tf',q:'Eliseu multiplicou pães para cem homens, prefigurando o milagre de Jesus.',correct:true,explain:'Eliseu mandou que vinte pães de cevada fossem dados a cem homens — eles comeram e sobraram. Um paralelo impressionante com Jesus.',ref:'2 Reis 4:42-44'},
  {type:'tf',q:'O profeta Ezequiel foi chamado ainda criança e respondeu: "não sei falar, porque sou criança".',correct:false,explain:'Essas foram as palavras de JEREMIAS, não de Ezequiel. Jeremias se sentiu despreparado, mas Deus respondeu: "Antes de te formar no ventre te conheci, te separei para profeta das nações."',ref:'Jeremias 1:5-7'},
  {type:'tf',q:'Ezequiel teve visões enquanto estava entre os exilados na Babilônia.',correct:true,explain:'Ezequiel recebeu suas visões no rio Quebar, na Babilônia. Sua visão inaugural inclui quatro criaturas viventes e rodas dentro de rodas.',ref:'Ezequiel 1:1-3'},
  {type:'tf',q:'O livro de Esdras trata do retorno dos judeus do cativeiro babilônico.',correct:true,explain:'Esdras liderou um grupo de exilados de volta a Jerusalém para reconstruir o templo e restaurar a Lei, após o decreto de Ciro.',ref:'Esdras 1:1-3'},
  {type:'tf',q:'Esdras reconstruiu as muralhas de Jerusalém em 52 dias após o retorno da Babilônia.',correct:false,explain:'Foi NEEMIAS, não Esdras, quem liderou a reconstrução dos muros. Esdras liderou a restauração espiritual e da Lei. As muralhas foram concluídas em 52 dias — uma façanha que impressionou os inimigos.',ref:'Neemias 6:15'},
  {type:'tf',q:'O livro de Isaías é o capítulo mais longo da Bíblia, com mais de 170 versículos.',correct:false,explain:'O SALMO 119 é o capítulo mais longo da Bíblia, com 176 versículos. Isaías é um livro, não um capítulo. O Salmo 119 é dividido em 22 estrofes correspondendo às letras do alfabeto hebraico.',ref:'Salmo 119'},
  {type:'tf',q:'O profeta Amós era pastor de Técoa antes de ser chamado por Deus.',correct:true,explain:'"Não sou profeta nem filho de profeta, sou pastor e cultivador de sicômoros." Amós foi um profeta leigo chamado do campo.',ref:'Amós 7:14-15'},
  {type:'tf',q:'Jesus tinha sete discípulos, escolhidos como símbolo das sete igrejas do Apocalipse.',correct:false,explain:'Jesus escolheu DOZE discípulos — símbolo das doze tribos de Israel. Os doze foram: Pedro, André, Tiago, João, Filipe, Bartolomeu, Mateus, Tomé, Tiago filho de Alfeu, Tadeu, Simão e Judas.',ref:'Mateus 10:1-4'},
  {type:'tf',q:'A parábola do Bom Samaritano responde à pergunta "Quem é o meu próximo?"',correct:true,explain:'Um escriba perguntou a Jesus quem era seu próximo. Jesus respondeu com a parábola do samaritano que ajudou o homem espancado na estrada.',ref:'Lucas 10:29-37'},
  {type:'tf',q:'Jesus curou dez leprosos, mas apenas um voltou para agradecer.',correct:true,explain:'"Não eram dez os que foram purificados? Onde estão os nove?" O único que voltou era samaritano. Lição sobre gratidão e fé.',ref:'Lucas 17:12-19'},
  {type:'tf',q:'Jesus ressuscitou Lázaro três dias após sua morte, assim como Ele próprio ressuscitaria no terceiro dia.',correct:false,explain:'Lázaro estava morto há QUATRO dias, não três. "Senhor, já cheira mal, pois é o quarto dia." Jesus esperou propositalmente para revelar a glória de Deus de forma ainda mais evidente.',ref:'João 11:17,39'},
  {type:'tf',q:'No dia de Pentecostes, João pregou e cinco mil pessoas se batizaram.',correct:false,explain:'Foi PEDRO quem pregou no Pentecostes — não João nem Paulo. E foram TRÊS MIL, não cinco mil. Paulo só foi convertido muito depois, perseguindo a Igreja antes de encontrar Jesus no caminho de Damasco.',ref:'Atos 2:14,41'},
  {type:'tf',q:'Cornélio foi o primeiro judeu da diáspora a receber o Espírito Santo após o Pentecostes.',correct:false,explain:'Cornélio era GENTIO — um centurião romano, não judeu. Sua conversão foi revolucionária porque provou a Pedro que o Evangelho era para todos os povos, quebrando a barreira judaico-gentílica.',ref:'Atos 10:44-48'},
  {type:'tf',q:'Paulo e Barnabé fizeram juntos a primeira viagem missionária.',correct:true,explain:'Atos 13-14 registra a primeira viagem: Antioquia, Chipre, Ásia Menor. Eles pregaram em sinagogas e fundaram igrejas gentílicas.',ref:'Atos 13:2-3'},
  {type:'tf',q:'O livro de Apocalipse foi escrito pelo apóstolo Paulo durante seu cativeiro em Roma.',correct:false,explain:'O Apocalipse foi escrito por JOÃO, não Paulo. João estava exilado em Patmos por causa da palavra de Deus. Paulo escreveu cartas pastorais e teológicas, mas nunca o Apocalipse.',ref:'Apocalipse 1:9'},
  {type:'tf',q:'O número 666 em Apocalipse é descrito como o número da Besta.',correct:true,explain:'"Aqui está a sabedoria: quem tem entendimento calcule o número da besta... o seu número é seiscentos e sessenta e seis."',ref:'Apocalipse 13:18'},
  {type:'tf',q:'O Sermão do Monte contém as Beatitudes e o Pai Nosso.',correct:true,explain:'Mateus 5-7 registra o Sermão do Monte, incluindo as Beatitudes (5:3-11), o Pai Nosso (6:9-13) e muitos ensinamentos sobre o Reino.',ref:'Mateus 5-7'},
  {type:'tf',q:'Jesus jejuou por 40 dias antes de Seu batismo, para se preparar espiritualmente.',correct:false,explain:'O jejum aconteceu DEPOIS do batismo, não antes. Imediatamente após o batismo, o Espírito levou Jesus ao deserto. O batismo foi o evento inaugural; o jejum e as tentações vieram a seguir.',ref:'Mateus 4:1-2'},
  {type:'tf',q:'O apóstolo Pedro duvidou da ressurreição e pediu para tocar as marcas dos pregos.',correct:false,explain:'Foi TOMÉ, não Pedro, que disse: "Se eu não vir nas suas mãos o sinal dos pregos... não crerei." Pedro visitou o túmulo e ficou admirado, mas Tomé foi quem exigiu prova física.',ref:'João 20:24-28'},
  {type:'tf',q:'Jesus nasceu na Judeia durante o reinado do rei Herodes.',correct:true,explain:'Mateus 2:1: "Havendo Jesus nascido em Belém da Judeia, no tempo do rei Herodes." Herodes ordenou a morte das crianças de até dois anos.',ref:'Mateus 2:1,16'},
  {type:'tf',q:'Ester foi convocada pelo rei para revelar o plano de Hamã contra os judeus.',correct:false,explain:'Ester foi SEM SER CHAMADA — o que era punível de morte por lei. Ela disse: "Se perecer, que pereça." O rei Assuero estendeu o cetro de ouro voluntariamente, aceitando sua presença.',ref:'Ester 4:11 / 5:1-2'},
  {type:'tf',q:'O Pai Nosso começa com as palavras "Pai nosso que estás nos céus".',correct:true,explain:'Jesus ensinou esta oração como modelo em Mateus 6:9-13 e Lucas 11:2-4.',ref:'Mateus 6:9'},
  {type:'tf',q:'A palavra "Aleluia" vem do hebraico e significa "louvai a Deus".',correct:true,explain:'"Hallel" = louvor + "Yah" (abreviação de YHWH). "Aleluia" é usada em toda a cristandade.',ref:'Salmo 106:1 / Apocalipse 19:1'},
  {type:'tf',q:'O Tabernáculo no deserto foi construído por Moisés com pedras trazidas do monte Sinai.',correct:false,explain:'O Tabernáculo foi construído com OFERTAS VOLUNTÁRIAS do povo — ouro, prata, bronze, linho, couro. Não havia pedras do Sinai. Bezalel foi o artesão-chefe, nomeado e capacitado por Deus.',ref:'Êxodo 25:8'},
  {type:'tf',q:'Golias era da cidade de Gate, dos filisteus.',correct:true,explain:'"Saiu do arraial dos filisteus um homem guerreiro chamado Golias, de Gate." Gate era uma das cinco cidades-estado filistéias.',ref:'1 Samuel 17:4'},
  {type:'tf',q:'O rei Ezequias encontrou o livro da Lei e promoveu a maior reforma religiosa de Judá.',correct:false,explain:'Foi JOSIAS, não Ezequias, quem encontrou o livro da Lei. Josias rasgou as vestes ao ouvir sua leitura e promoveu uma reforma radical, destruindo altares pagãos por todo o reino.',ref:'2 Reis 22:8-13'},
  {type:'tf',q:'A Transfiguração de Jesus aconteceu num monte alto com Pedro, André e João.',correct:false,explain:'Os três presentes foram Pedro, TIAGO e João — não André. Esses mesmos três discípulos também foram chamados a acompanhar Jesus no Getsêmani na noite de Sua prisão.',ref:'Mateus 17:1-3'},
  {type:'tf',q:'Filipenses 4:13 diz: "Posso todas as coisas naquele que me fortalece."',correct:true,explain:'Este versículo de Paulo, escrito da prisão, expressa confiança na força que vem de Cristo em todas as circunstâncias.',ref:'Filipenses 4:13'},
  {type:'tf',q:'O rio Jordão foi dividido quando Josué golpeou as águas com seu cajado, como Moisés.',correct:false,explain:'Josué não usou cajado. Foram os SACERDOTES carregando a Arca da Aliança que entraram nas águas. Quando os pés dos sacerdotes tocaram o Jordão, as águas se detiveram.',ref:'Josué 3:14-17'},
  {type:'tf',q:'O livro de Gênesis cobre desde a Criação até a morte de José no Egito.',correct:true,explain:'Gênesis vai da Criação (cap. 1) ao patriarca José (cap. 37-50), terminando com a morte de José no Egito com 110 anos.',ref:'Gênesis 50:26'},
  {type:'tf',q:'Jesus nasceu num palácio em Belém, pois o rei Herodes o recebeu como descendente de Davi.',correct:false,explain:'Jesus nasceu numa MANJEDOURA humilde porque não havia lugar na estalagem. Herodes na verdade tentou matar Jesus — não o recebeu. A humildade do nascimento contrasta gloriosamente com Sua divindade.',ref:'Lucas 2:7'},
  {type:'tf',q:'O rei Salomão dançou diante do Senhor quando a Arca foi levada para o Templo recém-construído.',correct:false,explain:'Foi DAVI quem dançou com toda a força diante do Senhor quando a Arca subiu para Jerusalém. Sua esposa Mical o desprezou. Salomão trouxe a Arca ao Templo, mas não há relato de dança.',ref:'2 Samuel 6:14-16'},
  {type:'tf',q:'O profeta Natã confrontou Davi com uma parábola depois do pecado com Bate-Seba.',correct:true,explain:'Natã contou a parábola do homem rico que roubou a única ovelha do pobre. Davi indignou-se — e Natã disse: "Tu és esse homem."',ref:'2 Samuel 12:1-7'},
  {type:'tf',q:'O Espírito Santo desceu em forma de chamas de fogo sobre Jesus no seu batismo.',correct:false,explain:'O Espírito desceu como POMBA sobre Jesus no batismo — não fogo. O fogo veio no Pentecostes, sobre os discípulos reunidos no cenáculo. São dois eventos distintos.',ref:'Mateus 3:16-17'},
  {type:'tf',q:'Jesus perguntou a Pedro uma única vez se ele O amava, perdonando-o completamente.',correct:false,explain:'Jesus perguntou TRÊS vezes — uma por cada negação de Pedro. Cada pergunta doía, mas cada resposta era uma restauração. "Apascenta minhas ovelhas." A graça restaurou cada passo da queda.',ref:'João 21:15-17'},
  {type:'tf',q:'O livro de Provérbios diz que o temor do Senhor é o princípio da sabedoria.',correct:true,explain:'"O temor do Senhor é o princípio da sabedoria, e o conhecimento do Santo é a prudência." Esta é a frase-chave do livro.',ref:'Provérbios 9:10'},
  {type:'tf',q:'Paulo escreveu a carta aos Filipenses durante sua segunda viagem missionária, em Atenas.',correct:false,explain:'Filipenses é uma das "cartas do cativeiro" — Paulo a escreveu PRESO, provavelmente em Roma. Ainda assim transborda alegria: "Regozijai-vos no Senhor sempre!" — escrita de dentro de uma cela.',ref:'Filipenses 1:13 / 4:4'},
  {type:'tf',q:'A serpente de bronze feita por Moisés curava quem a tocasse com fé e arrependimento.',correct:false,explain:'A cura vinha de OLHAR para a serpente, não de tocá-la. "Todo aquele que for picado e olhar para ela viverá." Jesus usou exatamente essa imagem: "Assim importa que o Filho do Homem seja levantado."',ref:'Números 21:9 / João 3:14'},
  {type:'tf',q:'O Espírito Santo é chamado de "Consolador" no Evangelho de João.',correct:true,explain:'Jesus prometeu enviar o "Parakletos" (Consolador, Auxiliador). Esta palavra grega significa alguém chamado ao lado para ajudar.',ref:'João 14:16,26'},
  {type:'tf',q:'O livro de Atos foi escrito pelo apóstolo Paulo como continuação de suas epístolas missionárias.',correct:false,explain:'Atos foi escrito por LUCAS, não Paulo. Ambos os livros — Lucas e Atos — são endereçados a Teófilo e escritos no mesmo estilo grego refinado. Lucas era médico gentio e companheiro de Paulo.',ref:'Lucas 1:3 / Atos 1:1'},
  {type:'tf',q:'O mar da Galileia também é chamado de lago de Genesaré ou mar de Tiberíades.',correct:true,explain:'O mesmo corpo de água aparece com três nomes no NT: mar da Galileia, lago de Genesaré e mar de Tiberíades. É um lago de água doce.',ref:'João 6:1 / Lucas 5:1'},
  {type:'tf',q:'Moisés não entrou na terra prometida porque adorou o bezerro de ouro juntamente com o povo.',correct:false,explain:'Moisés foi impedido por FERIR A ROCHA duas vezes em Cades, quando Deus mandou falar a ela. O bezerro de ouro foi pecado do POVO — Moisés na verdade intercedeu por eles naquela ocasião.',ref:'Números 20:8-12'},
  {type:'tf',q:'José do Egito jamais perdoou seus irmãos, mantendo-os como servos no Egito até sua morte.',correct:false,explain:'José os PERDOOU completamente: "Não vos entristeçais por me terdes vendido aqui; porque Deus me enviou antes de vós para salvar vidas." É um dos maiores exemplos de perdão e providência na Bíblia.',ref:'Gênesis 45:4-8'},
  {type:'tf',q:'O profeta Jeremias escreveu sobre o Servo Sofredor no capítulo 53, prevendo a morte de Cristo.',correct:false,explain:'O capítulo 53 é de ISAÍAS, não Jeremias. Isaías 53 descreve o sofrimento, rejeição, morte vicária e exaltação do Servo com tal detalhe profético que é chamado de "o Quinto Evangelho".',ref:'Isaías 53'},
  {type:'tf',q:'A Páscoa judaica celebra a entrega da Lei no Sinai, sendo o cordeiro um símbolo da aliança.',correct:false,explain:'A Páscoa (Pessach) celebra a LIBERTAÇÃO DO EGITO — a décima praga e a saída. O Pentecostes/Shavuot celebra a entrega da Lei. O cordeiro era sacrificado e seu sangue protegia as primogênitas.',ref:'Êxodo 12:5-7 / João 1:29'},
  {type:'tf',q:'Jacó trabalhou 14 anos para se casar com Raquel.',correct:true,explain:'Jacó trabalhou 7 anos por Raquel, mas Labão o enganou dando-lhe Lia. Então trabalhou mais 7 anos para finalmente se casar com Raquel.',ref:'Gênesis 29:20-28'},
  {type:'tf',q:'O Novo Testamento foi originalmente escrito em latim, sendo Jerônimo seu principal autor.',correct:false,explain:'O NT foi escrito em GREGO koiné — a língua franca do Mediterrâneo no século I. A Vulgata Latina de Jerônimo (séc. IV) foi uma tradução posterior. Jerônimo não escreveu o NT; ele o traduziu.',ref:'Linguística do NT'},
  {type:'tf',q:'A última ceia de Jesus foi realizada no Cenáculo, um aposento elevado em Jerusalém.',correct:true,explain:'"Ele vos mostrará um grande cenáculo mobilado; preparai lá." O cenáculo (sala superior) era um cômodo grande no andar de cima de uma casa.',ref:'Lucas 22:12'},
  {type:'tf',q:'Um vento forte varreu as águas no princípio, preparando a terra para a criação da luz.',correct:false,explain:'O texto hebraico diz que o ESPÍRITO DE DEUS (ruach Elohim) pairava sobre as águas — como uma ave sobre seu ninho. A imagem é de presença viva e criativa, não de um vento agitador.',ref:'Gênesis 1:2'},
  {type:'tf',q:'Jesus nasceu de Maria, que era virgem, conforme cumprimento de profecia.',correct:true,explain:'Isaías 7:14 profetizou: "A virgem conceberá." Mateus 1:23 cita esta passagem no relato do nascimento de Jesus.',ref:'Mateus 1:23 / Isaías 7:14'},
  {type:'tf',q:'O Sl 22 começa com as palavras que Jesus clamou na cruz.',correct:true,explain:'"Deus meu, Deus meu, por que me abandonaste?" — Jesus citou o Salmo 22:1 na cruz. O salmo todo descreve o sofrimento e a exaltação do justo.',ref:'Salmo 22:1 / Mateus 27:46'},
],
fundo:[
  {type:'mc',q:'Quantos livros tem a Bíblia Protestante?',opts:['72','73','60','66'],correct:3,explain:'A Bíblia Protestante tem 66 livros: 39 no Antigo Testamento e 27 no Novo Testamento. Bíblias Católica e Ortodoxa incluem livros deuterocanônicos adicionais.',ref:'Cânon Bíblico Protestante'},
  {type:'mc',q:'Qual foi a primeira das dez pragas do Egito?',opts:['Água transformada em sangue','Gafanhotos','Morte dos primogênitos','Trevas'],correct:0,explain:'A primeira praga foi a transformação das águas do Nilo em sangue (Êx 7:20). A décima e mais devastadora foi a morte dos primogênitos.',ref:'Êxodo 7:14-24'},
  {type:'mc',q:'Qual foi o primeiro milagre de Jesus no Evangelho de João?',opts:['Transformação da água em vinho','Multiplicação dos pães','Cura do paralítico','Ressurreição de Lázaro'],correct:0,explain:'Nas bodas de Caná, Jesus transformou água em vinho a pedido de Sua mãe. João chama este ato de "o início dos seus sinais".',ref:'João 2:1-11'},
  {type:'mc',q:'Qual rei mandou lançar Daniel na cova dos leões?',opts:['Dario, o Medo','Ciro','Nabucodonosor','Belsazar'],correct:0,explain:'O rei Dario foi enganado por conselheiros invejosos que criaram um decreto proibindo oração a qualquer deus por 30 dias.',ref:'Daniel 6:6-16'},
  {type:'mc',q:'Quanto tempo Jonas ficou dentro do grande peixe?',opts:['3 dias e 3 noites','7 dias','40 dias','1 dia'],correct:0,explain:'"Esteve Jonas no ventre do peixe três dias e três noites." Jesus usou isso como sinal de Sua própria morte e ressurreição.',ref:'Jonas 1:17 / Mateus 12:40'},
  {type:'mc',q:'Em qual cidade Paulo nasceu?',opts:['Corinto','Jerusalém','Roma','Tarso'],correct:3,explain:'Paulo (Saulo) nasceu em Tarso, na Cilícia (atual Turquia). Era cidadão romano de nascimento — privilégio que usaria em sua defesa legal.',ref:'Atos 22:3'},
  {type:'mc',q:'Qual profeta anunciou "Voz que clama no deserto: preparai o caminho do Senhor"?',opts:['Isaías','Amós','Jeremias','Ezequiel'],correct:0,explain:'Isaías 40:3 profetizou a missão de João Batista séculos antes. Os quatro Evangelhos citam esta passagem ao apresentar João.',ref:'Isaías 40:3 / Marcos 1:3'},
  {type:'mc',q:'Qual NÃO é uma das Beatitudes do Sermão do Monte?',opts:['Bem-aventurados os ricos','Bem-aventurados os pacificadores','Bem-aventurados os misericordiosos','Bem-aventurados os mansos'],correct:0,explain:'Jesus disse "bem-aventurados os pobres de espírito", não os ricos. As Beatitudes descrevem o caráter do cidadão do Reino de Deus.',ref:'Mateus 5:3-11'},
  {type:'mc',q:'Qual era a ocupação de Pedro antes de seguir Jesus?',opts:['Pastor','Carpinteiro','Cobrador de impostos','Pescador'],correct:3,explain:'Pedro, seu irmão André e os filhos de Zebedeu eram pescadores no mar da Galileia quando Jesus os chamou: "Vinde após mim, e eu vos farei pescadores de homens."',ref:'Mateus 4:18-20'},
  {type:'mc',q:'Quantos dias Jesus ficou no deserto sendo tentado?',opts:['40','100','7','14'],correct:0,explain:'"Tendo jejuado quarenta dias e quarenta noites, depois teve fome." Os 40 dias ecoam os 40 anos de Israel no deserto.',ref:'Mateus 4:1-11'},
  {type:'mc',q:'Qual é o versículo mais curto da Bíblia?',opts:['"Amém."','"Orai sem cessar."','"Deus é amor."','"Jesus chorou."'],correct:3,explain:'"Jesus chorou" (João 11:35) é o versículo mais curto. O contexto é a morte de Lázaro — revelando profundamente a humanidade de Jesus.',ref:'João 11:35'},
  {type:'mc',q:'Em qual livro está a história do "Vale dos Ossos Secos"?',opts:['Ezequiel','Daniel','Isaías','Jeremias'],correct:0,explain:'Ezequiel 37 — Deus mostra ao profeta um vale cheio de ossos que ganham vida progressivamente, simbolizando a restauração que Deus daria a Israel.',ref:'Ezequiel 37:1-14'},
  {type:'mc',q:'Qual era a profissão de Mateus antes de seguir Jesus?',opts:['Fariseu','Pescador','Carpinteiro','Cobrador de impostos'],correct:3,explain:'Mateus era publicano — cobrador de impostos romano, desprezado pelos judeus. Jesus o chamou diretamente da "mesa de cobrança".',ref:'Mateus 9:9'},
  {type:'mc',q:'Qual mulher no AT disse "Onde tu morreres, morrerei eu"?',opts:['Rute','Raabe','Ester','Débora'],correct:0,explain:'Rute disse isso a sua sogra Noemi ao recusar retornar à Moabe. Este ato de lealdade radical a tornou bisavó do rei Davi.',ref:'Rute 1:16'},
  {type:'mc',q:'Em qual monte Moisés recebeu os Dez Mandamentos?',opts:['Monte Nebo','Monte Moriá','Monte Carmelo','Monte Sinai'],correct:3,explain:'O Monte Sinai (também chamado Horebe) é onde Deus Se manifestou em fogo e entregou a Lei a Moisés.',ref:'Êxodo 19:20'},
  {type:'mc',q:'Qual milagre de Jesus é narrado nos quatro Evangelhos?',opts:['Transformação da água em vinho','Ressurreição de Lázaro','Cura do cego de nascença','Multiplicação dos pães e peixes'],correct:3,explain:'A multiplicação dos pães e peixes é o único milagre (além da ressurreição) presente nos quatro Evangelhos.',ref:'Jo 6 / Mt 14 / Mc 6 / Lc 9'},
  {type:'mc',q:'O que é o "Shema Israel" de Deuteronômio 6:4?',opts:['A confissão central sobre a unicidade de Deus','Um salmo real de Davi','Uma profecia sobre o Messias','Uma lei alimentar judaica'],correct:0,explain:'"Ouve, Israel: o Senhor nosso Deus é o único Senhor." O Shema é a oração mais importante do judaísmo. Jesus a citou como o maior mandamento.',ref:'Deuteronômio 6:4 / Marcos 12:29'},
  {type:'mc',q:'Qual profeta foi levado vivo ao céu?',opts:['Ambos Elias e Enoque','Eliseu','Somente Elias','Somente Enoque'],correct:0,explain:'Enoque "andou com Deus e já não existia, porque Deus o tomou" (Gn 5:24). Elias subiu num redemoinho com carro de fogo (2Rs 2:11).',ref:'Gênesis 5:24 / 2 Reis 2:11'},
  {type:'mc',q:'Qual palavra significa "ungido" em hebraico?',opts:['Mashiach (Messias)','Eloim','Shalom','Meod'],correct:0,explain:'"Mashiach" em hebraico e "Christos" em grego = "O Ungido". Reis, sacerdotes e profetas eram ungidos no AT como prefigurações do Ungido definitivo.',ref:'Daniel 9:25 / João 1:41'},
  {type:'mc',q:'Qual foi a missão de Jonas segundo Deus?',opts:['Confrontar o rei Acabe','Reconstruir o templo','Profetizar contra Babilônia','Ir a Nínive e pregar contra a sua maldade'],correct:3,explain:'Deus enviou Jonas a Nínive para proclamar juízo. Jonas fugiu porque não queria que os assírios se arrependessem — o que de fato aconteceu.',ref:'Jonas 1:2'},
  {type:'mc',q:'Qual foi o sinal pedido por Gideão para confirmar a chamada de Deus?',opts:['O velo de lã molhado, depois seco','Uma serpente de bronze','Trombetas que derrubaram muros','Sol parado no céu'],correct:0,explain:'Gideão pediu que só o velo ficasse molhado (chão seco); depois o oposto. Deus atendeu ambos, confirmando Sua chamada.',ref:'Juízes 6:36-40'},
  {type:'mc',q:'Qual livro do NT começa com "No princípio era o Verbo"?',opts:['Mateus','Marcos','Lucas','João'],correct:3,explain:'"No princípio era o Verbo [Logos], e o Verbo estava com Deus, e o Verbo era Deus." O prólogo de João é uma das mais profundas declarações da Bíblia.',ref:'João 1:1'},
  {type:'mc',q:'Quantas cartas Paulo escreveu no NT?',opts:['13','16','7','10'],correct:0,explain:'O cânon reconhece 13 cartas paulinas: Romanos, 1-2 Coríntios, Gálatas, Efésios, Filipenses, Colossenses, 1-2 Tessalonicenses, 1-2 Timóteo, Tito e Filemom.',ref:'Cânon NT'},
  {type:'mc',q:'Qual dos Evangelhos não contém parábolas de Jesus?',opts:['Mateus','Marcos','Lucas','João'],correct:3,explain:'O Evangelho de João não contém parábolas típicas. João apresenta "discursos" e "sinais" com metáforas como "Eu sou o pão da vida".',ref:'Evangelho de João'},
  {type:'mc',q:'O que significa o nome "Emanuel"?',opts:['Luz do mundo','Salvador do povo','Rei poderoso','Deus conosco'],correct:3,explain:'"Emanuel" (עִמָּנוּאֵל) = "Deus conosco". Isaías 7:14 profetizou que o Messias seria chamado assim, cumprido na encarnação de Jesus.',ref:'Isaías 7:14 / Mateus 1:23'},
  {type:'mc',q:'Qual texto do AT descreve o "Servo Sofredor" que carrega os pecados do povo?',opts:['Salmos 22','Daniel 9','Isaías 53','Jeremias 31'],correct:2,explain:'Isaías 52:13-53:12 é o texto messiânico mais citado no NT: "Por suas chagas fomos sarados" (Is 53:5).',ref:'Isaías 53:5'},
  {type:'mc',q:'Qual crise afligiu Jó como provação?',opts:['Paralisia','Lepra','Cegueira','Chagas/úlceras por todo o corpo'],correct:3,explain:'"Feriu Jó com chagas malignas, desde a planta do pé ao alto da cabeça." Mesmo assim, Jó não pecou com seus lábios.',ref:'Jó 2:7-10'},
  {type:'mc',q:'Qual rei se tornou famoso pela sabedoria, pelos provérbios e pelo Templo?',opts:['Davi','Saul','Salomão','Josias'],correct:2,explain:'Salomão recebeu sabedoria incomparável, escreveu Provérbios e Eclesiastes, e construiu o primeiro Templo de Jerusalém.',ref:'1 Reis 3-10'},
  {type:'mc',q:'Como Elias derrotou os profetas de Baal no monte Carmelo?',opts:['Enviou uma praga','Com água do mar','Com uma espada sagrada','Invocou fogo do céu que consumiu o sacrifício'],correct:3,explain:'1 Reis 18 — Após horas sem resposta ao Baal, Elias orou brevemente e fogo do céu consumiu o sacrifício, a lenha, as pedras e até a água.',ref:'1 Reis 18:38'},
  {type:'mc',q:'Qual é a ordem correta dos cinco primeiros livros da Bíblia?',opts:['Gênesis, Êxodo, Levítico, Números, Deuteronômio','Gênesis, Levítico, Êxodo, Números, Deuteronômio','Gênesis, Êxodo, Números, Levítico, Deuteronômio','Gênesis, Êxodo, Deuteronômio, Levítico, Números'],correct:0,explain:'Os cinco livros do Pentateuco (Torah): Gênesis, Êxodo, Levítico, Números e Deuteronômio — atribuídos à autoria de Moisés.',ref:'Pentateuco / Torah'},
  {type:'mc',q:'Em qual livro está a história de Ester?',opts:['Rute','Esdras','Ester','Neemias'],correct:2,explain:'O livro de Ester narra como a jovem judia, rainha da Pérsia, salvou o povo judeu de um genocídio planejado pelo ministro Hamã. Celebrado na festa de Purim.',ref:'Livro de Ester'},
  {type:'mc',q:'Qual era a ocupação de José antes de se tornar vizir do Egito?',opts:['Prisioneiro e intérprete de sonhos','Conselheiro do rei','Comerciante','Faraó adjunto'],correct:0,explain:'José foi vendido como escravo, depois falsamente acusado e preso. Na prisão, interpretou sonhos. Quando interpretou o sonho do Faraó, foi alçado a governador.',ref:'Gênesis 39-41'},
  {type:'mc',q:'Qual foi a ocupação de Paulo além de pregador do Evangelho?',opts:['Fazedor de tendas','Carpinteiro','Médico','Pescador'],correct:0,explain:'Paulo era fazedor de tendas (couroeiro) e trabalhava com as mãos para não ser um fardo às igrejas. Em Atos 18:3 trabalhou com Áquila e Priscila.',ref:'Atos 18:3 / 1 Tessalonicenses 2:9'},
  {type:'mc',q:'Em qual monte Elias desafiou os profetas de Baal?',opts:['Monte Sinai','Monte Moriá','Monte Carmelo','Monte Sião'],correct:2,explain:'O Monte Carmelo foi o palco do duelo épico entre Elias e 450 profetas de Baal, provando que o Senhor era o único Deus verdadeiro.',ref:'1 Reis 18:19'},
  {type:'mc',q:'Qual personagem do AT sobreviveu na boca do leão graças à proteção divina?',opts:['José','Elias','Daniel','Ezequiel'],correct:2,explain:'Daniel foi lançado na cova dos leões por decreto do rei Dario, mas um anjo fechou a boca dos leões. Daniel saiu ileso no dia seguinte.',ref:'Daniel 6:22'},

  {type:'mc',q:'Qual profeta se escondeu numa caverna no monte Horebe após fugir de Jezabel?',opts:['Miquéias','Isaías','Eliseu','Elias'],correct:3,explain:'Após a vitória no Carmelo, Jezabel ameaçou Elias de morte. Ele fugiu para o deserto e depois foi até o monte Horebe, onde Deus falou a ele no "silêncio delicado".',ref:'1 Reis 19:8-13'},
  {type:'mc',q:'Em qual livro está escrita a famosa frase "Ainda que eu ande pelo vale da sombra da morte"?',opts:['Jó','Isaías','Salmos','Provérbios'],correct:2,explain:'Salmo 23:4 — "Ainda que eu ande pelo vale da sombra da morte, não temerei mal algum, porque tu estás comigo." Escrito por Davi, o ex-pastor.',ref:'Salmo 23:4'},
  {type:'mc',q:'O que significa o nome "Peniel" que Jacó deu ao lugar onde lutou com Deus?',opts:['Força de Deus','Graça de Deus','Casa de Deus','Face de Deus'],correct:3,explain:'"Chamou o nome daquele lugar Peniel, pois disse: vi a Deus face a face e a minha alma foi salva." Peniel = face (panim) de Deus (El).',ref:'Gênesis 32:30'},
  {type:'mc',q:'Qual foi o pecado específico de Acã que causou a derrota em Ai?',opts:['Desobedecer a Josué','Fugir da batalha','Idolatria','Ter roubado itens consagrados ao Senhor'],correct:3,explain:'Acã tomou secretamente um manto de Sinear, 200 siclos de prata e um lingote de ouro — itens consagrados a Deus. Israel foi derrotado em Ai por causa deste pecado.',ref:'Josué 7:20-21'},
  {type:'mc',q:'Qual dos quatro Evangelhos foi escrito especialmente para leitores gentios?',opts:['Mateus','Marcos','Lucas','João'],correct:2,explain:'Lucas, médico gentio e companheiro de Paulo, escreveu para Teófilo e leitores greco-romanos, explicando costumes judeus e destacando o alcance universal do Evangelho.',ref:'Lucas 1:1-4 / Colossenses 4:14'},
  {type:'mc',q:'Qual era a moeda usada para pagar o imposto do templo em Mateus 22?',opts:['Denário','Dracma','Siclo','Óbolo'],correct:0,explain:'Os fariseus perguntaram se era lícito pagar tributo a César. Jesus pediu um denário — a moeda romana com a imagem de César — e disse: "Dai a César o que é de César."',ref:'Mateus 22:19-21'},
  {type:'mc',q:'Qual homem do AT é descrito como "amigo de Deus"?',opts:['Noé','Davi','Abraão','Moisés'],correct:2,explain:'"Abraão creu em Deus, e isso lhe foi imputado como justiça, e ele foi chamado amigo de Deus" (Tiago 2:23). Isaías 41:8 também usa esta expressão.',ref:'Tiago 2:23 / Isaías 41:8'},
  {type:'mc',q:'Qual é a característica central da fé segundo Hebreus 11:1?',opts:['Confiança nos milagres','Obediência à lei','Certeza das obras passadas','Substância das coisas que se esperam e certeza das que não se veem'],correct:3,explain:'"A fé é a substância das coisas que se esperam e a certeza das que não se veem." Hebreus 11 lista os "heróis da fé" do AT.',ref:'Hebreus 11:1'},
  {type:'mc',q:'Qual foi o nome original de Paulo antes de sua conversão?',opts:['Barnabé','Timóteo','Silas','Saulo'],correct:3,explain:'Paulo era fariseu e chamava-se Saulo de Tarso. O nome Paulo (romano) passou a ser usado após sua conversão, especialmente durante as viagens missionárias.',ref:'Atos 13:9'},
  {type:'mc',q:'Qual profeta disse: "Eis que conceberá uma virgem e dará à luz um filho"?',opts:['Miquéias','Jeremias','Isaías','Ezequiel'],correct:2,explain:'Isaías 7:14 profetizou este sinal messiânico. O NT (Mateus 1:23) cita explicitamente este versículo no relato do nascimento virginal de Jesus.',ref:'Isaías 7:14'},
  {type:'mc',q:'Qual dos juízes de Israel derrotou os midianitas com apenas 300 homens?',opts:['Sansão','Jefté','Gideão','Baraque'],correct:2,explain:'Deus reduziu o exército de Gideão de 32.000 para 300, para que Israel não se gloriasse. Com jarras, tochas e trombetas, derrotaram o exército midianita.',ref:'Juízes 7:2-22'},
  {type:'mc',q:'Qual carta de Paulo trata especialmente da unidade e do corpo de Cristo?',opts:['Efésios','Filipenses','Colossenses','Gálatas'],correct:0,explain:'Efésios é a carta da eclesiologia por excelência — o corpo de Cristo, a Noiva, a edificação na unidade, o ministério quíntuplo e a armadura espiritual.',ref:'Efésios 1:22-23 / 4:11-13'},
  {type:'mc',q:'Qual era a missão dos levitas no sistema religioso de Israel?',opts:['Servir no templo e ensinar a Lei','Liderar o exército','Julgar os casos civis','Governar as cidades'],correct:0,explain:'A tribo de Levi foi separada para o serviço sagrado: cuidar do tabernáculo/templo, tocar instrumentos, carregar a Arca e ensinar a Lei ao povo.',ref:'Números 1:50-51 / Deuteronômio 33:10'},
  {type:'mc',q:'Qual é o tema central da carta aos Gálatas?',opts:['A segunda vinda','Os dons espirituais','A ressurreição de Cristo','A liberdade em Cristo contra o legalismo'],correct:3,explain:'Gálatas defende com vigor que a justificação é pela fé em Cristo, não pelas obras da Lei. Paulo chama os que pregam outro evangelho de "anatema".',ref:'Gálatas 2:16 / 1:8-9'},
  {type:'mc',q:'Em qual cidade Paulo pregou no Areópago sobre "o Deus desconhecido"?',opts:['Corinto','Éfeso','Filipos','Atenas'],correct:3,explain:'Em Atenas, Paulo viu um altar com a inscrição "Ao Deus desconhecido" e aproveitou para pregar o Deus criador que ressuscitou Jesus dos mortos.',ref:'Atos 17:22-23'},
  {type:'mc',q:'Quantos anos o povo de Israel ficou no deserto antes de entrar em Canaã?',opts:['20','30','40','50'],correct:2,explain:'"Vossas carcaças cairão neste deserto; vos farei andar errantes por 40 anos." Uma geração inteira precisou morrer antes que os filhos entrassem na terra.',ref:'Números 14:29-33'},
  {type:'mc',q:'Qual é o livro mais curto do Antigo Testamento?',opts:['Obadias','Naum','Filemom','Jonas'],correct:0,explain:'Obadias, com apenas 21 versículos, é o menor livro do AT. É uma profecia contra Edom. Filemom é o menor do NT.',ref:'Livro de Obadias'},
  {type:'mc',q:'Qual é o livro mais longo da Bíblia em número de versículos?',opts:['Gênesis','Salmos','Isaías','Jeremias'],correct:1,explain:'O livro de Salmos tem 2.461 versículos, tornando-o o maior livro da Bíblia, seguido por Jeremias (1.364) e Gênesis (1.533).',ref:'Livro de Salmos'},
  {type:'mc',q:'O que significa "Êxodo" em grego?',opts:['Libertação','Saída','Milagre','Viagem'],correct:1,explain:'"Êxodo" vem do grego "exodos" = saída. O livro narra a grande saída do povo de Israel da escravidão do Egito.',ref:'Êxodo 1:1 / Etimologia'},
  {type:'mc',q:'Qual foi o sinal que Deus deu a Gideão para confirmar que ele libertaria Israel?',opts:['Fogo do céu','Velo de lã molhado ou seco','Trombeta tocada sozinha','Espada flamejante'],correct:1,explain:'Gideão pediu que o velo ficasse molhado (chão seco) e depois o inverso. Deus atendeu ambas as vezes, confirmando Sua chamada.',ref:'Juízes 6:36-40'},
  {type:'mc',q:'Qual foi o crime de Acabe e Jezabel que Elias condenou?',opts:['Idolatria com o Baal e assassinato de Nabote','Desviar o dízimo do templo','Aliar-se com a Assíria','Casar com estrangeiros'],correct:0,explain:'Acabe e Jezabel adoravam Baal, massacraram profetas do Senhor e assassinaram Nabote para tomar sua vinha. Elias os confrontou diretamente.',ref:'1 Reis 18:18 / 21:19'},
  {type:'mc',q:'O que é o "Magnificat" de Maria em Lucas 1?',opts:['Uma profecia sobre a destruição de Jerusalém','O cântico de louvor de Maria ao receber a notícia da gravidez','A oração que Jesus ensinou','O discurso de Zacarias'],correct:1,explain:'Maria visitou Isabel e entoou o Magnificat (Lc 1:46-55): "Minha alma engrandece ao Senhor." É o cântico de louvor mais longo de uma mulher na Bíblia.',ref:'Lucas 1:46-55'},
  {type:'mc',q:'Qual apóstolo foi o primeiro a morrer (mártir)?',opts:['Pedro','Paulo','Estêvão','Tiago filho de Zebedeu'],correct:3,explain:'Tiago, filho de Zebedeu e irmão de João, foi executado pelo rei Herodes Agripa I com espada — o primeiro apóstolo a morrer como mártir.',ref:'Atos 12:2'},
  {type:'mc',q:'Qual é o significado do nome "Betlehem" (Belém)?',opts:['Casa de oração','Casa do pão','Casa da luz','Casa de Davi'],correct:1,explain:'"Bet-lechem" em hebraico = "casa do pão". Ironia significativa: Jesus, o Pão da Vida, nasceu na cidade cujo nome significa "casa do pão".',ref:'Gênesis 35:19 / João 6:35'},
  {type:'mc',q:'Qual profeta confrontou o rei Davi após o pecado com Bate-Seba e Urias?',opts:['Gade','Natã','Asafe','Ageu'],correct:1,explain:'Natã foi a Davi com a parábola da ovelha roubada. Quando Davi se indignou, Natã disse: "Tu és esse homem!" — um dos confrontos mais dramáticos da Bíblia.',ref:'2 Samuel 12:1-7'},
  {type:'mc',q:'Qual das sete cartas de Apocalipse repreende a Igreja por ser "morna"?',opts:['Éfeso','Pérgamo','Sardes','Laodiceia'],correct:3,explain:'"Sei as tuas obras, que nem és frio nem quente. Assim, porque és morno, e não frio nem quente, estou a ponto de vomitar-te da minha boca."',ref:'Apocalipse 3:15-16'},
  {type:'mc',q:'Qual é a diferença entre Saduceus e Fariseus no NT?',opts:['Somente o nome','Saduceus negavam a ressurreição; Fariseus a aceitavam','Saduceus eram mais rigorosos na lei','Fariseus eram sacerdotes'],correct:1,explain:'Os Saduceus (aristocracia sacerdotal) negavam a ressurreição, anjos e espíritos. Os Fariseus criam na ressurreição e na tradição oral.',ref:'Atos 23:8 / Marcos 12:18'},
  {type:'mc',q:'Qual é o fruto do Espírito conforme Gálatas 5:22-23?',opts:['Amor, alegria, paz, paciência, bondade, benignidade, fidelidade, mansidão, domínio próprio','Fé, esperança, amor, humildade, paciência','Sabedoria, entendimento, ciência, piedade','Profecia, cura, línguas, interpretação'],correct:0,explain:'Gálatas 5:22-23 lista nove aspectos do fruto do Espírito: amor, alegria, paz, paciência, bondade, benignidade, fidelidade, mansidão e domínio próprio.',ref:'Gálatas 5:22-23'},
  {type:'mc',q:'Qual profeta do AT é citado mais vezes no Novo Testamento?',opts:['Ezequiel','Jeremias','Moisés','Isaías'],correct:3,explain:'Isaías é citado ou aludido mais de 400 vezes no NT — mais do que qualquer outro profeta. Por isso é chamado de "o quinto evangelista".',ref:'Novo Testamento / Citações do AT'},
  {type:'mc',q:'Qual é o tema central do livro de Eclesiastes?',opts:['A criação do mundo','A vaidade da vida sem Deus e a busca de sentido','A sabedoria do rei Salomão','O amor entre Salomão e a Sulamita'],correct:1,explain:'"Vaidade de vaidades, diz o Pregador, vaidade de vaidades! Tudo é vaidade." O Qohélet examina a vida "debaixo do sol" sem Deus e conclui: tema a Deus.',ref:'Eclesiastes 1:2 / 12:13'},
  {type:'mc',q:'Em qual episódio Pedro andou sobre as águas?',opts:['Após a ressurreição','Na tempestade no mar da Galileia, durante a noite','Quando Jesus multiplicou os pães','No batismo de Jesus'],correct:1,explain:'Mateus 14:29-31 — Jesus andou sobre as águas na quarta vigília da noite. Pedro pediu para ir e afundou quando olhou para o vento. "Homem de pequena fé, por que duvidaste?"',ref:'Mateus 14:29-31'},
  {type:'mc',q:'Quais são os três presentes trazidos pelos magos ao menino Jesus?',opts:['Ouro, prata e incenso','Ouro, incenso e mirra','Ouro, tempero e mirra','Prata, incenso e mirra'],correct:1,explain:'Mateus 2:11 — Os magos do Oriente ofereceram ouro (realeza), incenso (divindade) e mirra (morte/sepultamento). Cada presente era simbolicamente profético.',ref:'Mateus 2:11'},
  {type:'mc',q:'Qual é o maior de todos os mandamentos segundo Jesus?',opts:['Não matarás','Honrar pai e mãe','Amar a Deus com todo o coração, alma e meod','Não mentirás'],correct:2,explain:'Jesus citou Deuteronômio 6:5: "Amarás ao Senhor teu Deus com todo o teu coração, com toda a tua alma e com todo o teu meod (força/intensidade)."',ref:'Marcos 12:30 / Deuteronômio 6:5'},
  {type:'mc',q:'Qual o significado do nome "Jesus" em hebraico?',opts:['Filho de Davi','O Senhor salva','Deus conosco','O ungido'],correct:1,explain:'"Josué" (Yeshua) em hebraico = "o Senhor é salvação". O anjo disse a José: "Chamarás o seu nome Jesus, porque ele salvará o seu povo dos seus pecados."',ref:'Mateus 1:21'},
  {type:'mc',q:'Qual evento marcou o início do ministério público de Jesus?',opts:['A Última Ceia','O batismo por João Batista','A cura do paralítico','A fuga para o Egito'],correct:1,explain:'O batismo de Jesus no Jordão marcou o início de seu ministério público, quando o Espírito Santo desceu e a voz do Pai O identificou publicamente.',ref:'Mateus 3:13-17'},
  {type:'mc',q:'Qual cidade Paulo fundou durante sua segunda viagem missionária?',opts:['Tarso','Atenas','Filipos','Antioquia'],correct:2,explain:'Em Filipos, Paulo e Silas pregaram à beira do rio, converteram Lídia e foram presos. Mesmo na prisão cantaram hinos e um terremoto abriu as portas.',ref:'Atos 16:12-34'},
  {type:'mc',q:'Qual é o maior capítulo da Bíblia?',opts:['Salmo 22','Salmo 119','Isaías 53','Gênesis 1'],correct:1,explain:'O Salmo 119 tem 176 versículos, divididos em 22 estrofes de 8 versículos cada, correspondendo às 22 letras do alfabeto hebraico.',ref:'Salmo 119'},
  {type:'mc',q:'A frase "Eu sou o caminho, a verdade e a vida" é de qual Evangelho?',opts:['Mateus','Marcos','Lucas','João'],correct:3,explain:'João 14:6 — Jesus respondeu a Tomé com uma das mais profundas declarações "Eu sou" do quarto Evangelho, que contém sete dessas afirmações.',ref:'João 14:6'},
  {type:'mc',q:'O que o jovem rico perguntou a Jesus para herdar a vida eterna?',opts:['Como orar corretamente','O que lhe faltava para ser perfeito','Qual é o maior mandamento','Se deve seguir a lei de Moisés'],correct:1,explain:'Jesus disse: "Vende tudo o que tens e dá-o aos pobres." O jovem foi embora triste porque possuía muitas riquezas. A riqueza era seu ídolo.',ref:'Mateus 19:20-22'},
  {type:'mc',q:'Qual profeta do AT foi atirado num poço por seus companheiros por causa de suas profecias?',opts:['Isaías','Ezequiel','Jeremias','Daniel'],correct:2,explain:'Jeremias foi descido por cordas num poço de lama por pregar a rendição à Babilônia. Um etíope etrusco chamado Ebed-Melique o resgatou.',ref:'Jeremias 38:6-13'},
  {type:'mc',q:'Qual é o tema central do livro de Rute?',opts:['A conquista de Canaã','A fidelidade e a redenção dentro da aliança','A sabedoria de Salomão','O retorno do cativeiro'],correct:1,explain:'Rute ilustra o chesed (amor fiel pactual) — de Rute com Noemi e de Boaz como \"go\'el\" (resgatador). É uma história de redenção e providência.',ref:'Rute 1:16 / 4:9-10'},
  {type:'mc',q:'Qual profeta foi chamado por Deus quando criança, ouviu Sua voz de madrugada e disse "fala, pois o teu servo ouve"?',opts:['Jeremias','Isaías','Samuel','Ezequiel'],correct:2,explain:'No Tabernáculo, Samuel ouviu Deus chamá-lo três vezes. Pensou que era Eli. Na quarta vez, por instrução de Eli, respondeu: "Fala, pois o teu servo ouve."',ref:'1 Samuel 3:2-10'},
