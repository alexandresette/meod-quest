  {type:'mc',q:'Qual é o significado da "segunda morte" mencionada em Apocalipse 20-21?',opts:['É a morte física — a primeira morte é espiritual','É a morte física no Armagedon','É o lago de fogo — a morte eterna separada de Deus após o julgamento do Grande Trono Branco; contrastada com a primeira morte (física); quem vence não é afetado por ela','É o julgamento purgatório antes da ressurreição'],correct:2,explain:'Apocalipse 20:14: "A morte e o inferno foram lançados no lago de fogo. Esta é a segunda morte." 21:8: os incrédulos "terão a sua parte no lago que arde com fogo e enxofre, que é a segunda morte." Primeira morte = morte física/biológica. Segunda morte = separação eterna de Deus. O vencedor (Ap 2:11) não sofrerá dano da segunda morte.',ref:'Apocalipse 20:14; 21:8; 2:11'},
  {type:'mc',q:'Qual é o episódio da serpente de bronze em Números 21 e como Jesus o aplica a si mesmo em João 3?',opts:['Não tem aplicação messiânica — Jesus só usou como exemplo de cura','Israel foi atacado por serpentes ardentes; Moisés fez uma serpente de bronze e a colocou no alto de um poste; quem fosse picado e olhasse para ela vivia; Jesus disse em João 3:14: "Como Moisés levantou a serpente no deserto, assim importa que o Filho do Homem seja levantado"','A serpente representava o Egito; Jesus a aplicou ao Reino Romano','Moisés fez por magia; Jesus rejeita essa conexão'],correct:1,explain:'Números 21:8-9: serpentes ardentes picavam o povo que pecou. Deus mandou Moisés fazer uma serpente de bronze e pô-la num poste — quem olhasse vivia. Jesus em João 3:14-15: "Como Moisés levantou a serpente no deserto, assim importa que o Filho do Homem seja levantado, para que todo o que nele crer tenha a vida eterna." Tipologia da cruz: olhar pela fé.',ref:'Números 21:8-9; João 3:14-15'},
  {type:'mc',q:'Qual é a estrutura quiástica (quiasmo) e como ela aparece na Bíblia hebraica?',opts:['É uma técnica de rima poética sem significado estrutural','É uma estrutura literária em espelho (A-B-C-B-A) onde o centro é o ponto principal; aparece em Gênesis (estrutura da criação), Salmos, parábolas de Jesus e em passagens como João 1 — a inversão espelha e enfatiza o ponto central','É apenas usada em hebraico; no NT não existe','É uma técnica de memorização sem propósito literário'],correct:1,explain:'Quiasmo (do grego chi, X) é estrutura A-B-C-B-A onde o centro carrega o peso temático. Exemplo: Gênesis 1 é quiástico (dias 1-3 paralelos com 4-6, dia 7 no centro). O Sermão da Montanha tem estrutura quiástica. João 1 tem quiasmo elaborado. Salmo 51 é quiástico. Reconhecer quiasmos revela ênfases que a tradução frequentemente obscurece.',ref:'Gênesis 1; João 1; Salmo 51'},
  {type:'mc',q:'O que é a "Didaquê" e por que ela é significativa para o estudo do NT e da Igreja primitiva?',opts:['É um texto gnóstico do séc. 3 rejeitado unanimemente pela Igreja','É o "Ensinamento dos Doze Apóstolos" — documento cristão do séc. 1 ou início do 2, que descreve práticas da Igreja primitiva: batismo, jejum, Ceia do Senhor, oração (versão expandida do Pai Nosso), profetas, bispos e diáconos','É um comentário de Orígenes sobre o Evangelho de João','É uma liturgia medieval atribuída falsamente ao período apostólico'],correct:1,explain:'A Didaquê (Grego: ensinamento) foi descoberta em 1873 e data provavelmente do fim do séc. 1. Contém: instruções morais (dois caminhos), ritual batismal (preferência por água corrente, mas aceitando derramamento), jejum (quarta e sexta), Pai Nosso três vezes ao dia, liturgia eucarística com "Maranata", estrutura de liderança. É janela única para o culto apostólico.',ref:'Didaquê 7-10; 1 Coríntios 11:17-34'},
  {type:'mc',q:'Qual é o significado da frase "Filho de Deus" no contexto do AT e como Jesus a radicaliza no NT?',opts:['No AT nunca foi usado; Jesus inventou o termo','No AT: usado para anjos (Jó 1:6), Israel (Êxodo 4:22) e o rei davídico (Salmo 2:7) — titulação de relacionamento especial e representação; Jesus radicaliza pela afirmação de pré-existência (João 8:58), igualdade com Deus (João 5:18) e ressurreição como demonstração (Romanos 1:4)','É apenas um título de honra sem implicação ontológica','No AT significava literalmente filho biológico de Deus'],correct:1,explain:'"Filhos de Deus" no AT: anjos (Jó 1:6), Israel (Êxodo 4:22), rei (Salmo 2:7 — citado na transfiguração e batismo de Jesus). Jesus usa "Filho" de forma que os ouvintes entendiam como blasfêmia (João 5:18: os judeus buscavam matá-lo porque se fazia igual a Deus). Romanos 1:4: declarado Filho de Deus com poder pela ressurreição.',ref:'Salmo 2:7; João 5:18; Romanos 1:4'},
  {type:'mc',q:'Qual é a "Regra de Fé" (Regula Fidei) nos Pais da Igreja e como ela funcionava na interpretação bíblica?',opts:['Era um conjunto de leis canônicas decididas no Concílio de Niceia','Era o resumo do ensinamento apostólico — predecessora do Credo — que os Pais (Ireneu, Tertuliano) usavam como parâmetro hermenêutico: a Escritura deve ser interpretada em harmonia com o que a Igreja sempre ensinou, contra interpretações gnósticas arbitrárias','Era a regra de copiar manuscritos sem erros','Era a lei eclesiástica sobre quem podia batizar e celebrar a Ceia'],correct:1,explain:'A Regula Fidei (Ireneu, Contra as Heresias; Tertuliano, De Praescriptione) era o sumário do ensinamento apostólico transmitido pelas igrejas fundadas pelos apóstolos. Funcionava como filtro hermenêutico: se uma interpretação contrariar o que os apóstolos ensinaram e a Igreja sempre creu, está errada. Protegeu contra releituras gnósticas da Bíblia.',ref:'Ireneu, Contra as Heresias 1.10.1; Gálatas 1:8-9'},
  {type:'mc',q:'Qual foi a ordem cronológica dos escritos do NT — qual veio primeiro e qual por último, segundo o consenso acadêmico?',opts:['Os Evangelhos foram primeiro (30-50 d.C.); Apocalipse foi por último (150 d.C.)','As cartas de Paulo são as mais antigas (1 Tessalonicenses ~50 d.C.); os Evangelhos foram escritos depois (Marcos ~65-70, Mateus e Lucas ~80, João ~90-95); Apocalipse foi por último (~95 d.C.) no tempo de Domiciano','Mateus foi o primeiro Evangelho (~30 d.C.); Romanos foi por último','Todos foram escritos simultaneamente pelos apóstolos antes de 70 d.C.'],correct:1,explain:'1 Tessalonicências (~50 d.C.) é provavelmente o escrito mais antigo do NT. As cartas paulinas precedem os Evangelhos sinóticos. Marcos (~65-70 d.C.) é geralmente considerado o primeiro Evangelho. Mateus e Lucas usaram Marcos como fonte (~80-85 d.C.). João (~90-95 d.C.) é o mais tardio dos Evangelhos. Apocalipse (~95 d.C.) — Domiciano — é provavelmente o último.',ref:'1 Tessalonicenses 1:1; Marcos 13:14; João 21:23-24; Apocalipse 1:9'}
,{type:'mc',q:'Qual é o significado do "véu partido" no momento da morte de Jesus em Mateus 27:51?',opts:['Simbolizava o fim do sacerdócio judaico como instituição','O véu que separava o Santo Lugar do Santo dos Santos (simbolizando a separação entre Deus e a humanidade pelo pecado) se rasgou de cima a baixo — indicando que o acesso direto a Deus foi aberto pela morte de Jesus, não por mão humana','Era um sinal do terremoto que destruiu parte do Templo','Representava o fim das cerimônias mosaicas e início da lei oral'],correct:1,explain:'Mateus 27:51: "o véu do santuário rasgou-se em dois de alto a baixo." O véu de baixo para cima indicaria ação humana; de cima para baixo indica ação divina. O Santo dos Santos (acesso somente ao sumo sacerdote uma vez por ano) agora é aberto a todos. Hebreus 10:19-20: temos ousadia para entrar no Santo dos Santos pelo sangue de Jesus, pelo novo e vivo caminho.',ref:'Mateus 27:51; Hebreus 10:19-20; Levítico 16:2'}
]
